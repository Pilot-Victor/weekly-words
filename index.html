<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Daily English</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="Daily English">
<style>
  :root{ --bg:#f4f6f9; --card:#ffffff; --line:#e3e7ee; --txt:#1b2130; --sub:#6b7482;
         --pp:#7c3aed; --ppbg:#f2ebff; --pptx:#6d28d9;
         --ok:#059669; --okbg:#dff3ea; --oktx:#047857; --accent:#2563eb; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    font-size:17px;line-height:1.6;}
  .wrap{max-width:640px;margin:0 auto;padding:16px 14px 60px;}
  h1{font-size:19px;margin:0 0 2px;font-weight:800;}
  .subttl{color:var(--sub);font-size:13px;margin-bottom:12px;}
  .banner{font-size:12px;border-radius:8px;padding:8px 11px;margin-bottom:12px;}
  .banner.local{background:#fdf2d9;color:#8a5a10;border:1px solid #f0d69a;}
  .banner.shared{background:var(--okbg);color:var(--oktx);border:1px solid #b6e3cf;}
  .tabs{display:flex;gap:6px;background:#e9edf3;border-radius:12px;padding:5px;margin-bottom:14px;}
  .tab{flex:1;border:none;background:transparent;color:var(--sub);font-size:15px;font-weight:700;
    padding:10px;border-radius:9px;cursor:pointer;}
  .tab.active{background:#fff;color:var(--txt);box-shadow:0 1px 3px rgba(20,30,60,.12);}
  .sec{font-size:13px;color:var(--sub);margin:20px 2px 8px;font-weight:700;letter-spacing:.02em;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;
    box-shadow:0 1px 2px rgba(20,30,60,.04);}
  .wcard{border-left:4px solid var(--pp);}
  .wtag{display:inline-block;background:var(--ppbg);color:var(--pptx);font-size:11px;
    padding:2px 8px;border-radius:20px;margin-bottom:8px;font-weight:600;}
  .word{font-size:22px;font-weight:800;color:#101521;margin:0 0 6px;}
  .mean{font-size:15px;color:#3c4557;margin:0 0 10px;}
  .ex{font-size:14.5px;color:#4a5468;background:#f5f8fd;border-radius:8px;padding:9px 11px;
    border-left:3px solid var(--accent);}
  .ex b{color:#1d4ed8;font-weight:700;}
  .checkrow{display:flex;gap:10px;margin-top:6px;}
  .cbtn{flex:1;border-radius:14px;padding:16px 10px;font-size:16px;font-weight:700;
    border:1.5px solid var(--line);background:#f7f9fc;color:var(--txt);cursor:pointer;transition:.12s;}
  .cbtn:active{transform:scale(.98);}
  .cbtn.done{background:var(--okbg);border-color:var(--ok);color:var(--oktx);}
  .cbtn .st{display:block;font-size:12px;font-weight:500;color:var(--sub);margin-top:3px;}
  .cbtn.done .st{color:var(--oktx);}
  .tracker{margin-bottom:12px;}
  .thead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .tname{font-weight:800;font-size:16px;}
  .ttot{font-size:14px;color:var(--sub);}
  .ttot b{color:var(--ok);font-size:17px;}
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .day{aspect-ratio:1;border-radius:10px;border:1px solid var(--line);background:#f7f9fc;
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:var(--sub);}
  .day .dn{font-size:10px;opacity:.7;}
  .day.done{background:var(--okbg);border-color:var(--ok);color:var(--oktx);}
  .day.today{outline:2px solid var(--accent);}
  .bar{height:6px;background:#eaeef4;border-radius:4px;overflow:hidden;margin-top:8px;}
  .bar>i{display:block;height:100%;background:var(--ok);width:0;transition:.25s;}
  .pvtoggle{width:100%;border:1px dashed var(--line);background:transparent;color:var(--sub);
    border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;}
  .pvcard{background:#fbfcfe;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
  .pvword{font-size:17px;font-weight:800;color:#101521;}
  .pvmean{font-size:13px;color:var(--sub);margin-top:2px;}
  .foot{font-size:11px;color:var(--sub);text-align:center;margin-top:24px;line-height:1.7;}
  a{color:var(--accent);}
  /* calendar */
  .calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .calnav button{border:1px solid var(--line);background:#fff;color:var(--txt);border-radius:10px;
    width:40px;height:40px;font-size:18px;cursor:pointer;}
  .calnav .m{font-size:17px;font-weight:800;}
  .prog{display:flex;gap:10px;margin-bottom:12px;}
  .pcard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;}
  .pcard .n{font-weight:800;font-size:14px;}
  .pcard .v{font-size:13px;color:var(--sub);}
  .pcard .v b{font-size:16px;}
  .kyu b{color:#2563eb;} .byc b{color:#7c3aed;}
  .kyu i{background:#2563eb;} .byc i{background:#7c3aed;}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px;}
  .dow div{text-align:center;font-size:11px;color:var(--sub);font-weight:700;padding:2px 0;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cell{min-height:52px;border:1px solid var(--line);border-radius:9px;background:#fbfcfe;padding:4px 3px 3px;
    display:flex;flex-direction:column;align-items:center;gap:3px;}
  .cell.empty{background:transparent;border:none;}
  .cell.today{outline:2px solid var(--accent);}
  .cell .cd{font-size:11px;color:var(--sub);align-self:flex-end;padding-right:2px;}
  .cell.sun .cd{color:#e0554e;} .cell.sat .cd{color:#2f7ae0;}
  .badges{display:flex;gap:3px;margin-top:auto;padding-bottom:2px;}
  .pb{width:16px;height:16px;border-radius:50%;font-size:9px;font-weight:800;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:#b7bdc9;background:#fff;}
  .pb.kon{background:#2563eb;color:#fff;border-color:#2563eb;}
  .pb.bon{background:#7c3aed;color:#fff;border-color:#7c3aed;}
  .legend{display:flex;gap:14px;justify-content:center;margin-top:12px;font-size:12px;color:var(--sub);}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
  .wordrow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .wcard{cursor:pointer;}
  .wcard .word{margin:0;}
  .wcard.open{border-left-color:var(--accent);}
  .wexp{flex:0 0 auto;font-size:12px;font-weight:700;color:var(--pptx);background:var(--ppbg);border-radius:20px;padding:4px 10px;white-space:nowrap;}
  .wbody{margin-top:10px;}
  .wbody .ex{margin-top:8px;}
  .wbody .ex:first-child{margin-top:0;}
</style>
</head>
<body>
<div class="wrap">
  <h1>&#128218; Daily English</h1>
  <div class="banner" id="banner"></div>
  <div class="tabs">
    <button class="tab active" data-t="study">학습</button>
    <button class="tab" data-t="cal">달력</button>
  </div>

  <div id="tab-study">
    <div class="subttl" id="weekLabel"></div>
    <div class="card" id="notifCard" style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
      <div style="font-size:13.5px;color:var(--sub);line-height:1.4;">매일 알림 받기<br><span style="font-size:11.5px;">아이폰: 공유 → 홈 화면에 추가 후 아이콘으로 열어 켜세요</span></div>
      <button id="notifBtn" class="cbtn" style="flex:0 0 auto;max-width:150px;padding:12px;">🔔 알림 켜기</button>
    </div>
    <div class="sec">이번 주 표현 5개 (월요일 자동 리셋)</div>
    <div id="words"></div>
    <div class="sec">오늘 완료 체크</div>
    <div class="card">
      <div class="subttl" id="todayLabel" style="margin-bottom:10px;"></div>
      <div class="checkrow" id="checks"></div>
    </div>
    <div class="sec">주간 누적 실적</div>
    <div id="trackers"></div>
    <div class="sec">다음 주 미리보기</div>
    <button class="pvtoggle" id="pvToggle">다음 주 표현 미리보기 &#9660;</button>
    <div id="preview" style="display:none;margin-top:10px;"></div>
  </div>

  <div id="tab-cal" style="display:none;">
    <div class="calnav">
      <button id="calPrev">&#8249;</button>
      <span class="m" id="calMonth"></span>
      <button id="calNext">&#8250;</button>
    </div>
    <div class="prog" id="calProg"></div>
    <div class="dow"><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div><div>일</div></div>
    <div class="cal" id="calGrid"></div>
    <div class="legend">
      <span><i class="dot" style="background:#2563eb"></i>규영</span>
      <span><i class="dot" style="background:#7c3aed"></i>병찬</span>
      <span><i class="dot" style="background:#fff;border:1px solid #ccd"></i>미완료</span>
    </div>
  </div>

  <div class="foot" id="foot"></div>
</div>
<script>
const WORDS = [{"w":"poach","m":"1. To illegally hunt or fish on someone else's land.","ex":["China poaches more AI talent from the U.S. as it eyes the next ‘super-app’","The tech company tried to poach a top software engineer from its competitor."],"d":"260619","p":"규영","pp":true},{"w":"frontier","m":"The extreme limit of understanding or achievement in a particular area. (최첨단의)","ex":["Yao said Friday his vision for AGI will require foundational knowledge, products and frontier exploration.","Artificial intelligence is the new frontier of technology"],"d":"260619","p":"규영","pp":true},{"w":"untapped","m":"Not yet exploited, used, or tapped into.","ex":["“I don’t think ChatGPT or Claude will be the only super-app,” Yao said, saying untapped potential is in the “trillions of dollars.”","The Southeast Asian market represents a huge, untapped potential for our company"],"d":"260619","p":"규영","pp":true},{"w":"stave off","m":"To avert or delay something bad or dangerous from happening. (간신히 모면하다, 저지하다, (위기 등의 도래를) 지연시키다.)","ex":["The company called for an industry slowdown or pause in new model development to stave off disruption to society.","The company managed to stave off bankruptcy by securing a emergency loan"],"d":"260619","p":"규영","pp":true},{"w":"drawn (draw)","m":"To pull or drag something; to attract someone's attention or interest. (당기다, (커튼을) 치다/걷다, (주의·비판·관심을) 끌다, 매혹하다.)","ex":["Anthropic has emphasized AI safety from its founding and drawn criticism from rivals that its safety warnings are designed to hobble competition.","The festival draws thousands of visitors to the city every year"],"d":"260619","p":"규영","pp":true},{"w":"hobble","m":"To restrict the activity or development of something; to hamper. (방해하다, 저해하다, 유효성을 떨어뜨리다.)","ex":["Anthropic has emphasized AI safety from its founding and drawn criticism from rivals that its safety warnings are designed to hobble competition.","High interest rates could hobble the country's economic growth"],"d":"260619","p":"규영","pp":true},{"w":"That explains it","m":"어쩐지","ex":["That explains it, I thought it was strange.","That explains his bad mood."],"d":"260619","p":"병찬","pp":true},{"w":"For some reason","m":"왠지 모르게 (=I don't know why)","ex":["For some reason, I feel really exhausted today.","For some reason, I preferred to study alone this morning."],"d":"260619","p":"병찬","pp":true},{"w":"It figures","m":"어쩐지 뻔하지, 그러면 그렇지","ex":["She didn't reply to your email? It figures.","The system crashed right before the deadline? It figures."],"d":"260619","p":"병찬","pp":true},{"w":"Back then","m":"그 당시에는, 예전에는","ex":["I used exercise every day back then.","Back then, we didn't have smartphones."],"d":"260619","p":"병찬","pp":true},{"w":"To overdo it","m":"행동, 운동, 노력 등을 과하게 해서 무리하다.","ex":["Don't overdo it at the gym today.","I think I overdid it on the weekend."],"d":"260619","p":"병찬","pp":true},{"w":"To read the room","m":"상황 파악을 잘하다, 분위기 읽다.","ex":["You need to learn to read the room.","He is very good at reading the room."],"d":"260619","p":"병찬","pp":true},{"w":"To walk on eggshells","m":"조마조마하다. 살얼음판을 걷게 하다.","ex":["I was walking on eggshells trying to explain to her why I came home that late.","The new manager makes everyone walk on eggshells."],"d":"260619","p":"병찬","pp":true},{"w":"Relate to","m":"공감하다","ex":["I can totally relate to that.","He couldn't relate to my concerns."],"d":"260619","p":"병찬","pp":true},{"w":"Feel for Someone","m":"안타깝게 여기다","ex":["I really feel for you.","Do you feel for his loneliness?"],"d":"260619","p":"병찬","pp":true},{"w":"Stand","m":"견디다. 참다","ex":["I can't stand his attitude.","I just can't stand hot weather."],"d":"260619","p":"병찬","pp":true},{"w":"ingrained","m":"(Of habits, beliefs, or attitudes) firmly fixed and difficult to change.","ex":["the biggest barrier to getting real value from AI isn’t the technology or the workers themselves — it’s the ingrained culture of the organizations where they work.","Old habits are deeply ingrained and can be very difficult to break."],"d":"260522","p":"규영","pp":true},{"w":"norms","m":"A standard or pattern of social behavior that is typical or expected of a group.","ex":["Employees are ready to reinvent how they work, but the system around them—metrics, incentives, and norms—continues to reinforce the old way","Social norms vary greatly from one culture to another"],"d":"260522","p":"규영","pp":true},{"w":"capitalize","m":"1. To take the chance to gain an advantage from something","ex":["The takeaway: For companies to truly capitalize on the AI revolution,","The team capitalized on their opponent's mistakes to win the game"],"d":"260522","p":"규영","pp":true},{"w":"overhaul","m":"To take apart a machine or system in order to examine it and repair it if necessary; to make major changes to a system to improve it.","ex":["leaders need to fundamentally overhaul how work is structured, managed, and rewarded, rather than simply handing workers new tools and expecting them to figure it out.","The government is planning to overhaul the tax system"],"d":"260522","p":"규영","pp":true},{"w":"midway","m":"halfway through something, between two points or stages.","ex":["You’ve midway through a difficult conversation or negotiation.","She changed her career midway through her life and never looked back."],"d":"260522","p":"병찬","pp":true},{"w":"off-hand comment","m":"a remark made casually, without much thought or preparation — something said spontaneously, not planned.","ex":["The other person has just about pushed you to your limit, maybe with an off-hand comment or a string of subtle digs.","It wasn't a serious opinion — just an off-hand comment he made while walking out the door."],"d":"260522","p":"병찬","pp":true},{"w":"string of subtle digs","m":"String of = a series of repeated things one after another Subtle = not obvious, hard to notice Digs = indirect insults or criticisms — not direct attacks, but little remarks that quietly put someone down","ex":["The other person has just about pushed you to your limit, maybe with an off-hand comment or a string of subtle digs.","Her speech sounded polite on the surface, but it was actually a string of subtle digs at her competitor."],"d":"260522","p":"병찬","pp":true},{"w":"heart is racing","m":"your heart is beating very fast — usually because of excitement, fear, nervousness, or anticipation.","ex":["Your heart is racing.","My heart was racing midway through the job interview — I was so nervous."],"d":"260522","p":"병찬","pp":true},{"w":"zinger","m":"a sharp, witty, or clever remark that is surprisingly funny or cutting","ex":["Your brain calls to mind that perfect zinger.","His off-hand comment turned into a total zinger — the whole room burst out laughing."],"d":"260522","p":"병찬","pp":true},{"w":"Lost your footing","m":"suddenly lose your balance, stability, or control — either literally or figuratively.","ex":["There’s a way to catch yourself mid-sentence and pivot without looking like you’ve totally lost your footing.","He lost his footing on the wet floor and nearly fell."],"d":"260522","p":"병찬","pp":true},{"w":"Cognitive friction","m":"The mental effort or resistance experienced by a user when an interface or system does not work as expected, or is difficult to understand.","ex":["Others raise concerns that AI users could be surrendering the cognitive friction that makes thinking sharp, and that as a society we may have fewer original ideas","A complex sign-up process creates cognitive friction, which often leads users to abandon the app"],"d":"260510","p":"규영","pp":true},{"w":"Atrophy","m":"The gradual decline of a skill, ability, or quality due to lack of use. (물리적, 생물학적 또는 기능적 퇴화)","ex":["There's plenty of evidence that if you are not doing as much of the actual thinking, then your capability to do that kind of thinking is going to atrophy","If you don't use your imagination, it will eventually atrophy"],"d":"260510","p":"규영","pp":true},{"w":"Inherent","m":"Existing in something as a permanent, essential, or characteristic attribute.","ex":["Why do we think AI is going to be that different from other things that our brain has already adapted to?\" Benge says. \"It's not inherent to the tool to be good or bad","The design of the bridge has an inherent weakness that needs to be fixed"],"d":"260510","p":"규영","pp":true},{"w":"ephemeral AI","m":"Ephemeral means something that lasts only for a very short time — temporary, fleeting, quickly gone.","ex":["Unlike ephemeral AI chats, this method treats knowledge as a compounding asset, allowing the LLM to maintain indexes and relationships between files without needing complex infrastructure.","Unlike ChatGPT's persistent memory, this tool uses ephemeral AI"],"d":"260510","p":"병찬","pp":true},{"w":"takeaway","m":"means the main point, lesson, or conclusion you get from something","ex":["And it gives an explanation of what this video is about and what the takeaways are.","The key takeaway from the CNBC article was that the AI boom is creating unexpected opportunities for skilled trade workers, not just tech professionals"],"d":"260510","p":"병찬","pp":true},{"w":"It just figured it all out on its own.","m":"This means something (a person, animal, or system — here likely an AI) managed to solve or understand something completely, without any help or instruction — purely through its own process.","ex":["We never trained the AI model on that specific task — it just figured it all out on its own through pattern recognition"],"d":"260510","p":"병찬","pp":true},{"w":"It's way more simple than you may think.","m":"","ex":["This app is way more simple than the old one."],"d":"260510","p":"병찬","pp":true},{"w":"tireless","m":"never getting tired or giving up — always working hard with endless energy and effort.","ex":["People on X are calling it a game changanger because it finally makes AI feel like a tireless colleague who actually remembers everything and it stays organized.","he was a tireless worker, always the first in and last to leave the office."],"d":"260510","p":"병찬","pp":true},{"w":"hack","m":"modify or customize something freely","ex":["Hey, this is left vague so that you can hack it and customize it to your own project.","The template is pretty basic — hack it and make it fit your brand."],"d":"260510","p":"병찬","pp":true},{"w":"Have big shoes to fill","m":"To have to meet very high expectations set by a predecessor who was highly successful or respected.","ex":["Ternus certainly has big shoes to fill","You are the best teacher we've ever had. Whoever comes next will have big shoes to fill"],"d":"260426","p":"규영","pp":true},{"w":"hang over","m":"To remain as a source of worry, pressure, or a threat. (드리워져 있다. 가시지 않다)","ex":["The big question mark hanging over Ternus is Apple’s efforts in AI.","The possibility of a recession is hanging over the economy."],"d":"260426","p":"규영","pp":true},{"w":"at its core","m":"At the most fundamental or essential level; in its most basic nature.(본질적으로, 핵심적으로, 내면 깊숙이, 속속들이.)","ex":["Ternus knows Apple at its core","The issue, at its core, is about trust between the two parties"],"d":"260426","p":"규영","pp":true},{"w":"building off","m":"To use something as a base or starting point to create something more advanced or complete.","ex":["Cook found steady success in services building off existing products","We are building off the success of our first product to create a better version"],"d":"260426","p":"규영","pp":true},{"w":"volatile","m":"Liable to change rapidly and unpredictably, especially for the worse. (변덕스러운, 금방이라도 폭발할 것 같은.)","ex":["It’s up to Ternus to decide which path he will take, and whether Apple can create the next big thing in a volatile AI landscape.","He has a volatile temper, so you should be careful what you say to him."],"d":"260426","p":"규영","pp":true},{"w":"Substrate","m":"The surface or material on which something else exists, grows, or is attached. (바탕, 기저층, (표면 아래의) 기초가 되는 층, 토대.)","ex":["reframe the device as a substrate for intelligent experiences","Before laying the tiles, make sure the substrate is clean and level."],"d":"260426","p":"규영","pp":true},{"w":"In a different level of","m":"Far superior to, or vastly different from, the typical examples of that category.","ex":["However, the current market feels like we're in a different level of uncertainty.","The speed of a professional sprinter is in a different level of athleticism"],"d":"260426","p":"병찬","pp":true},{"w":"near-term","m":"Happening in or relating to the immediate future (typically the next few weeks or months, usually up to one year).","ex":["I really don't spend a lot of time worrying about the near-term or getting excited about the near-term.","While we expect the company to be profitable in five years, our near-term goal is simply to manage our cash flow.\""],"d":"260426","p":"병찬","pp":true},{"w":"Top Dog","m":"The most powerful, successful, or dominant person or company in a specific group.","ex":["number one is top dog and first mover in an important emerging industry.","In the world of high-end smartphones, Apple remains the top dog, holding the largest share of the premium market."],"d":"260426","p":"병찬","pp":true},{"w":"Bullish","m":"optimistic or confident about something — expecting it to grow, succeed, or improve.","ex":["if you had never heard of intuitive surgical, that should make you even more bullish.","I'm bullish on renewable energy this decade."],"d":"260426","p":"병찬","pp":true},{"w":"dissuade","m":"to persuade someone not to do something — to talk them out of a plan or action they were considering.","ex":["I would never dissuade somebody in your channel or a friend of mine at a cocktail party.","His doctor tried to dissuade him from eating fast food every day, warning him about the long-term health risks"],"d":"260426","p":"병찬","pp":true},{"w":"In bits and pieces","m":"an idiom that means gradually, in small parts, or in a fragmented/incomplete way — not all at once, but little by little.","ex":["I sell and it's usually my winners and I sell them off in bits and pieces, charitable reasons sometimes.","She learned about the company's layoffs in bits and pieces — first through rumors, then a memo, and finally an official announcement."],"d":"260426","p":"병찬","pp":true},{"w":"A brief bout of","m":"A short period of time during which you experience a specific condition, emotion, or event (like an illness, a feeling, or a weather event).","ex":["A brief bout of physical exercise can create \"ripples\" of activity in your brain that help you store and retrieve memories.","After a brief bout of uncertainty regarding the new AI regulations, the company decided to move forward with its expansion."],"d":"260419","p":"병찬","pp":true},{"w":"Fickle","m":"Changing frequently, especially as regards one's loyalties, interests, or affection.","ex":["Memory can be such a fickle thing.","Spring weather in this city is notoriously fickle; it can be sunny at noon and snowing by dinner time."],"d":"260419","p":"병찬","pp":true},{"w":"brisk","m":"Quick and active; marked by speed and energy.","ex":["jump on an exercise bike for a few minutes or take a brisk walk.","I try to take a brisk walk for 30 minutes every morning to clear my head before starting work."],"d":"260419","p":"병찬","pp":true},{"w":"benefit (as a verb)","m":"","ex":["There's a reason to stay active because you will benefit more every time.","The new automated sorting system will benefit the entire warehouse team by reducing manual errors."],"d":"260419","p":"병찬","pp":true},{"w":"reap","m":"To gather, receive, or enjoy the rewards of an action.","ex":["If you stick with exercise for six weeks, you will reap bigger benefits from any further sessions.","After years of studying in an English group, he is finally reaping the benefits during international business calls.\""],"d":"260419","p":"병찬","pp":true},{"w":"prompt","m":"Noun. A set of instructions given to a computer system or AI.","ex":["It found the tool can outperform humans at some hacking and cyber-security tasks, which has prompted discussions by regulators, legislators and financial institutions about the dangers it could pose to digital services.","Fears of a bottleneck in HBM4 supply prompted a wave of profit-taking in the semiconductor sector"],"d":"260419","p":"규영","pp":true},{"w":"encompass","m":"To include different types of things; to surround or cover something completely.","ex":["It encompasses the company's AI assistant and family of models","The Nasdaq 100 index encompasses a wide range of top-tier technology firms, from AI to biotechnology"],"d":"260419","p":"규영","pp":true},{"w":"dormant","m":"Not active or growing but having the ability to be active at a later time.","ex":["They found the tool could locate dormant bugs lurking in decades-old code and easily exploit them.","Even though the infection seemed to be gone, the virus remained dormant in the body."],"d":"260419","p":"규영","pp":true},{"w":"exploit","m":"Verb. To make use of a situation or person in a way that is considered unfair; or to make full use of a resource.","ex":["They found the tool could locate dormant bugs lurking in decades-old code and easily exploit them.","Hackers often search for unpatched vulnerabilities to exploit a system's data"],"d":"260419","p":"규영","pp":true},{"w":"unearth","m":"To find something that was hidden or lost; or to dig up something out of the ground.","ex":["Mythos could unearth critical vulnerabilities much more quickly than other AI models had \"really shaken people\".","The investigative reporter spent months trying to unearth the company's secret financial records"],"d":"260419","p":"규영","pp":true},{"w":"breach","m":"An act of breaking or failing to observe a law, agreement, or code of conduct; or a gap made in a wall or barrier.","ex":["Most hackers do not need super AI tools to breach systems","The company is investigating a massive data breach that exposed millions of user records"],"d":"260419","p":"규영","pp":true},{"w":"Inference","m":"A conclusion reached on the basis of evidence and reasoning","ex":["“So much more room to optimize AI inference for speed, memory usage, power consumption, and multi-tenant utilization,” he said in a post on X on Wednesday.","From the silent room and the look on his face, I made the inference that the meeting had gone poorly."],"d":"260413","p":"병찬","pp":true},{"w":"blistering","m":"Extremely fast, intense, or forceful","ex":["Memory stocks’ blistering rally","The AI sector has grown at a blistering pace in the first half of 2026, outperforming all other market segments."],"d":"260413","p":"병찬","pp":true},{"w":"unprecedent","m":"Never done or known before; without previous example","ex":["Significant demand coupled with a shortage of supply, has pushed memory prices to unprecedented levels and supported profits for Samsung, SK Hynix and Micron.","The speed at which AI agents are being adopted is unprecedented in the history of the software industry."],"d":"260413","p":"병찬","pp":true},{"w":"de‑risk","m":"To make a situation, investment, or process less risky by identifying potential threats and creating \"safety nets.\"","ex":["It does not alter the industry’s long‑term demand picture. In a market primed to de‑risk, even an incremental development can be taken as a cue to lighten up.”","Many organizations are de-riskng their AI strategy by using \"containerized\" models that can run locally without relying on a single cloud provider."],"d":"260413","p":"병찬","pp":true},{"w":"coupled with","m":"Linked to, combined with, or occurring at the same time as something else.","ex":["Significant demand coupled with a shortage of supply, has pushed memory prices to unprecedented levels and supported profits for Samsung, SK Hynix and Micron.","New trade tariffs, coupled with rising shipping costs, have forced logistics managers to de-risk their global supply chains."],"d":"260413","p":"병찬","pp":true},{"w":"fall under","m":"To be classified as part of a particular group, category, or jurisdiction;","ex":["The approval, which falls under the UN R-171 regulation for Driver Control Assistance Systems, comes after more than 18 months of testing and is currently valid only in the Netherlands","The new AI chips fall under the 'high-performance computing' category."],"d":"260413","p":"규영","pp":true},{"w":"provisional validity","m":"Legal or official validity that is temporary and subject to change or final confirmation later.","ex":["European type approval with provisional validity in the Netherlands","Given the provisional validity of the new regulations, we should prepare for multiple scenarios"],"d":"260413","p":"규영","pp":true},{"w":"stress","m":"noun. A state of mental or emotional strain.","ex":["The Dutch authority stressed that FSD Supervised is a driver assistance system — not an autonomous or self-driving system","In the meeting, the CEO placed heavy stress on the need for a new platform strategy to stay competitive"],"d":"260413","p":"규영","pp":true},{"w":"Exemption","m":"The action of freeing someone or something from an obligation or liability imposed on others.","ex":["Tesla submitted documentation covering more than 400 compliance requirements under UN R-171 and Article 39 exemptions.","The new environmental regulation includes exemptions for small-scale manufacturers"],"d":"260413","p":"규영","pp":true},{"w":"explicit","m":"Stated clearly and in detail, leaving no room for confusion or doubt.","ex":["The RDW’s statement is explicit: FSD Supervised “can take over many driving tasks” but the vehicles “are NOT autonomous or self-driving.”","The contract gives explicit permission to use the software"],"d":"260413","p":"규영","pp":true},{"w":"intervene","m":"To intentionally become involved in a difficult situation in order to improve it or prevent it from getting worse.","ex":["The driver’s hands don’t need to rest on the steering wheel, but the driver must be able to intervene immediately.","The government may intervene to stabilize the currency during a period of extreme stress"],"d":"260413","p":"규영","pp":true},{"w":"going public","m":"The process where a private company (owned by its founders and a few investors) becomes a public company by selling its shares to the general public on a stock exchange (like the New York Stock Exchange or Nasdaq)","ex":["As SpaceX potentially readies to begin the progress of going public in the coming days, investors already have funds to play it.","For many venture capitalists, a company going public is the perfect exit strategy to cash out on their early investments."],"d":"260329","p":"병찬","pp":true},{"w":"Public Offering Prospectus","m":"A formal, legally required written document that provides full details about an investment offering for sale to the public.","ex":["The Information reported Tuesday that the Elon Musk-run startup is looking to file its initial public offering prospectus with regulators as early as this week.","Before retail investors can buy shares of Claude Cowork's parent company, they must carefully read the official public offering prospectus."],"d":"260329","p":"병찬","pp":true},{"w":"Vying","m":"Competing eagerly with someone in order to achieve something; fighting for superiority or a specific prize.","ex":["SpaceX has reportedly been looking at a Nasdaq listing while vying for early entry into the Nasdaq 100 index.","Several tech giants are vying for the top spot in the rapidly growing autonomous AI agent market."],"d":"260329","p":"병찬","pp":true},{"w":"accounts for / nearly a quarter","m":"Makes up, represents, or is responsible for almost 25% of the total amount.","ex":["SpaceX also accounts for nearly a quarter or the Baron Focused Growth Fund (BFGIX). Tesla follows, representing just over 6% of holdings.","Housing and rent accounts for nearly a quarter of most families' monthly expenses."],"d":"260329","p":"병찬","pp":true},{"w":"Come off","m":"Having just completed or experienced something (usually a successful or intense period).","ex":["But the fund is coming off three years of double-digit gains, Morningstar said.","The tech company is coming off a record-breaking quarter of sales."],"d":"260329","p":"병찬","pp":true},{"w":"bottom quartile of","m":"The lowest 25% of a group when everything is ranked from best to worst (or highest to lowest).","ex":["The fund added nearly 12% in 2025, but was among the bottom quartile of comparable offerings, per Morningstar.","Despite the CEO's high hopes, the fund's recent performance put it in the bottom quartile of its competitor group."],"d":"260329","p":"병찬","pp":true},{"w":"Multi Tenant","m":"An architecture in which a single instance of a software application or a hardware resource serves multiple customers or users.","ex":["So much more room to optimize AI inference for speed, memory usage, power consumption, and multi-tenant utilization","AWS and Azure use multi-tenant architectures to lower costs for their customers"],"d":"260329","p":"규영","pp":true},{"w":"blister / blistering","m":"Blister","ex":["Memory stocks’ blistering rally","Wearing new shoes for a long run can cause a painful blister on your heel"],"d":"260329","p":"규영","pp":true},{"w":"Profit-taking","m":"The act of selling an asset (like stocks) that has risen in value to lock in the profit.","ex":["Analysts said the moves this week on memory stocks have largely been driven by profit-taking","It’s often wise to engage in some profit-taking when your portfolio hits its target price"],"d":"260329","p":"규영","pp":true},{"w":"primed to","m":"To be made ready for a specific purpose or action; to be in a state where one is very likely to do something soon.","ex":["In a market primed to de‑risk, even an incremental development can be taken as a cue to lighten up","The team was primed to win the championship after months of intense training"],"d":"260329","p":"규영","pp":true},{"w":"lucrative","m":"Producing a great deal of profit; highly profitable.","ex":["How the red-hot AI data center boom is igniting demand for a new, lucrative career path","Developing AI agents has become a lucrative business for tech companies as more people pay for subscriptions."],"d":"260322","p":"병찬","pp":true},{"w":"funnel","m":"a tube or pipe that is wide at the top and narrow at the bottom, used for guiding liquid or powder into a small opening.","ex":["Big Tech is funneling billions into building out these specialized facilities, with the four hyperscalers, Alphabet, Microsoft, committing nearly 700 billion in combined capex spending this year to fund these developments.","Tech giants are funneling millions of active users from their search apps toward new AI-integrated services."],"d":"260322","p":"병찬","pp":true},{"w":"reached a fever pitch","m":"To become extremely intense, exciting, or agitated. It describes a situation that has reached its highest level of emotion or activity.","ex":["While anxiety around AI replacing white-collar jobs has reached a fever pitch, the data center boom is creating lucrative opportunities for skilled trade workers.","Anticipation for the new AI agent reached a fever pitch last week when developers signaled a transition toward fully autonomous systems."],"d":"260322","p":"병찬","pp":true},{"w":"displace","m":"To take the place of someone or something; to force something out of its usual or original position.","ex":["generative models will displace white-collar jobs.","Advanced AI systems are starting to displace older, less efficient software in the corporate world."],"d":"260322","p":"병찬","pp":true},{"w":"retro / fitting","m":"The act of adding new components, technology, or features to an existing structure or system that did not have them when it was originally built.","ex":["Mathews noted “massive growth areas specific to labor” as a result of these retrofitting requirements, with network engineers, electricians, mechanical engineers, and plumbing and heating contractors deployed to install new liquid cooling systems.","Many companies are retrofitting their existing databases to work with autonomous AI agents like OpenClaw."],"d":"260322","p":"병찬","pp":true},{"w":"Moat","m":"1. A deep, wide ditch surrounding a castle or town","ex":["Jensen Huang doesn’t need a new chip. He needs a new moat","Apple's seamless ecosystem between the iPhone, Mac, and iPad creates a powerful moat that makes it difficult for users to switch to other brands"],"d":"260322","p":"규영","pp":true},{"w":"agnostic","m":"Hardware or software that is compatible with many different systems","ex":["At Nvidia’s annual developer conference, GTC, Huang launched NemoClaw, an open-source, chip-agnostic platform for building and deploying AI agents – autonomous software programs at the center of the latest advancements in the industry.","Our cloud-native application is cloud-agnostic, meaning it can run on AWS, Azure, or Google Cloud without any issues"],"d":"260322","p":"규영","pp":true},{"w":"Monetize","m":"To utilize something as a source of profit;","ex":["Nvidia gives away the layer that drives adoption and monetizes what sits beneath it","YouTube allows creators to monetize their videos through advertisements and memberships"],"d":"260322","p":"규영","pp":true},{"w":"playbook","m":"A set of rules or suggestions that are considered to be useful for winning or for achieving success","ex":["Huang is following that playbook — he isn’t charging for NemoClaw","The company is following the classic tech playbook: give the software away for free and monetize the hardware"],"d":"260322","p":"규영","pp":true},{"w":"Weigh in","m":"To join a discussion or argument by offering your help, advice, or opinion.","ex":["“You don’t get to weigh in on that.”","The senator weighed in with a sharp critique of the new tax policy."],"d":"260308","p":"병찬","pp":true},{"w":"vocally criticized","m":"To express disapproval or find fault with someone or something in a public, loud, or very direct manner.","ex":["Altman has been vocally criticized, including by some OpenAI employees","Local residents have vocally criticized the government's plan to build a new landfill nearby."],"d":"260308","p":"병찬","pp":true},{"w":"Cease","m":"To come to an end or to bring something to an end; to stop happening or existing.","ex":["President Donald Trump also directed every federal agency in the U.S. to “immediately cease” all use of Anthropic’s technology.","The company was ordered to cease all operations until the safety inspection was complete."],"d":"260308","p":"병찬","pp":true},{"w":"Oust","m":"To drive out or expel someone from a position or place, often by force or through a formal legal or political process.","ex":["Anthropic’s AI was reportedly used in the Iran strikes over the weekend as well as for the capturing of ousted Venezuelan leader Nicolás Maduro and his wife, Cilia Flores, in January.","The board of directors voted to oust the CEO after the financial scandal was revealed."],"d":"260308","p":"병찬","pp":true},{"w":"Concede","m":"To admit that something is true or valid after first denying or resisting it; or to surrender or yield something (like a goal, a point, or a victory).","ex":["Altman has defended OpenAI’s contract in various social media posts, though he conceded that it looked “looked opportunistic and sloppy” and that the company “shouldn’t have rushed to get this out on Friday.”","After hours of debate, he finally conceded that my analysis was correct."],"d":"260308","p":"병찬","pp":true},{"w":"surveillance","m":"The careful and continuous watching of a person or place, especially by the police or army, because of a crime that has happened or is expected.","ex":["The company wanted assurance that its models would not be used for fully autonomous weapons or mass surveillance of Americans, while the DOD wanted Anthropic to agree to let the military deploy the models across all lawful use cases.","The bank installed high-tech surveillance cameras to prevent robberies."],"d":"260308","p":"병찬","pp":true},{"w":"heated","m":"Characterized by strong emotion, intensity, or anger (especially in a discussion or argument).","ex":["Altman and Musk, two of the co-founders of OpenAI, are engaged in a heated legal battle that’s slated to go to trial next month.","The two politicians had a heated argument about the new tax policy during the live debate."],"d":"260308","p":"병찬","pp":true},{"w":"adjunct professor","m":"A professor who is hired on a contractual, part-time basis rather than being a full-time member of the faculty. Often, they have a primary career outside of the university.","ex":["dietitian Dr. Michelle Cardel, chief nutrition officer at WeightWatchers and adjunct professor at the University of Florida.","The university relies on adjunct professors to provide students with practical, real-world industry insights"],"d":"260308","p":"규영","pp":true},{"w":"dietitian","m":"An expert on diet and nutrition who helps people promote health and manage disease through specialized meal planning.","ex":["dietitian Dr. Michelle Cardel, chief nutrition officer at WeightWatchers and adjunct professor at the University of Florida.","Many professional athletes work with a dietitian to maximize their performance through optimal nutrition"],"d":"260308","p":"규영","pp":true},{"w":"longevity","m":"Long life; the ability to last for a long time: Especially referring to a person's life span","ex":["balancing protein with fiber intake is going to be really important when thinking about longevity and optimizing health and well-being across the lifespan","A healthy diet and regular exercise are key factors in achieving longevity"],"d":"260308","p":"규영","pp":true},{"w":"go overboard","m":"To do something to a greater degree than is necessary or reasonable: To overdo something.","ex":["going overboard on protein and not balancing it with fiber could lead to weight gain or digestive problems.","Investors sometimes go overboard when a new disruptive technology emerges, causing a market bubble"],"d":"260308","p":"규영","pp":true},{"w":"constipation","m":"A condition in which there is difficulty in emptying the bowels: Usually associated with hardened feces.","ex":["One of the common signs is constipation","Drinking plenty of water and eating fiber-rich foods can help prevent constipation"],"d":"260308","p":"규영","pp":true},{"w":"soluble / insoluble","m":"Able to be dissolved: Especially in water.","ex":["There are two types of dietary fiber: soluble and insoluble.","Soluble fiber is known to help lower cholesterol and improve digestion"],"d":"260308","p":"규영","pp":true},{"w":"First kind & Second Kind","m":"Refers to the initial category or type in a list of several different classifications or groups.","ex":["There are two kinds of Claude users now. The first kind chats. The second kind delegates.","There are two types of problems we face: the first kind is technical, and the second is financial."],"d":"260302","p":"병찬","pp":true},{"w":"Delegate","m":"(Noun - /ˈdelɪɡət/): A person chosen or elected to represent a group, typically at a conference or meeting.","ex":["The second kind delegates.","More than 500 delegates from around the world attended the international climate summit."],"d":"260302","p":"병찬","pp":true},{"w":"Scatter","m":"Occurring or found at intervals or in various locations rather than all together; spread over a wide area.","ex":["draft a report from these scattered notes.","His books and papers were scattered all over the floor of his study."],"d":"260302","p":"병찬","pp":true},{"w":"Stark","m":"Adjective: Unpleasantly clear or impossible to avoid (harsh); simple or bare in appearance (austere); or showing a very large and obvious difference (distinct).","ex":["The practical difference is stark.","There is a stark contrast between the lives of the rich and the poor in this city."],"d":"260302","p":"병찬","pp":true},{"w":"tedious","m":"Too long, slow, or dull; tiresome or monotonous","ex":["The kind of tedious, structured work that sits at the intersection of ~","Checking the data for errors was a tedious task that took me all day."],"d":"260302","p":"병찬","pp":true},{"w":"Sandbox","m":"Running a program or AI in a restricted, isolated digital environment so it cannot access or damage the rest of the computer system.","ex":["The core capability is simple: file system access in a sandboxed environment.","Before we deploy the new software update to all customers, we need to test it in a sandboxed environment to check for bugs."],"d":"260302","p":"병찬","pp":true},{"w":"mundane","m":"Lacking interest or excitement; dull. It often refers to routine, everyday tasks that are not special or creative.","ex":["This sounds mundane until you realize how much time knowledge workers spend sorting downloads, organizing project files, or standardizing file names across a folder. Cowork handles this in minutes.","After a week of traveling through exotic cities, returning to the mundane routine of office work was quite difficult."],"d":"260302","p":"병찬","pp":true},{"w":"rattle","m":"To make someone nervous, worried, or confused","ex":["The U.S.-Israel conflict with Iran is extending into its third day with each side doubling down on sharper responses in the days ahead, deepening fears of a wider war that could rattle the global economy.","The sudden news of mass layoffs rattled the entire department"],"d":"260302","p":"규영","pp":true},{"w":"Gulf countries","m":"The countries bordering the Persian Gulf. In a geopolitical context, it usually refers to the six members of the Gulf Cooperation Council (GCC): Saudi Arabia, Kuwait, the United Arab Emirates, Qatar, Bahrain, and Oman.","ex":["Tehran has struck back with missiles and drones against Israel and Gulf countries that host U.S. military bases, including the United Arab Emirates, Qatar, Kuwait and Saudi Arabia.","Many Gulf countries are diversifying their economies to reduce their heavy reliance on oil."],"d":"260302","p":"규영","pp":true},{"w":"designate","m":"To officially choose someone or something for a particular purpos","ex":["he had not publicly designated a successor.","He was designated as the project leader for the upcoming AI rollout"],"d":"260302","p":"규영","pp":true},{"w":"Comprising","m":"To be made up of, To make up or form something","ex":["A council comprising Iranian President Masoud Pezeshkian, the judiciary head and a member of the Guardians Council, has temporarily assumed leadership duties on Sunday.","Individual modules comprise the entire OpenClaw system"],"d":"260302","p":"규영","pp":true},{"w":"parse","m":"To analyze a string of symbols (data) or text","ex":["traders parsed risks of a drawn-out conflict and a major oil supply disruption.","The AI agent must parse the user's voice command to determine which action to take"],"d":"260302","p":"규영","pp":true},{"w":"Casualty","m":"A person killed or injured in a war or accident:","ex":["U.S. President Donald Trump has warned that there might be more American casualties as the operations unfold.","There was only one casualty in the car crash, and he is now in stable condition"],"d":"260302","p":"규영","pp":true},{"w":"Opt in","m":"To choose to take part in something or to agree to be involved in a specific activity (usually by giving formal permission).","ex":["Starting later on Friday, users who opt in can message the AI agent through Baidu’s main search app to complete tasks.","If you want to receive our weekly newsletter and discount codes, you need to opt in on our website."],"d":"260208","p":"병찬","pp":true},{"w":"Rollout","m":"The official launch or introduction of a new product, service, or system, often happening in stages rather than all at once.","ex":["The rollout comes just days ahead of China’s Lunar New Year holiday, as Chinese internet tech giants race to attract new users.","The nationwide rollout of the 5G network will take several years to complete."],"d":"260208","p":"병찬","pp":true},{"w":"Surged in","m":"To have a sudden, powerful, and rapid increase in a particular quality, amount, or state (like popularity or price).","ex":["AI agents such as OpenClaw have surged in popularity recently for their ability to automate tasks.","The price of gold surged in value last night due to the global economic report."],"d":"260208","p":"병찬","pp":true},{"w":"unfettered","m":"Not limited or restricted; completely free.","ex":["Cybersecurity firms including CrowdStrike have warned the public about granting OpenClaw unfettered access to enterprise systems.","The imagination of a child is often unfettered by the logical rules of the adult world."],"d":"260208","p":"병찬","pp":true},{"w":"most talked-about","m":"Something or someone that is attracting the most attention, discussion, or controversy at a particular time.","ex":["Through several name changes, adoption across Silicon Valley to Beijing, and mounting controversy, the open-source AI agent now known as “OpenClaw” has emerged as one of the most talked-about tools in the artificial intelligence space this year.","The Tesla Optimus is currently the most talked-about project in the robotics industry."],"d":"260208","p":"규영","pp":true},{"w":"mounting controversy","m":"A disagreement or argument that is steadily increasing in intensity, scale, or seriousness.","ex":["Through several name changes, adoption across Silicon Valley to Beijing, and mounting controversy, the open-source AI agent now known as “OpenClaw” has emerged as one of the most talked-about tools in the artificial intelligence space this year.","The government is facing mounting controversy regarding its new tax policy"],"d":"260208","p":"규영","pp":true},{"w":"ascension","m":"1. The act of rising or moving to a higher level or position.","ex":["Its sudden ascension(혜성같은 등장), driven by its capabilities and social media attention, comes amid growing interest in AI agents that can autonomously complete tasks, make decisions, and take actions on behalf of users without constant human guidance.","The sudden ascension of electric vehicles has forced traditional automakers to slash their investment in gasoline engines."],"d":"260208","p":"규영","pp":true},{"w":"Mainstream consciousness","m":"The shared awareness or understanding of a topic by the majority of people in a society.","ex":["Until recently, AI agents have failed to reach mainstream consciousness in the same way large language models did following the emergence of OpenAI’s ChatGPT, but OpenClaw could signal a shift.","K-pop has firmly established itself in the mainstream consciousness of music fans worldwide"],"d":"260208","p":"규영","pp":true},{"w":"tech-savvy","m":"Well-informed about or proficient in the use of modern technology, especially computers and the internet.","ex":["To use OpenClaw, one has to install it on a server or local device and connect it to a large language model such as Anthropic’s Claude model or ChatGPT— a process that might be difficult for less tech-savvy users.","Companies are looking for tech-savvy employees who can quickly adapt to new AI tools"],"d":"260208","p":"규영","pp":true},{"w":"lethal trifecta","m":"A combination of three things that causes extreme damage, failure, or death. It describes a situation where three negative factors converge to create a \"perfect storm.\"","ex":["Security experts, however, have raised alarms. Cybersecurity firm Palo Alto Networks, for example, warned that the AI agent presents a “lethal trifecta” of risks stemming from its access to private data, exposure to untrusted content and ability to perform external communications while retaining memory.","High interest rates, rising inflation, and low consumer spending created a lethal trifecta that bankrupted many small businesses."],"d":"260208","p":"규영","pp":true},{"w":"upvote (downvote)","m":"An act of registering approval of or support for a post or comment on a social media site or forum, typically by clicking a specific icon (usually an upward-pointing arrow).","ex":["The platform functions like an online forum, similar to Reddit, where users’ OpenClaw agents post written content and interact with other chatbots through comments and upvotes or downvotes.","His explanation was so clear that it received over a thousand upvotes on Reddit."],"d":"260208","p":"규영","pp":true},{"w":"Plunge","m":"to fall or drop suddenly and sharply.","ex":["Gold and silver prices plunged Friday, as President Donald Trump’s nomination for the next chair of the Federal Reserve, Kevin Warsh, appeared to relieve concerns about the central bank’s independence and sent the dollar soaring.","Shares plunged 12% in early trading."],"d":"260201","p":"병찬","pp":true},{"w":"Silver futures","m":"contracts to buy or sell silver at a fixed price on a specific future date.","ex":["Silver futures plummeted 31.4% to settle at 78.53, marking its worst day since March 1980.","Silver futures rose 3% on inflation concerns."],"d":"260201","p":"병찬","pp":true},{"w":"gained steam","m":"to grow stronger, faster, or more popular over time.","ex":["However, they gained steam in afternoon U.S. trading as investors who piled into the metals raced to book profits.","Demand for EVs is gaining steam globally."],"d":"260201","p":"병찬","pp":true},{"w":"Piled into","m":"to move into it in large numbers, quickly and enthusiastically.","ex":["However, they gained steam in afternoon U.S. trading as investors who piled into the metals raced to book profits","Investors piled into tech stocks after the rally."],"d":"260201","p":"병찬","pp":true},{"w":"greenback","m":"the US dollar (USD).","ex":["metals would replace the greenback as the globe’s reserve currency.","The greenback strengthened against major currencies."],"d":"260201","p":"병찬","pp":true},{"w":"Front-runner","m":"the person, company, or option that is currently leading and most likely to win or succeed.","ex":["but Warsh became the front-runner in prediction markets in recent days.","She is the front-runner in the presidential race."],"d":"260201","p":"병찬","pp":true},{"w":"honorable discharge","m":"A release from military service with a favorable record. It indicates that the service member performed their duties satisfactorily and met or exceeded the required standards of conduct.","ex":["“It’s time to basically bring the Model S and X programs to an end with an honorable discharge,” Musk said.","He included his honorable discharge papers in his resume to show his discipline and commitment"],"d":"260201","p":"규영","pp":true},{"w":"slashed","m":"1. To greatly reduce an amount, price, or quantity.","ex":["After the original Roadster, the two models are Tesla’s oldest vehicles, and in recent years the company has slashed prices as global competition for electric vehicles has soared.","To survive the recession, the company decided to slash its advertising budget by 50%."],"d":"260201","p":"규영","pp":true},{"w":"bipedal","m":"Using only two legs for walking. It comes from the Latin words 'bi-' (meaning two) and 'ped-' (meaning foot).","ex":["Tesla is developing Optimus with the aim of someday selling it as a bipedal, intelligent robot capable of everything from factory work to babysitting.","Humans are the only bipedal primates that walk upright as their primary mode of movement"],"d":"260201","p":"규영","pp":true},{"w":"accounted for","m":"1. To form a particular amount or part of something.","ex":["Tesla’s far more popular models are the 3 and Y, which accounted for 97% of the company’s 1.59 million deliveries last year","In 2025, AI-related restructuring accounted for nearly 5% of all layoffs in the tech industry."],"d":"260201","p":"규영","pp":true},{"w":"Laud","m":"to praise someone or something highly and publicly","ex":["A landmark trade deal between the European Union and India has been lauded as a major breakthrough for Europe’s biggest carmakers, although analysts have flagged competition concerns in one of the world’s fastest growing markets.","The policy was widely lauded by experts."],"d":"260125","p":"병찬","pp":true},{"w":"Amid","m":"in the middle of / during / surrounded by something (usually something happening at the same time).","ex":["The long-pending agreement, which comes as both sides seek to strengthen ties amid U.S. tensions, includes slashing tariffs on imports of EU-made cars to 10% from as high as 110% under a quota of 250,000 vehicles per year.","She remained calm amid the chaos."],"d":"260125","p":"병찬","pp":true},{"w":"off by","m":"different from the correct or expected amount.","ex":["Europe’s Stoxx Automobiles and Parts index traded nearly 1% lower on the news, however, with Volkswagen, BMW and France’s Renault all off by around 1.3% during morning deals.","The estimate was off by 10%."],"d":"260125","p":"병찬","pp":true},{"w":"To be sure","m":"used to acknowledge a point as true before introducing a contrast, clarification, or limitation.","ex":["To be sure, India represents the world’s third-largest market for passenger cars worldwide and auto industry groups expect tax cuts, particularly for smaller vehicles, to stimulate the country’s market significantly in 2026.","To be sure, the results are encouraging, yet more data is needed."],"d":"260125","p":"병찬","pp":true},{"w":"in favour of","m":"supporting, approving of, or preferring something.","ex":["With this agreement, Europe is sending a clear signal in favour of rules-based trade and against the law of the jungle,” he added.","Lawmakers voted in favour of the bill."],"d":"260125","p":"병찬","pp":true},{"w":"boon","m":"something that is very helpful, beneficial, or advantageous.","ex":["‘A boon to European automakers’","Lower interest rates could be a boon for homebuyers."],"d":"260125","p":"병찬","pp":true},{"w":"crux","m":"the most important or decisive point of an issue; the core of the problem.","ex":["That’s the first thing and this is probably the crux of why they would do something like this at this point,” Hsiao told CNBC on Tuesday.","The crux of the issue is cost control."],"d":"260125","p":"병찬","pp":true},{"w":"obsolete","m":"No longer produced or used; out of date because something newer and better has been invented.","ex":["It’s ‘a fear of becoming obsolete’","With the rise of smartphones, standalone MP3 players have become almost obsolete"],"d":"260125","p":"규영","pp":true},{"w":"vex","m":"To annoy, frustrate, or worry someone,","ex":["Other therapists said the technology is also vexing their patients.","The question of how to balance the budget continued to vex the committee"],"d":"260125","p":"규영","pp":true},{"w":"go deeply into","m":"To examine, investigate, or explain something in great detail; to explore the complexities of a subject.","ex":["It goes deeply into questions of personal value, which is all very unsettling","We don't have enough time to go deeply into that issue today; let's discuss it next week"],"d":"260125","p":"규영","pp":true},{"w":"Underneath","m":"1. Directly below or beneath something else, often being covered by it.","ex":["Underneath these feelings is usually “a younger part that’s terrified of being left behind or not being ‘enough,’ and that fear gets amplified because the technology itself feels so fast and out of our control,”","I found my keys underneath the sofa cushions"],"d":"260125","p":"규영","pp":true},{"w":"grieve","m":"To feel or show great sorrow or distress, especially because of someone's death or a significant loss","ex":["Allow yourself to grieve and comfort the parts of you that feel shocked, hopeless and afraid right now","She is still grieving over the end of her ten-year marriage"],"d":"260125","p":"규영","pp":true},{"w":"disruptive","m":"1. Causing trouble and therefore stopping something from continuing as usual. (Negative)","ex":["But the disruptive and uncertain moment can also be a chance for reflection","AI is considered one of the most disruptive technologies of the 21st century."],"d":"260125","p":"규영","pp":true},{"w":"a sense of agency","m":"The subjective awareness that one is initiating, executing, and controlling one's own volitional actions in the world. It is the feeling of being in the \"driver's seat\" of your own life.","ex":["Learning enough about AI to understand where it genuinely alters work, and where it does not, often restores a sense of agency","People with a strong sense of agency tend to be more resilient when facing challenges"],"d":"260125","p":"규영","pp":true},{"w":"Drain","m":"Literal meaning: remove liquid","ex":["She advises writing down what's working in your life, what's draining you or no longer fits, and where are you running on autopilot.","The sink isn’t draining properly."],"d":"260118","p":"병찬","pp":true},{"w":"sets someone up for a fall","m":"“Set someone up” → put them in a particular situation","ex":["Promising yourself \"I'll always go for a run on a Wednesday\" or \"I'm never drinking again\" just sets you up for a fall.","Launching the product without proper testing sets the team up for a fall."],"d":"260118","p":"병찬","pp":true},{"w":"relapse","m":"to return to a bad condition or behavior after a period of improvement.","ex":["Plan for relapse","After months of recovery, he relapsed and started drinking again."],"d":"260118","p":"병찬","pp":true},{"w":"slip up","m":"to make a small mistake, usually unintentionally","ex":["If you slip up, \"the most helpful response is curiosity rather than criticism\" and instead of waiting for the following week or next month to start again, you should treat every day as a reset.","I slipped up and sent the email to the wrong person."],"d":"260118","p":"병찬","pp":true},{"w":"whereby","m":"\"By which\" or \"through which.\" It is a conjunction used to introduce a clause that explains how something is achieved or the method by which something happens.","ex":["The two companies noted they have entered into a multi-year contract whereby Apple will use Google’s Gemini model and cloud computing technology to power AI features.","They reached a deal whereby the company would be sold for 1 billion."],"d":"260118","p":"규영","pp":true},{"w":"tease"," paigns, or acquisitions.","The question caught him off guard."],"d":"260111","p":"병찬","pp":true},{"w":"Relentless drive","m":"an intense, continuous determination to achieve a goal, without giving up or slowing down","ex":["This “spirit” can manifest in various ways, such as innovative thinking, customer-centricity, and a relentless drive for excellence.","Her relentless drive pushed the company through the crisis."],"d":"260111","p":"병찬","pp":true},{"w":"Coalitions","m":"groups of different people, parties, or organizations that temporarily work together toward a common goal.","ex":["These coalitions can provide access to new markets, shared resources, and a stronger competitive position.","The party formed a coalition government."],"d":"260111","p":"병찬","pp":true},{"w":"Complacent","m":"being too satisfied with the current situation and therefore not trying to improve or prepare for risks.","ex":["A company that becomes too complacent or arrogant in its position of dominance may become vulnerable to competitors.","The company became complacent and lost market share."],"d":"260111","p":"병찬","pp":true},{"w":"differentiators","m":"Factors or characteristics that make a product, service, or company different from and better than its competitors.","ex":["NVIDIA's pivot toward AI at scale and AI systems as differentiators will help keep it way ahead of rivals","The main differentiators between these two models are battery life and camera quality."],"d":"260111","p":"규영","pp":true},{"w":"profound shift","m":"A deep, fundamental, and significant change in the way something is done, thought about, or organized.","ex":["Alpamayo represents a profound shift for NVIDIA, moving from being primarily a compute to a platform provider for physical AI ecosystems","The pandemic led to a profound shift in how people perceive remote work."],"d":"260111","p":"규영","pp":true},{"w":"long tail of the distribution","m":"The \"tail\" is the part of a list or graph where things happen very rarely. The \"long tail\" means there are so many of these rare things that they become a big problem (or opportunity) to handle","ex":["What they will find is that it's easy to get to 99% and then super hard to solve the long tail of the distribution.","Fixing the long tail of the distribution is hard because those problems only happen once in a year"],"d":"260111","p":"규영","pp":true},{"w":"overhyped","m":"To publicize or promote something excessively; so much that the actual quality or value does not meet the high expectations.","ex":["It became the first company to reach 5tn in October, but has lost value over concerns about whether demand AI is overhyped","Many people think that new smartphone is overhyped because it hasn't changed much from the last model"],"d":"260111","p":"규영","pp":true},{"w":"be about to","m":"To be on the point of doing something. to be ready to do something very soon","ex":["it tells you what it's going to do, and it reasons about what it's about to do","I was about to call you when you texted me"],"d":"260111","p":"규영","pp":true},{"w":"a close ally of","m":"someone or a group that has a strong, trusted, and cooperative relationship with X","ex":["Isaacman, a close ally of SpaceX CEO Elon Musk, told CNBC’s “Closing Bell Overtime” that Trump’s recommitment to exploring the moon is key to unlocking the “orbital economy.”","Japan is a close ally of the United States."],"d":"251228","p":"병찬","pp":true},{"w":"saga","m":"a long, complicated series of events, often involving conflict, problems, or drama.","ex":["Isaacman’s comments on Friday were some of his first public remarks since being confirmed to his position by the Senate last week, after a long saga throughout 2025.","The AI regulation saga is far from over."],"d":"251228","p":"병찬","pp":true},{"w":"Propel","m":"to push or drive something forward, often quickly or powerfully.","ex":["The campaign was propelled after Trump’s One Big Beautiful Bill Act allocated 9.9 billion to NASA earlier this year.","The engine propels the rocket into space."],"d":"251228","p":"병찬","pp":true},{"w":"water down","m":"To dilute: To make a liquid thinner or weaker by adding water.","ex":["EU waters down plans to end new petrol and diesel car sales by 2035","The government had to water down the new environmental regulations after facing pressure from big corporations"],"d":"251228","p":"규영","pp":true},{"w":"Lobby","m":"To try to persuade a politician, the government, or an official group that a particular law or situation should be changed or maintained.","ex":["Current rules state that new vehicles sold from that date should be \"zero emission\", but carmakers, particularly in Germany, have lobbied heavily for concessions.","Oil companies are lobbying against the new carbon tax bill"],"d":"251228","p":"규영","pp":true},{"w":"concessions (kənˈseSH(ə)n)","m":"A point that you willingly yield to the other side because you want to reach a deal.","ex":["Current rules state that new vehicles sold from that date should be \"zero emission\", but carmakers, particularly in Germany, have lobbied heavily for concessions.","The labor union won several concessions from the management regarding working hours"],"d":"251228","p":"규영","pp":true},{"w":"undermine","m":"To weaken something secretly or gradually from the base","ex":["Opponents of the move have warned that it risks undermining the transition towards electric vehicles and leaving the EU exposed in the face of foreign competition.","The high price of the new model might undermine its sales potential"],"d":"251228","p":"규영","pp":true},{"w":"breathing space","m":"A pause in a difficult situation that allows you to recover or think.","ex":["Policy makers must provide breathing space to manufacturers to sustain jobs, innovation and investments","We need some breathing space to evaluate the results before making a final decision"],"d":"251228","p":"규영","pp":true},{"w":"sound","m":"Financially secure: (Business) Robust, stable, and not ct","m":"a good or service that serves a specific, small, and specialized market segment.","ex":["And Apple’s expensive Vision Pro headset, the first new computing category the company has introduced since the decade-old Apple Watch, is still a niche product.","Although it's a niche product, its high profit margin makes it a good business for us."],"d":"251207","p":"규영","pp":true},{"w":"juggernaut","m":"a massive, inexorable force or object that crushes everything in its path. In a figurative sense, it refers to a huge, powerful, and overwhelming organization, campaign, or movement that cannot be stopped.","ex":["The iPhone is still a juggernaut","The team has become an unstoppable juggernaut after winning five consecutive championships."],"d":"251207","p":"규영","pp":true},{"w":"rip the Band-Aid off","m":"to do something that is going to be painful, difficult, or unpleasant quickly, rather than delaying it and drawing out the agony.","ex":["This is against the typical culture of Apple. But they need to rip the Band-Aid off","I know telling him he's laid off will be tough, but you just have to rip the Band-Aid off and do it today."],"d":"251207","p":"규영","pp":true},{"w":"cogs in a wheel","m":"an individual who is just one small part of a much larger system or organization, and not very important by themselves.","ex":["His 2015 Ted Talk ‘The way we think about work is broken’ implored listeners to stop thinking about employees as simply cogs in a wheel and look for a deeper meaning to try and make work more satisfying.","I feel like just a cog in a wheel at this company."],"d":"251202","p":"병찬","pp":true},{"w":"signpost","m":"to clearly indicate, highlight, or point out something so people can understand what is coming next.","ex":["They climb the ladder and see it as an experience of progress and growth, signposted by promotions, pay rises and more responsibility.","The report signposted the key risks in the next section."],"d":"251202","p":"병찬","pp":true},{"w":"permeate","m":"to spread through something, to exist everywhere inside it, or to deeply influence it.","ex":["employees should feel that they are contributing to a powerful, overarching mission, that should permeate through their everyday tasks so they feel as though they are part of something bigger than themselves."],"d":"251202","p":"병찬","pp":true},{"w":"Deadly (Inflected form: deadlier; deadliest)","m":"Adj. Causing or likely to cause death. Extremely dangerous.","ex":["Hong Kong has suffered its deadliest fire in decades","The deadliest strain of the virus has spread rapidly across the globe."],"d":"251202","p":"규영","pp":true},{"w":"blaze","m":"To burn fiercely and brightly.","ex":["Wan watched television in his home, unaware of the danger blazing his way","The forest fire continued to blaze out of control."],"d":"251202","p":"규영","pp":true},{"w":"engulf","m":"To completely surround or cover something; to overwhelm.","ex":["Throughout the next few hours, horrified onlookers watched as the complex – home to more than 4,000 people, many of them elderly – rapidly became engulfed in flames","The massive waves quickly engulfed the small boat."],"d":"251202","p":"규영","pp":true},{"w":"devastation","m":"Severe and widespread destruction or ruin; great desolation or overwhelming grief.","ex":["By nightfall, the scale of the devastation was becoming clear.","The earthquake caused widespread devastation throughout the coastal region."],"d":"251202","p":"규영","pp":true},{"w":"fend off","m":"to defend yourself from something / to prevent something unpleasant or unwanted","ex":["driven by investor confidence in its ability to fend off the threat from OpenAI, the developer of ChatGPT.","The company managed to fend off a hostile takeover."],"d":"251123","p":"병찬","pp":true},{"w":"slippage","m":"a delay or shortfall compared to the planned schedule or target","ex":["While the company maintains its target of reaching net zero emissions by 2030, the CEO acknowledges there will be slippage, saying","We need to minimize schedule slippage in mass production."],"d":"251123","p":"병찬","pp":true},{"w":"Yet","m":"“However” / “Nevertheless” / “But still” → It connects two contrasting ideas.","ex":["These chips form the computational backbone of AI systems, processing the vast calculations required to train and run machine learning models. Yet questions about market sustainability continue to mount.","Consumer spending is rising again. Yet questions about economic stability persist."],"d":"251123","p":"병찬","pp":true},{"w":"flurry","m":"n. a brief and light snowfall","ex":["Saudi Arabia is strengthening its ties with American AI companies — announcing a flurry of new joint ventures worth billions of dollars.","The company announced a flurry of new partnerships this month."],"d":"251123","p":"규영","pp":true},{"w":"de facto","m":"Existing or being something in fact, although not officially recognized or legally established.","ex":["The country seeks to make its mark in the AI industry as its de facto leader, Crown Prince Mohamed bin Salman, makes his first visit to the United States in years.","She was the de facto manager, even though she didn’t have the title."],"d":"251123","p":"규영","pp":true},{"w":"sovereign","m":"n. A supreme ruler, especially a king or queen.","ex":["Humain — an AI company backed by Saudi Arabia’s sovereign wealth fund — announced a series of partnerships with prominent American tech companies","The sovereign addressed the nation during the crisis."],"d":"251123","p":"규영","pp":true},{"w":"firm up","m":"To make something more definite, clear, or settled.","ex":["Saudi Arabia is trying to further firm up ties with the United States and shift its economy away from oil.","They are still trying to firm up the details of the agreement."],"d":"251123","p":"규영","pp":true},{"w":"redemption","m":"The act of saving or being saved from sin, error, or evil.","ex":["The investment from Saudi Arabia also plays a major part in Prince bin Salman’s redemption in the United States","He sought redemption for his past mistakes."],"d":"251123","p":"규영","pp":true},{"w":"leap","m":"a common metaphor meaning a big or sudden improvement, change, or move forward.","ex":["The next leap in telecom isn’t just from 5G to 6G - it’s a fundamental redesign of the network to deliver AI-powered connectivity, capable of processing intelligence from the data centre all the way to the edge.","Our company made a major leap in productivity after adopting AI tools."],"d":"251116","p":"병찬","pp":true},{"w":"matters","m":"means “is important” or “has significance.”","ex":["This architecture matters because it reduces latency for applications that cannot tolerate delays","Every second matters in emergency response."],"d":"251116","p":"병찬","pp":true},{"w":"A significant step forward","m":"an important improvement, progress, or advancement toward a goal.","ex":["Renewing our 5G partnership with Nokia marks a significant step forward in delivering seamless, high-performance connectivity to our customers.","This agreement marks a significant step forward in our partnership."],"d":"251116","p":"병찬","pp":true},{"w":"on the horizon","m":"Likely to happen soon; expected in the near future.","ex":["the artificial intelligence industry’s data centers are increasingly a target for blame with U.S. mid-term elections on the horizon.","With new technologies on the horizon, the industry is preparing for big changes."],"d":"251116","p":"규영","pp":true},{"w":"Harbinger","m":"Something that foreshadows or announces what is to come.","ex":["The governor’s race could be a harbinger of political headwinds for the AI industry’s data center buildout with the mid-term elections just a year away","Dark clouds are often a harbinger of a coming storm."],"d":"251116","p":"규영","pp":true},{"w":"affordability","m":"The degree to which something is affordable;","ex":["It is an extremely large component of the affordability crisis we’re experiencing right now","We need to consider the affordability of the project before approving it."],"d":"251116","p":"규영","pp":true},{"w":"heighten","m":"","ex":["Fears of an artificial intelligence bubble have heightened this week after U.S. technology shares slumped.","The news heightened public anxiety."],"d":"251109","p":"병찬","pp":true},{"w":"wobble","m":"","ex":["This week’s equity market wobble, which saw a retreat in U.S. artificial intelligence-related stocks amid ongoing concerns over stretched valuations, has thrust contagion fears into the spotlight for global investors.","The chair wobbled when I sat on it."],"d":"251109","p":"병찬","pp":true},{"w":"alert","m":"Being watchful, quick to notice things, or ready to act.","ex":["We have to be very alert to these risks,” Bailey said","The guards are on alert for any suspicious activity."],"d":"251109","p":"병찬","pp":true},{"w":"loom","m":"to appear as a large, unclear, or threatening shape; to seem likely to happen soon, often in a worrying way.","ex":["Why human-shaped robots loom large in Musk's Tesla plans","The deadline is looming, so we need to finish the project quickly."],"d":"251109","p":"규영","pp":true},{"w":"whopping","m":"extremely large; surprisingly big in size, amount, or degree.","ex":["One of the many tasks Musk must complete to get his whopping pay deal is to deliver a million AI bots over the next decade.","The company reported a whopping 30% increase in sales this year."],"d":"251109","p":"규영","pp":true},{"w":"dexterity","m":"the ability to use your hands or body skillfully and quickly.","ex":["Forrester analyst Brian Hopkins said the falling costs of components, combined with improvements to robot dexterity and AI, was helping to make humanoid robots feasible for a variety of different settings.","Her dexterity with the violin impressed everyone."],"d":"251109","p":"규영","pp":true},{"w":"major blow","m":"an idiomatic expression that means a serious setback, loss, or negative impact — often sudden and significant.","ex":["Iranian offi
