<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">

<title>주간 영어 표현</title>
<style>
  :root{ --bg:#0f1115; --card:#1b1f29; --line:#2a3040; --txt:#e8ecf4; --sub:#9aa4b8;
         --pp:#9900ff; --ppbg:#241033; --ok:#10b981; --okbg:#0c3324; --accent:#3b82f6; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    font-size:17px;line-height:1.6;}
  .wrap{max-width:640px;margin:0 auto;padding:16px 14px 60px;}
  h1{font-size:19px;margin:0 0 2px;font-weight:700;}
  .subttl{color:var(--sub);font-size:13px;margin-bottom:12px;}
  .banner{font-size:12px;border-radius:8px;padding:8px 11px;margin-bottom:14px;}
  .banner.local{background:#3a2a10;color:#f4c77a;border:1px solid #6b4e1a;}
  .banner.shared{background:var(--okbg);color:#8ff0c4;border:1px solid #14513a;}
  .sec{font-size:13px;color:var(--sub);margin:20px 2px 8px;font-weight:600;letter-spacing:.02em;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;}
  .wcard{border-left:4px solid var(--pp);}
  .wtag{display:inline-block;background:var(--ppbg);color:#d7a6ff;font-size:11px;
    padding:2px 8px;border-radius:20px;margin-bottom:8px;}
  .word{font-size:22px;font-weight:800;color:#fff;margin:0 0 6px;}
  .mean{font-size:15px;color:#cdd5e3;margin:0 0 10px;}
  .ex{font-size:14.5px;color:#aeb8ca;background:#12161f;border-radius:8px;padding:9px 11px;
    border-left:3px solid var(--accent);}
  .ex b{color:#cfe0ff;font-weight:600;}
  .checkrow{display:flex;gap:10px;margin-top:6px;}
  .cbtn{flex:1;border-radius:14px;padding:16px 10px;font-size:16px;font-weight:700;
    border:1.5px solid var(--line);background:#222838;color:var(--txt);cursor:pointer;transition:.12s;}
  .cbtn:active{transform:scale(.98);}
  .cbtn.done{background:var(--okbg);border-color:var(--ok);color:#8ff0c4;}
  .cbtn .st{display:block;font-size:12px;font-weight:500;color:var(--sub);margin-top:3px;}
  .cbtn.done .st{color:#6bd3a6;}
  .tracker{margin-bottom:12px;}
  .thead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .tname{font-weight:700;font-size:16px;}
  .ttot{font-size:14px;color:var(--sub);}
  .ttot b{color:var(--ok);font-size:17px;}
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .day{aspect-ratio:1;border-radius:10px;border:1px solid var(--line);background:#181c25;
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:var(--sub);}
  .day .dn{font-size:10px;opacity:.7;}
  .day.done{background:var(--okbg);border-color:var(--ok);color:#8ff0c4;}
  .day.today{outline:2px solid var(--accent);outline-offset:0;}
  .bar{height:6px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:8px;}
  .bar>i{display:block;height:100%;background:var(--ok);width:0;transition:.25s;}
  .pvtoggle{width:100%;border:1px dashed var(--line);background:transparent;color:var(--sub);
    border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;}
  .pvcard{background:#161922;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;opacity:.92;}
  .pvword{font-size:17px;font-weight:700;color:#e8ecf4;}
  .pvmean{font-size:13px;color:var(--sub);margin-top:2px;}
  .foot{font-size:11px;color:var(--sub);text-align:center;margin-top:24px;line-height:1.7;}
  a{color:var(--accent);}
</style>
</head>

obe, towards the back and lower side of the brain.","e":"a part of the brain called the inferior parietal region","d":"250406","p":"규영","pp":false},{"w":"synthesize","m":"to make (something) by combining different things","e":"That part of the brain synthesizes sensory information","d":"250406","p":"규영","pp":false},{"w":"neurodegeneration","m":"the gradual loss or damage of neurons (nerve cells) in the brain or spinal cord. This process can lead to the decline of cognitive, motor, or sensory functions","e":"it makes sense that it shows neurodegeneration early in the disease","d":"250406","p":"규영","pp":false},{"w":"infant","m":"a very young child, baby","e":"infants can spend about 50% of their sleep in REM.","d":"250406","p":"규영","pp":false},{"w":"Sleep hygiene","m":"habits and practices that are conducive to sleeping well on a regular basis","e":"The good news is that you can easily train your brain to better sleepby following what is called “sleep hygiene.”","d":"250406","p":"규영","pp":false},{"w":"Optimal","m":"Best or most effective","e":"Make sure your sleeping environment is optimal","d":"250406","p":"규영","pp":true},{"w":"booze","m":"to drink a lot of alcohol","e":"Avoid booze before bed","d":"250406","p":"규영","pp":false},{"w":"Metabolize","m":"to change (food) into a form that can be used by your body; to process and use (substances brought into your body) by metabolism","e":"When your liver finishs metabolizing the alcohol at 3 a.m.","d":"250406","p":"규영","pp":false},{"w":"benevolence","m":"refers to the quality of being kind, helpful, and generous. It embodies a disposition to do good and act charitably toward others","e":"This year’s report paid special attention to acts of benevolence and people’s expectations of their communities.","d":"250330","p":"병찬","pp":false},{"w":"Doer","m":"someone who takes action, gets things done, and doesn’t just talk or plan — they follow through and make things happen.","e":"There is evidence that doing nice things helps both the recipient and the doer feel happier","d":"250330","p":"병찬","pp":false},{"w":"generosity","m":"a noun that refers to the willingness to give or share, especially freely and unselfishly, whether it’s money, time, help, kindness, or resources.","e":"Acts of generosity predict happiness even more than earning a higher salary","d":"250330","p":"병찬","pp":false},{"w":"By and large","m":"is an idiom that means \"in general\", \"for the most part\", or \"overall.\" It’s used when you want to summarize or give a general impression, even if there are a few exceptions.","e":"By and large, we find in almost all of our studies that people randomly assigned to spend generously report feeling higher levels of happiness than people who spend on themselves.","d":"250330","p":"병찬","pp":false},{"w":"Cudgel","m":"to hit (someone or something) with a club","e":"Tariffs are considered by many economists a political cudgel — sometimes used in a trade war — and not an efficient framework for international trade.","d":"250330","p":"규영","pp":false},{"w":"the late","m":"\"The late\" is an adjective used before a person's name to indicate that they have passed away. It is a respectful way to refer to someone who is deceased.","e":"The segment focused on the late Katharine Graham","d":"250330","p":"규영","pp":false},{"w":"The Oracle of Omaha","m":"a person (such as a priestess) through whom a god was believed to speak","e":"The Oracle of Omaha said it’s critical to ask, “And then what?” when thinking about the implications of tariffs and who will bear the cost.","d":"250330","p":"규영","pp":false},{"w":"Implication","m":"a possible future effect or result","e":"The Oracle of Omaha said it’s critical to ask, “And then what?” when thinking about the implications of tariffs and who will bear the cost.","d":"250330","p":"규영","pp":false},{"w":"amass","m":"To collect or gather a large amount of something over time","e":"Berkshire amassed its cash and cash equivalents to a record 334.2 billion in the ous thoughts about the future.","d":"250309","p":"병찬","pp":true},{"w":"Mark a turning point","m":"an event or moment represents a significant change, shift, or transition in a situation, history, or someone’s life. It is often used to describe critical moments that lead to a new direction or development.","e":"Why DeepSeek could mark a turning point for Silicon Valley on AI","d":"250209","p":"병찬","pp":false},{"w":"Be coming to grips","m":"gradually understanding, accepting, or dealing with a difficult situation or problem. It suggests an ongoing process of learning, adjusting, or managing something challenging.","e":"Silicon Valley is coming to grips this week with the realization that creating an advanced artificial intelligence model may no longer be as specialized a task as was once believed.","d":"250209","p":"병찬","pp":true},{"w":"more or less on par with","m":"something is approximately equal to, similar to, or at the same level as something else, but with some minor differences. It suggests near equivalence rather than an exact match.","e":"The wakeup call came in the form of DeepSeek, a year-old Chinese start-up whose free, open-source AI model, R1, is more or less on par with advanced models from American tech giants","d":"250209","p":"병찬","pp":false},{"w":"throw more resources","m":"to allocate or invest additional resources (such as money, time, people, or effort) into something in an attempt to improve or solve a problem. It often implies an urgent or reactive approach to dealing with challenges.","e":"they could throw more resources at the problem than anyone else and come out on top.","d":"250209","p":"병찬","pp":true},{"w":"Be committed to","m":"to be dedicated, devoted, or fully engaged in doing something. It expresses a strong promise, responsibility, or determination to achieve a goal or fulfill an obligation.","e":"We’re committed to moving really quickly here. We want to stay ahead.","d":"250209","p":"병찬","pp":true},{"w":"malfeasance","m":"wrongful, e quality of being full of energy, excitement, and cheerfulness; ebullience","e":"highly irrational exuberance","d":"250119","p":"규영","pp":false},{"w":"adoration","m":"deep love and respect","e":"outright adoration of the subject companies or assets","d":"250119","p":"규영","pp":false}];

// ===== 공유 저장 (Firebase Realtime DB) =====
const DB_URL = "https://english-study-78cd3-default-rtdb.firebaseio.com";

const PEOPLE = [{key:'kyuyoung',label:'규영'},{key:'byungchan',label:'병찬'}];
const DOW = ['월','화','수','목','금','토','일'];
const $=s=>document.querySelector(s);

function isoWeek(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=(t.getUTCDay()+6)%7;
  t.setUTCDate(t.getUTCDate()-day+3);
  const y=t.getUTCFullYear();
  const jan4=new Date(Date.UTC(y,0,4));
  const wk=1+Math.round(((t-jan4)/86400000-3+((jan4.getUTCDay()+6)%7))/7);
  return {year:y, week:wk, key:y+'-W'+String(wk).padStart(2,'0')};
}
function dayIdx(d){ return (d.getDay()+6)%7; }
function hashStr(s){let h=1779033703^s.length;for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return (h^h>>>16)>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
function pickWeekly(key,n){
  const rnd=mulberry32(hashStr(key));
  const idx=[...WORDS.keys()];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  return idx.slice(0,n).map(i=>WORDS[i]);
}

const SHARED=!!DB_URL;
async function loadWeek(weekKey){
  if(SHARED){
    try{const r=await fetch(`${DB_URL}/checks/${weekKey}.json`);const j=await r.json();return j||{};}
    catch(e){console.warn(e);return {};}
  }else{ return JSON.parse(localStorage.getItem('ww_'+weekKey)||'{}'); }
}
async function saveCheck(weekKey,person,di,val){
  if(SHARED){
    await fetch(`${DB_URL}/checks/${weekKey}/${person}/${di}.json`,
      {method:'PUT',body:JSON.stringify(val?true:null)});
  }else{
    const k='ww_'+weekKey;const o=JSON.parse(localStorage.getItem(k)||'{}');
    o[person]=o[person]||{};
    if(val)o[person][di]=true; else delete o[person][di];
    localStorage.setItem(k,JSON.stringify(o));
  }
}

const now=new Date();
const wk=isoWeek(now);
const nextDate=new Date(now); nextDate.setDate(nextDate.getDate()+7);
const nextWk=isoWeek(nextDate);
const today=dayIdx(now);
let state={};

function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function highlight(ex,w){
  const word=(w.split('(')[0].trim().split(' ')[0])||w;
  if(!word) return esc(ex);
  try{return esc(ex).replace(new RegExp('('+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<b>$1</b>');}
  catch(e){return esc(ex);}
}
function fmtDate(d){return d.replace(/(\d\d)(\d\d)(\d\d)/,'$1.$2.$3');}
function renderWords(){
  const ws=pickWeekly(wk.key,3);
  $('#words').innerHTML=ws.map(w=>`
    <div class="card wcard">
      <span class="wtag">${w.p} · ${fmtDate(w.d)}</span>
      <p class="word">${esc(w.w)}</p>
      ${w.m?`<p class="mean">${esc(w.m)}</p>`:''}
      ${w.e?`<div class="ex">${highlight(w.e,w.w)}</div>`:''}
    </div>`).join('');
}
function renderPreview(){
  const ws=pickWeekly(nextWk.key,3);
  $('#preview').innerHTML=ws.map(w=>`
    <div class="pvcard"><div class="pvword">${esc(w.w)}</div>
      ${w.m?`<div class="pvmean">${esc(w.m)}</div>`:''}</div>`).join('')
    +`<div class="subttl" style="margin:2px 2px 0">${nextWk.year}년 ${nextWk.week}주차 · 월요일부터 적용</div>`;
}
function checkedDays(person){const o=state[person]||{};return Object.keys(o).filter(k=>o[k]).length;}
function renderChecks(){
  $('#checks').innerHTML=PEOPLE.map(p=>{
    const done=!!(state[p.key]&&state[p.key][today]);
    return `<button class="cbtn ${done?'done':''}" data-p="${p.key}">
      ${done?'✅':'⬜'} ${p.label}<span class="st">${done?'오늘 완료':'오늘 완료 체크'}</span></button>`;
  }).join('');
  document.querySelectorAll('#checks .cbtn').forEach(b=>b.onclick=async()=>{
    const pk=b.dataset.p;const cur=!!(state[pk]&&state[pk][today]);
    state[pk]=state[pk]||{};
    if(cur)delete state[pk][today]; else state[pk][today]=true;
    render();
    await saveCheck(wk.key,pk,today,!cur);
  });
}
function renderTrackers(){
  $('#trackers').innerHTML=PEOPLE.map(p=>{
    const o=state[p.key]||{};const tot=checkedDays(p.key);
    const cells=DOW.map((dn,i)=>{
      const done=!!o[i];
      return `<div class="day ${done?'done':''} ${i===today?'today':''}">
        <span class="dn">${dn}</span>${done?'✓':''}</div>`;}).join('');
    return `<div class="card tracker">
      <div class="thead"><span class="tname">${p.label}</span>
        <span class="ttot"><b>${tot}</b> / 7 일</span></div>
      <div class="days">${cells}</div>
      <div class="bar"><i style="width:${tot/7*100}%"></i></div>
    </div>`;
  }).join('');
}
function render(){renderChecks();renderTrackers();}

$('#pvToggle').onclick=()=>{
  const p=$('#preview'); const open=p.style.display!=='none';
  p.style.display=open?'none':'block';
  $('#pvToggle').innerHTML='다음 주 표현 미리보기 '+(open?'▼':'▲');
};

async function init(){
  $('#weekLabel').textContent=`${wk.year}년 ${wk.week}주차 · ${now.getMonth()+1}월 ${now.getDate()}일 (${DOW[today]})`;
  $('#todayLabel').textContent=`오늘: ${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} (${DOW[today]})  —  각자 하루 1회 체크`;
  $('#banner').className='banner '+(SHARED?'shared':'local');
  $('#banner').textContent=SHARED?'🔗 공유 저장 켜짐 — 규영·병찬 체크가 함께 반영됩니다.'
    :'⚠️ 로컬 저장 모드 — 이 기기에만 기록됩니다.';
  $('#foot').innerHTML='표현 '+WORDS.length+'개 풀에서 매주 랜덤 3개 · 월요일 자동 리셋<br>주간 누적은 해당 주차에만 집계됩니다.';
  renderWords(); renderPreview();
  state=await loadWeek(wk.key);
  render();
}
init();
</script>
