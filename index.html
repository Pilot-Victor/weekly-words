const DB_URL = "https://english-study-78cd3-default-rtdb.firebaseio.com";
const PEOPLE = [{key:'kyuyoung',label:'규영'},{key:'byungchan',label:'병찬'}];
const DOW = ['월','화','수','목','금','토','일'];
const $=s=>document.querySelector(s);

function isoWeek(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=(t.getUTCDay()+6)%7;
  t.setUTCDate(t.getUTCDate()-day+3);
  const y=t.getUTCFullYear();
  const jan4=new Date(Date.UTC(y,0,4));
  const wk=1+Math.round(((t-jan4)/86400000-3+((jan4.getUTCDay()+6)%7))/7);
  return {year:y, week:wk, key:y+'-W'+String(wk).padStart(2,'0')};
}
function dayIdx(d){ return (d.getDay()+6)%7; }
function hashStr(s){let h=1779033703^s.length;for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return (h^h>>>16)>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
function pickWeekly(key,n){
  const rnd=mulberry32(hashStr(key));
  const idx=[...WORDS.keys()];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  return idx.slice(0,n).map(i=>WORDS[i]);
}

const SHARED=!!DB_URL;
async function loadWeek(weekKey){
  if(SHARED){
    try{const r=await fetch(`${DB_URL}/checks/${weekKey}.json`);return (await r.json())||{};}
    catch(e){return {};}
  } return JSON.parse(localStorage.getItem('ww_'+weekKey)||'{}');
}
async function loadAll(){
  if(SHARED){
    try{const r=await fetch(`${DB_URL}/checks.json`);return (await r.json())||{};}
    catch(e){return {};}
  }
  const all={};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);
    if(k.startsWith('ww_')) all[k.slice(3)]=JSON.parse(localStorage.getItem(k)||'{}');}
  return all;
}
async function saveCheck(weekKey,person,di,val){
  if(SHARED){
    await fetch(`${DB_URL}/checks/${weekKey}/${person}/${di}.json`,
      {method:'PUT',body:JSON.stringify(val?true:null)});
  }else{
    const k='ww_'+weekKey;const o=JSON.parse(localStorage.getItem(k)||'{}');
    o[person]=o[person]||{}; if(val)o[person][di]=true; else delete o[person][di];
    localStorage.setItem(k,JSON.stringify(o));
  }
}

const now=new Date();
const wk=isoWeek(now);
const nextDate=new Date(now); nextDate.setDate(nextDate.getDate()+7);
const nextWk=isoWeek(nextDate);
const today=dayIdx(now);
let state={};

function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function highlight(ex,w){
  const word=(w.split('(')[0].trim().split(' ')[0])||w;
  if(!word) return esc(ex);
  try{return esc(ex).replace(new RegExp('('+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<b>$1</b>');}
  catch(e){return esc(ex);}
}
function fmtDate(d){return d.replace(/(\d\d)(\d\d)(\d\d)/,'$1.$2.$3');}
function renderWords(){
  const ws=pickWeekly(wk.key,5);
  $('#words').innerHTML=ws.map((w,i)=>`
    <div class="card wcard" data-i="${i}">
      <span class="wtag">${w.p} · ${fmtDate(w.d)}</span>
      <div class="wordrow"><p class="word">${esc(w.w)}</p><span class="wexp" id="wexp${i}">＋ 예문</span></div>
      <div class="wbody" id="wbody${i}" style="display:none">
        ${w.m?`<p class="mean">${esc(w.m)}</p>`:''}
        ${(w.ex&&w.ex.length)?w.ex.map(e=>`<div class="ex">${highlight(e,w.w)}</div>`).join(''):'<div class="ex" style="color:var(--sub)">예문이 없습니다</div>'}
      </div>
    </div>`).join('');
  document.querySelectorAll('#words .wcard').forEach(c=>c.onclick=()=>{
    const i=c.dataset.i, b=$('#wbody'+i), t=$('#wexp'+i);
    const open=b.style.display!=='none';
    b.style.display=open?'none':'block';
    t.textContent=open?'＋ 예문':'－ 접기';
    c.classList.toggle('open',!open);
  });
}
function renderPreview(){
  $('#preview').innerHTML=pickWeekly(nextWk.key,5).map(w=>`
    <div class="pvcard"><div class="pvword">${esc(w.w)}</div>
      ${w.m?`<div class="pvmean">${esc(w.m)}</div>`:''}</div>`).join('')
    +`<div class="subttl" style="margin:2px 2px 0">${nextWk.year}년 ${nextWk.week}주차 · 월요일부터 적용</div>`;
}
function checkedDays(o){return o?Object.keys(o).filter(k=>o[k]).length:0;}
function renderChecks(){
  $('#checks').innerHTML=PEOPLE.map(p=>{
    const done=!!(state[p.key]&&state[p.key][today]);
    return `<button class="cbtn ${done?'done':''}" data-p="${p.key}">
      ${done?'✅':'⬜'} ${p.label}<span class="st">${done?'오늘 완료':'오늘 완료 체크'}</span></button>`;
  }).join('');
  document.querySelectorAll('#checks .cbtn').forEach(b=>b.onclick=async()=>{
    const pk=b.dataset.p;const cur=!!(state[pk]&&state[pk][today]);
    state[pk]=state[pk]||{}; if(cur)delete state[pk][today]; else state[pk][today]=true;
    renderStudy(); await saveCheck(wk.key,pk,today,!cur);
  });
}
function renderTrackers(){
  $('#trackers').innerHTML=PEOPLE.map(p=>{
    const tot=checkedDays(state[p.key]);
    const cells=DOW.map((dn,i)=>{const done=!!(state[p.key]&&state[p.key][i]);
      return `<div class="day ${done?'done':''} ${i===today?'today':''}"><span class="dn">${dn}</span>${done?'✓':''}</div>`;}).join('');
    return `<div class="card tracker"><div class="thead"><span class="tname">${p.label}</span>
        <span class="ttot"><b>${tot}</b> / 7 일</span></div>
      <div class="days">${cells}</div><div class="bar"><i style="width:${tot/7*100}%"></i></div></div>`;
  }).join('');
}
function renderStudy(){renderChecks();renderTrackers();}

// ---- 달력 ----
let calY=now.getFullYear(), calM=now.getMonth(); // 0-based
let allChecks={};
function isChecked(date,pkey){
  const w=isoWeek(date).key, di=dayIdx(date);
  return !!(allChecks[w]&&allChecks[w][pkey]&&allChecks[w][pkey][di]);
}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function renderCalendar(){
  $('#calMonth').textContent=`${calY}년 ${calM+1}월`;
  const dim=daysInMonth(calY,calM);
  const startCol=dayIdx(new Date(calY,calM,1));
  let cells='';
  for(let i=0;i<startCol;i++) cells+=`<div class="cell empty"></div>`;
  const isCur=(calY===now.getFullYear()&&calM===now.getMonth());
  for(let d=1;d<=dim;d++){
    const date=new Date(calY,calM,d), di=dayIdx(date);
    const isToday=isCur&&d===now.getDate();
    const kc=isChecked(date,'kyuyoung'), bc=isChecked(date,'byungchan');
    const cls=(di===6?'sun':di===5?'sat':'');
    cells+=`<div class="cell ${cls} ${isToday?'today':''}">
      <span class="cd">${d}</span>
      <div class="badges">
        <span class="pb ${kc?'kon':''}">규</span>
        <span class="pb ${bc?'bon':''}">병</span>
      </div></div>`;
  }
  $('#calGrid').innerHTML=cells;
  // 진척률: 이번 달(경과일 기준), 지난 달은 전체일 기준
  const denom=isCur?now.getDate():dim;
  $('#calProg').innerHTML=PEOPLE.map(p=>{
    let cnt=0;
    for(let d=1;d<=dim;d++) if(isChecked(new Date(calY,calM,d),p.key)) cnt++;
    const pct=denom?Math.round(cnt/denom*100):0;
    const cc=p.key==='kyuyoung'?'kyu':'byc';
    return `<div class="pcard ${cc}"><div class="n">${p.label}</div>
      <div class="v"><b>${cnt}</b> / ${denom}일 · ${pct}%</div>
      <div class="bar"><i style="width:${pct}%"></i></div></div>`;
  }).join('');
}
async function refreshCalendar(){ allChecks=await loadAll(); renderCalendar(); }

$('#calPrev').onclick=()=>{calM--;if(calM<0){calM=11;calY--;}renderCalendar();};

const VAPID_PUBLIC="BHmM-uGEir8XPz8wZFQN8gTDD1icJWIXcFVD-OK6FtY38zcD3OC1RAfldCVoca9snq1cWPbpWunbUSLUskP3JzU";
function urlB64ToU8(base64){const pad="=".repeat((4-base64.length%4)%4);const b=(base64+pad).replace(/-/g,"+").replace(/_/g,"/");const raw=atob(b);const arr=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);return arr;}
async function enableNotif(){
  if(!("serviceWorker" in navigator)||!("PushManager" in window)||!("Notification" in window)){
    alert("이 환경에서는 웹푸시를 쓸 수 없습니다.\n아이폰은 Safari 공유 → \"홈 화면에 추가\" 후, 홈 화면 아이콘으로 열어 다시 시도하세요.");return;}
  try{
    const reg=await navigator.serviceWorker.register("sw.js");
    await navigator.serviceWorker.ready;
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){alert("알림 권한이 허용되지 않았습니다.");return;}
    let sub=await reg.pushManager.getSubscription();
    if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToU8(VAPID_PUBLIC)});
    const j=sub.toJSON();
    const id=""+hashStr(j.endpoint);
    if(SHARED)await fetch(`${DB_URL}/pushSubs/${id}.json`,{method:"PUT",body:JSON.stringify({sub:j,ts:Date.now()})});
    const btn=document.getElementById("notifBtn");
    btn.textContent="🔔 알림 켜짐";btn.classList.add("done");
    setTimeout(()=>{try{reg.showNotification("📚 알림이 켜졌어요",{body:"매일 이 시간대에 리마인드를 보냅니다.",icon:"icon-192.png"});}catch(_){}},400);
  }catch(e){alert("알림 설정 실패: "+(e&&e.message||e));}
}
function setupNotif(){
  const btn=document.getElementById("notifBtn");
  if(!("serviceWorker" in navigator)||!("PushManager" in window)){
    btn.textContent="미지원";btn.disabled=true;btn.style.opacity=".5";return;}
  navigator.serviceWorker.register("sw.js").then(async reg=>{
    const s=await reg.pushManager.getSubscription();
    if(s&&Notification.permission==="granted"){btn.textContent="🔔 알림 켜짐";btn.classList.add("done");}
  }).catch(()=>{});
  btn.onclick=enableNotif;
}
