<head>
<meta charset="utf-8">

<style>
  :root{ --bg:#0f1115; --card:#1b1f29; --line:#2a3040; --txt:#e8ecf4; --sub:#9aa4b8;
         --pp:#9900ff; --ppbg:#241033; --ok:#10b981; --okbg:#0c3324; --accent:#3b82f6; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    font-size:17px;line-height:1.6;}
  .wrap{max-width:640px;margin:0 auto;padding:16px 14px 60px;}
  h1{font-size:19px;margin:0 0 2px;font-weight:700;}
  .subttl{color:var(--sub);font-size:13px;margin-bottom:12px;}
  .banner{font-size:12px;border-radius:8px;padding:8px 11px;margin-bottom:14px;}
  .banner.local{background:#3a2a10;color:#f4c77a;border:1px solid #6b4e1a;}
  .banner.shared{background:var(--okbg);color:#8ff0c4;border:1px solid #14513a;}
  .sec{font-size:13px;color:var(--sub);margin:20px 2px 8px;font-weight:600;letter-spacing:.02em;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;}
  .wcard{border-left:4px solid var(--pp);}
  .wtag{display:inline-block;background:var(--ppbg);color:#d7a6ff;font-size:11px;
    padding:2px 8px;border-radius:20px;margin-bottom:8px;}
  .word{font-size:22px;font-weight:800;color:#fff;margin:0 0 6px;}
  .mean{font-size:15px;color:#cdd5e3;margin:0 0 10px;}
  .ex{font-size:14.5px;color:#aeb8ca;background:#12161f;border-radius:8px;padding:9px 11px;
    border-left:3px solid var(--accent);}
  .ex b{color:#cfe0ff;font-weight:600;}
  .checkrow{display:flex;gap:10px;margin-top:6px;}
  .cbtn{flex:1;border-radius:14px;padding:16px 10px;font-size:16px;font-weight:700;
    border:1.5px solid var(--line);background:#222838;color:var(--txt);cursor:pointer;transition:.12s;}
  .cbtn:active{transform:scale(.98);}
  .cbtn.done{background:var(--okbg);border-color:var(--ok);color:#8ff0c4;}
  .cbtn .st{display:block;font-size:12px;font-weight:500;color:var(--sub);margin-top:3px;}
  .cbtn.done .st{color:#6bd3a6;}
  .tracker{margin-bottom:12px;}
  .thead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .tname{font-weight:700;font-size:16px;}
  .ttot{font-size:14px;color:var(--sub);}
  .ttot b{color:var(--ok);font-size:17px;}
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .day{aspect-ratio:1;border-radius:10px;border:1px solid var(--line);background:#181c25;
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:var(--sub);}
  .day .dn{font-size:10px;opacity:.7;}
  .day.done{background:var(--okbg);border-color:var(--ok);color:#8ff0c4;}
  .day.today{outline:2px solid var(--accent);outline-offset:0;}
  .bar{height:6px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:8px;}
  .bar>i{display:block;height:100%;background:var(--ok);width:0;transition:.25s;}
  .foot{font-size:11px;color:var(--sub);text-align:center;margin-top:24px;line-height:1.7;}
  a{color:var(--accent);}
</style>
</head>

aneously, not planned.","e":"The other person has just about pushed you to your limit, maybe with an off-hand comment or a string of subtle digs.","d":"260522","p":"병찬"},{"w":"string of subtle digs","m":"String of = a series of repeated things one after another\nSubtle = not obvious, hard to notice\nDigs = indirect insults or criticisms — not direct attacks, but little remarks that quietly put someone down","e":"The other person has just about pushed you to your limit, maybe with an off-hand comment or a string of subtle digs.","d":"260522","p":"병찬"},{"w":"heart is racing","m":"your heart is beating very fast — usually because of excitement, fear, nervousness, or anticipation.","e":"Your heart is racing.","d":"260522","p":"병찬"},{"w":"zinger","m":"a sharp, witty, or clever remark that is surprisingly funny or cutting","e":"Your brain calls to mind that perfect zinger.","d":"260522","p":"병찬"},{"w":"Lost your footing","m":"suddenly lose your balance, stability, or control — either literally or figuratively.","e":"There’s a way to catch yourself mid-sentence and pivot without looking like you’ve totally lost your footing.","d":"260522","p":"병찬"},{"w":"Cognitive friction","m":"The mental effort or resistance experienced by a user when an interface or system does not work as expected, or is difficult to understand.","e":"Others raise concerns that AI users could be surrendering the cognitive friction that makes thinking sharp, and that as a society we may have fewer original ideas","d":"260510","p":"규영"},{"w":"Atrophy","m":"The gradual decline of a skill, ability, or quality due to lack of use. (물리적, 생물학적 또는 기능적 퇴화)","e":"There's plenty of evidence that if you are not doing as much of the actual thinking, then your capability to do that kind of thinking is going to atrophy","d":"260510","p":"규영"},{"w":"Inherent","m":"Existing in something as a permanent, essential, or characteristic attribute.","e":"Why do we think AI is going to be that different from other things that o d with","m":"Linked to, combined with, or occurring at the same time as something else.","e":"Significant demand coupled with a shortage of supply, has pushed memory prices to unprecedented levels and supported profits for Samsung, SK Hynix and Micron.","d":"260413","p":"병찬"},{"w":"fall under","m":"To be classified as part of a particular group, category, or jurisdiction;","e":"The approval, which falls under the UN R-171 regulation for Driver Control Assistance Systems, comes after more than 18 months of testing and is currently valid only in the Netherlands","d":"260413","p":"규영"},{"w":"provisional validity","m":"Legal or official validity that is temporary and subject to change or final confirmation later.","e":"European type approval with provisional validity in the Netherlands","d":"260413","p":"규영"},{"w":"stress","m":"noun. A state of mental or emotional strain.","e":"The Dutch authority stressed that FSD Supervised is a driver assistance system — not an autonomous or self-driving system","d":"260413","p":"규영"},{"w":"Exemption","m":"The action of freeing someone or something from an obligation or liability imposed on others.","e":"Tesla submitted documentation covering more than 400 compliance requirements under UN R-171 and Article 39 exemptions.","d":"260413","p":"규영"},{"w":"explicit","m":"Stated clearly and in detail, leaving no room for confusion or doubt.","e":"The RDW’s statement is explicit: FSD Supervised “can take over many driving tasks” but the vehicles “are NOT autonomous or self-driving.”","d":"260413","p":"규영"},{"w":"intervene","m":"To intentionally become involved in a difficult situation in order to improve it or prevent it from getting worse.","e":"The driver’s hands don’t need to rest on the steering wheel, but the driver must be able to intervene immediately.","d":"260413","p":"규영"},{"w":"going public","m":"The process where a private company (owned by its founders and a few investors) becomes a public company by selling its shares to the general public on a stock exchange (like the New York Stock Exchange or Nasdaq)","e":"As SpaceX potentially readies to begin the progress of going public in the coming days, investors already have funds to play it.","d":"260329","p":"병찬"},{"w":"Public Offering Prospectus","m":"A formal, legally required written document that provides full details about an investment offering for sale to the public.","e":"The Information reported Tuesday that the Elon Musk-run startup is looking to file its initial public offering prospectus with regulators as early as this week.","d":"260329","p":"병찬"},{"w":"Vying","m":"Competing eagerly with someone in order to achieve something; fighting for superiority or a specific prize.","e":"SpaceX has reportedly been looking at a Nasdaq listing while vying for early entry into the Nasdaq 100 index.","d":"260329","p":"병찬"},{"w":"accounts for / nearly a quarter","m":"Makes up, represents, or is responsible for almost 25% of the total amount.","e":"SpaceX also accounts for nearly a quarter or the Baron Focused Growth Fund (BFGIX). Tesla follows, representing just over 6% of holdings.","d":"260329","p":"병찬"},{"w":"Come off","m":"Having just completed or experienced something (usually a successful or intense period).","e":"But the fund is coming off three years of double-digit gains, Morningstar said.","d":"260329","p":"병찬"},{"w":"bottom quartile of","m":"The lowest 25% of a group when everything is ranked from best to worst (or highest to lowest).","e":"The fund added nearly 12% in 2025, but was among the bottom quartile of comparable offerings, per Morningstar.","d":"260329","p":"병찬"},{"w":"Multi Tenant","m":"An architecture in which a single instance of a software application or a hardware resource serves multiple customers or users.","e":"So much more room to optimize AI inference for speed, memory usage, power consumption, and multi-tenant utilization","d":"260329","p":"규영"},{"w":"blister / blistering","m":"Blister","e":"Memory stocks’ blistering rally","d":"260329","p":"규영"},{"w":"Profit-taking","m":"The act of selling an asset (like stocks) that has risen in value to lock in the profit.","e":"Analysts said the moves this week on memory stocks have largely been driven by profit-taking","d":"260329","p":"규영"},{"w":"primed to","m":"To be made ready for a specific purpose or action; to be in a state where one is very likely to do something soon.","e":"In a market primed to de‑risk, even an incremental development can be taken as a cue to lighten up","d":"260329","p":"규영"},{"w":"lucrative","m":"Producing a great deal of profit; highly profitable.","e":"How the red-hot AI data center boom is igniting demand for a new, lucrative career path","d":"260322","p":"병찬"},{"w":"funnel","m":"a tube or pipe that is wide at the top and narrow at the bottom, used for guiding liquid or powder into a small opening.","e":"Big Tech is funneling billions into building out these specialized facilities, with the four hyperscalers, Alphabet, Microsoft, committing nearly 700 billion in combined capex spending this year to fund these developments.","d":"260322","p":"병찬"},{"w":"reached a fever pitch","m":"To become extremely intense, exciting, or agitated. It describes a situation that has reached its highest level of emotion or activity.","e":"While anxiety around AI replacing white-collar jobs has reached a fever pitch, the data center boom is creating lucrative opportunities for skilled trade workers.","d":"260322","p":"병찬"},{"w":"displace","m":"To take the place of someone or something; to force something out of its usual or original position.","e":"generative models will displace white-collar jobs.","d":"260322","p":"병찬"},{"w":"retro / fitting","m":"The act of adding new components, technology, or features to an existing structure or system that did not have them when it was originally built.","e":"Mathews noted “massive growth areas specific to labor” as a result of these retrofitting requirements, with network engineers, electricians, mechanical engineers, and plumbing and heating contractors deployed to install new liquid cooling systems.","d":"260322","p":"병찬"},{"w":"Moat","m":"1. A deep, wide ditch surrounding a castle or town","e":"Jensen Huang doesn’t need a new chip. He needs a new moat","d":"260322","p":"규영"},{"w":"agnostic","m":"Hardware or software that is compatible with many different systems","e":"At Nvidia’s annual developer conference, GTC, Huang launched NemoClaw, an open-source, chip-agnostic platform for building and deploying AI agents – autonomous software programs at the center of the latest advancements in the industry.","d":"260322","p":"규영"},{"w":"Monetize","m":"To utilize something as a source of profit;","e":"Nvidia gives away the layer that drives adoption and monetizes what sits beneath it","d":"260322","p":"규영"},{"w":"playbook","m":"A set of rules or suggestions that are considered to be useful for winning or for achieving success","e":"Huang is following that playbook — he isn’t charging for NemoClaw","d":"260322","p":"규영"},{"w":"Weigh in","m":"To join a discussion or argument by offering your help, advice, or opinion.","e":"“You don’t get to weigh in on that.”","d":"260308","p":"병찬"},{"w":"vocally criticized","m":"To express disapproval or find fault with someone or something in a public, loud, or very direct manner.","e":"Altman has been vocally criticized, including by some OpenAI employees","d":"260308","p":"병찬"},{"w":"Cease","m":"To come to an end or to bring something to an end; to stop happening or existing.","e":"President Donald Trump also directed every federal agency in the U.S. to “immediately cease” all use of Anthropic’s technology.","d":"260308","p":"병찬"},{"w":"Oust","m":"To drive out or expel someone from a position or place, often by force or through a formal legal or political process.","e":"Anthropic’s AI was reportedly used in the Iran strikes over the weekend as well as for the capturing of ousted Venezuelan leader Nicolás Maduro and his wife, Cilia Flores, in January.","d":"260308","p":"병찬"},{"w":"Concede","m":"To admit that something is true or valid after first denying or resisting it; or to surrender or yield something (like a goal, a point, or a victory).","e":"Altman has defended OpenAI’s contract in various social media posts, though he conceded that it looked “looked opportunistic and sloppy” and that the company “shouldn’t have rushed to get this out on Friday.”","d":"260308","p":"병찬"},{"w":"surveillance","m":"The careful and continuous watching of a person or place, especially by the police or army, because of a crime that has happened or is expected.","e":"The company wanted assurance that its models would not be used for fully autonomous weapons or mass surveillance of Americans, while the DOD wanted Anthropic to agree to let the military deploy the models across all lawful use cases.","d":"260308","p":"병찬"},{"w":"heated","m":"Characterized by strong emotion, intensity, or anger (especially in a discussion or argument).","e":"Altman and Musk, two of the co-founders of OpenAI, are engaged in a heated legal battle that’s slated to go to trial next month.","d":"260308","p":"병찬"},{"w":"adjunct professor","m":"A professor who is hired on a contractual, part-time basis rather than being a full-time member of the faculty. Often, they have a primary career outside of the university.","e":"dietitian Dr. Michelle Cardel, chief nutrition officer at WeightWatchers and adjunct professor at the University of Florida.","d":"260308","p":"규영"},{"w":"dietitian","m":"An expert on diet and nutrition who helps people promote health and manage disease through specialized meal planning.","e":"dietitian Dr. Michelle Cardel, chief nutrition officer at WeightWatchers and adjunct professor at the University of Florida.","d":"260308","p":"규영"},{"w":"longevity","m":"Long life; the ability to last for a long time: Especially referring to a person's life span","e":"balancing protein with fiber intake is going to be really important when thinking about longevity and optimizing health and well-being across the lifespan","d":"260308","p":"규영"},{"w":"go overboard","m":"To do something to a greater degree than is necessary or reasonable: To overdo something.","e":"going overboard on protein and not balancing it with fiber could lead to weight gain or digestive problems.","d":"260308","p":"규영"},{"w":"constipation","m":"A condition in which there is difficulty in emptying the bowels: Usually associated with hardened feces.","e":"One of the common signs is constipation","d":"260308","p":"규영"},{"w":"soluble / insoluble","m":"Able to be dissolved: Especially in water.","e":"There are two types of dietary fiber: soluble and insoluble.","d":"260308","p":"규영"},{"w":"First kind & Second Kind","m":"Refers to the initial category or type in a list of several different classifications or groups.","e":"There are two kinds of Claude users now. The first kind chats. The second kind delegates.","d":"260302","p":"병찬"},{"w":"Delegate","m":"(Noun - /ˈdelɪɡət/): A person chosen or elected to represent a group, typically at a conference or meeting.","e":"The second kind delegates.","d":"260302","p":"병찬"},{"w":"Scatter","m":"Occurring or found at intervals or in various locations rather than all together; spread over a wide area.","e":"draft a report from these scattered notes.","d":"260302","p":"병찬"},{"w":"Stark","m":"Adjective: Unpleasantly clear or impossible to avoid (harsh); simple or bare in appearance (austere); or showing a very large and obvious difference (distinct).","e":"The practical difference is stark.","d":"260302","p":"병찬"},{"w":"tedious","m":"Too long, slow, or dull; tiresome or monotonous","e":"The kind of tedious, structured work that sits at the intersection of ~","d":"260302","p":"병찬"},{"w":"Sandbox","m":"Running a program or AI in a restricted, isolated digital environment so it cannot access or damage the rest of the computer system.","e":"The core capability is simple: file system access in a sandboxed environment.","d":"260302","p":"병찬"},{"w":"mundane","m":"Lacking interest or excitement; dull. It often refers to routine, everyday tasks that are not special or creative.","e":"This sounds mundane until you realize how much time knowledge workers spend sorting downloads, organizing project files, or standardizing file names across a folder. Cowork handles this in minutes.","d":"260302","p":"병찬"},{"w":"rattle","m":"To make someone nervous, worried, or confused","e":"The U.S.-Israel conflict with Iran is extending into its third day with each side doubling down on sharper responses in the days ahead, deepening fears of a wider war that could rattle the global economy.","d":"260302","p":"규영"},{"w":"Gulf countries","m":"The countries bordering the Persian Gulf. In a geopolitical context, it usually refers to the six members of the Gulf Cooperation Council (GCC): Saudi Arabia, Kuwait, the United Arab Emirates, Qatar, Bahrain, and Oman.","e":"Tehran has struck back with missiles and drones against Israel and Gulf countries that host U.S. military bases, including the United Arab Emirates, Qatar, Kuwait and Saudi Arabia.","d":"260302","p":"규영"},{"w":"designate","m":"To officially choose someone or something for a particular purpos","e":"he had not publicly designated a successor.","d":"260302","p":"규영"},{"w":"Comprising","m":"To be made up of, To make up or form something","e":"A council comprising Iranian President Masoud Pezeshkian, the judiciary head and a member of the Guardians Council, has temporarily assumed leadership duties on Sunday.","d":"260302","p":"규영"},{"w":"parse","m":"To analyze a string of symbols (data) or text","e":"traders parsed risks of a drawn-out conflict and a major oil supply disruption.","d":"260302","p":"규영"},{"w":"Casualty","m":"A person killed or injured in a war or accident:","e":"U.S. President Donald Trump has warned that there might be more American casualties as the operations unfold.","d":"260302","p":"규영"},{"w":"Opt in","m":"To choose to take part in something or to agree to be involved in a specific activity (usually by giving formal permission).","e":"Starting later on Friday, users who opt in can message the AI agent through Baidu’s main search app to complete tasks.","d":"260208","p":"병찬"},{"w":"Rollout","m":"The official launch or introduction of a new product, service, or system, often happening in stages rather than all at once.","e":"The rollout comes just days ahead of China’s Lunar New Year holiday, as Chinese internet tech giants race to attract new users.","d":"260208","p":"병찬"},{"w":"Surged in","m":"To have a sudden, powerful, and rapid increase in a particular quality, amount, or state (like popularity or price).","e":"AI agents such as OpenClaw have surged in popularity recently for their ability to automate tasks.","d":"260208","p":"병찬"},{"w":"unfettered","m":"Not limited or restricted; completely free.","e":"Cybersecurity firms including CrowdStrike have warned the public about granting OpenClaw unfettered access to enterprise systems.","d":"260208","p":"병찬"},{"w":"most talked-about","m":"Something or someone that is attracting the most attention, discussion, or controversy at a particular time.","e":"Through several name changes, adoption across Silicon Valley to Beijing, and mounting controversy, the open-source AI agent now known as “OpenClaw” has emerged as one of the most talked-about tools in the artificial intelligence space this year.","d":"260208","p":"규영"},{"w":"mounting controversy","m":"A disagreement or argument that is steadily increasing in intensity, scale, or seriousness.","e":"Through several name changes, adoption across Silicon Valley to Beijing, and mounting controversy, the open-source AI agent now known as “OpenClaw” has emerged as one of the most talked-about tools in the artificial intelligence space this year.","d":"260208","p":"규영"},{"w":"ascension","m":"1. The act of rising or moving to a higher level or position.","e":"Its sudden ascension(혜성같은 등장), driven by its capabilities and social media attention, comes amid growing interest in AI agents that can autonomously complete tasks, make decisions, and take actions on behalf of users without constant human guidance.","d":"260208","p":"규영"},{"w":"Mainstream consciousness","m":"The shared awareness or understanding of a topic by the majority of people in a society.","e":"Until recently, AI agents have failed to reach mainstream consciousness in the same way large language models did following the emergence of OpenAI’s ChatGPT, but OpenClaw could signal a shift.","d":"260208","p":"규영"},{"w":"tech-savvy","m":"Well-informed about or proficient in the use of modern technology, especially computers and the internet.","e":"To use OpenClaw, one has to install it on a server or local device and connect it to a large language model such as Anthropic’s Claude model or ChatGPT— a process that might be difficult for less tech-savvy users.","d":"260208","p":"규영"},{"w":"lethal trifecta","m":"A combination of three things that causes extreme damage, failure, or death. It describes a situation where three negative factors converge to create a \"perfect storm.\"","e":"Security experts, however, have raised alarms. Cybersecurity firm Palo Alto Networks, for example, warned that the AI agent presents a “lethal trifecta” of risks stemming from its access to private data, exposure to untrusted content and ability to perform external communications while retaining memory.","d":"260208","p":"규영"},{"w":"upvote (downvote)","m":"An act of registering approval of or support for a post or comment on a social media site or forum, typically by clicking a specific icon (usually an upward-pointing arrow).","e":"The platform functions like an online forum, similar to Reddit, where users’ OpenClaw agents post written content and interact with other chatbots through comments and upvotes or downvotes.","d":"260208","p":"규영"},{"w":"Plunge","m":"to fall or drop suddenly and sharply.","e":"Gold and silver prices plunged Friday, as President Donald Trump’s nomination for the next chair of the Federal Reserve, Kevin Warsh, appeared to relieve concerns about the central bank’s independence and sent the dollar soaring.","d":"260201","p":"병찬"},{"w":"Silver futures","m":"contracts to buy or sell silver at a fixed price on a specific future date.","e":"Silver futures plummeted 31.4% to settle at 78.53, marking its worst day since March 1980.","d":"260201","p":"병찬"},{"w":"gained steam","m":"to grow stronger, faster, or more popular over time.","e":"However, they gained steam in afternoon U.S. trading as investors who piled into the metals raced to book profits.","d":"260201","p":"병찬"},{"w":"Piled into","m":"to move into it in large numbers, quickly and enthusiastically.","e":"However, they gained steam in afternoon U.S. trading as investors who piled into the metals raced to book profits","d":"260201","p":"병찬"},{"w":"greenback","m":"the US dollar (USD).","e":"metals would replace the greenback as the globe’s reserve currency.","d":"260201","p":"병찬"},{"w":"Front-runner","m":"the person, company, or option that is currently leading and most likely to win or succeed.","e":"but Warsh became the front-runner in prediction markets in recent days.","d":"260201","p":"병찬"},{"w":"honorable discharge","m":"A release from military service with a favorable record. It indicates that the service member performed their duties satisfactorily and met or exceeded the required standards of conduct.","e":"“It’s time to basically bring the Model S and X programs to an end with an honorable discharge,” Musk said.","d":"260201","p":"규영"},{"w":"slashed","m":"1. To greatly reduce an amount, price, or quantity.","e":"After the original Roadster, the two models are Tesla’s oldest vehicles, and in recent years the company has slashed prices as global competition for electric vehicles has soared.","d":"260201","p":"규영"},{"w":"bipedal","m":"Using only two legs for walking. It comes from the Latin words 'bi-' (meaning two) and 'ped-' (meaning foot).","e":"Tesla is developing Optimus with the aim of someday selling it as a bipedal, intelligent robot capable of everything from factory work to babysitting.","d":"260201","p":"규영"},{"w":"accounted for","m":"1. To form a particular amount or part of something.","e":"Tesla’s far more popular models are the 3 and Y, which accounted for 97% of the company’s 1.59 million deliveries last year","d":"260201","p":"규영"},{"w":"Laud","m":"to praise someone or something highly and publicly","e":"A landmark trade deal between the European Union and India has been lauded as a major breakthrough for Europe’s biggest carmakers, although analysts have flagged competition concerns in one of the world’s fastest growing markets.","d":"260125","p":"병찬"},{"w":"Amid","m":"in the middle of / during / surrounded by something (usually something happening at the same time).","e":"The long-pending agreement, which comes as both sides seek to strengthen ties amid U.S. tensions, includes slashing tariffs on imports of EU-made cars to 10% from as high as 110% under a quota of 250,000 vehicles per year.","d":"260125","p":"병찬"},{"w":"off by","m":"different from the correct or expected amount.","e":"Europe’s Stoxx Automobiles and Parts index traded nearly 1% lower on the news, however, with Volkswagen, BMW and France’s Renault all off by around 1.3% during morning deals.","d":"260125","p":"병찬"},{"w":"To be sure","m":"used to acknowledge a point as true before introducing a contrast, clarification, or limitation.","e":"To be sure, India represents the world’s third-largest market for passenger cars worldwide and auto industry groups expect tax cuts, particularly for smaller vehicles, to stimulate the country’s market significantly in 2026.","d":"260125","p":"병찬"},{"w":"in favour of","m":"supporting, approving of, or preferring something.","e":"With this agreement, Europe is sending a clear signal in favour of rules-based trade and against the law of the jungle,” he added.","d":"260125","p":"병찬"},{"w":"boon","m":"something that is very helpful, beneficial, or advantageous.","e":"‘A boon to European automakers’","d":"260125","p":"병찬"},{"w":"crux","m":"the most important or decisive point of an issue; the core of the problem.","e":"That’s the first thing and this is probably the crux of why they would do something like this at this point,” Hsiao told CNBC on Tuesday.","d":"260125","p":"병찬"},{"w":"obsolete","m":"No longer produced or used; out of date because something newer and better has been invented.","e":"It’s ‘a fear of becoming obsolete’","d":"260125","p":"규영"},{"w":"vex","m":"To annoy, frustrate, or worry someone,","e":"Other therapists said the technology is also vexing their patients.","d":"260125","p":"규영"},{"w":"go deeply into","m":"To examine, investigate, or explain something in great detail; to explore the complexities of a subject.","e":"It goes deeply into questions of personal value, which is all very unsettling","d":"260125","p":"규영"},{"w":"Underneath","m":"1. Directly below or beneath something else, often being covered by it.","e":"Underneath these feelings is usually “a younger part that’s terrified of being left behind or not being ‘enough,’ and that fear gets amplified because the technology itself feels so fast and out of our control,”","d":"260125","p":"규영"},{"w":"grieve","m":"To feel or show great sorrow or distress, especially because of someone's death or a significant loss","e":"Allow yourself to grieve and comfort the parts of you that feel shocked, hopeless and afraid right now","d":"260125","p":"규영"},{"w":"disruptive","m":"1. Causing trouble and therefore stopping something from continuing as usual. (Negative)","e":"But the disruptive and uncertain moment can also be a chance for reflection","d":"260125","p":"규영"},{"w":"a sense of agency","m":"The subjective awareness that one is initiating, executing, and controlling one's own volitional actions in the world. It is the feeling of being in the \"driver's seat\" of your own life.","e":"Learning enough about AI to understand where it genuinely alters work, and where it does not, often restores a sense of agency","d":"260125","p":"규영"},{"w":"Drain","m":"Literal meaning: remove liquid","e":"She advises writing down what's working in your life, what's draining you or no longer fits, and where are you running on autopilot.","d":"260118","p":"병찬"},{"w":"sets someone up for a fall","m":"“Set someone up” → put them in a particular situation","e":"Promising yourself \"I'll always go for a run on a Wednesday\" or \"I'm never drinking again\" just sets you up for a fall.","d":"260118","p":"병찬"},{"w":"relapse","m":"to return to a bad condition or behavior after a period of improvement.","e":"Plan for relapse","d":"260118","p":"병찬"},{"w":"slip up","m":"to make a small mistake, usually unintentionally","e":"If you slip up, \"the most helpful response is curiosity rather than criticism\" and instead of waiting for the following week or next month to start again, you should treat every day as a reset.","d":"260118","p":"병찬"},{"w":"whereby","m":"\"By which\" or \"through which.\" It is a conjunction used to introduce a clause that explains how something is achieved or the method by which something happens.","e":"The two companies noted they have entered into a multi-year contract whereby Apple will use Google’s Gemini model and cloud computing technology to power AI features.","d":"260118","p":"규영"},{"w":"tease","m":"1) To laugh at someone or say unkind things to them, either because you want to joke with them or because you want to upset them.","e":"The move could help Apple accelerate the release of its more advanced, AI-powered version of its Siri voice assistant, which was delayed after first being teased at the company’s 2024 Worldwide Development Conference.","d":"260118","p":"규영"},{"w":"rocky years","m":"A period of time characterized by instability, difficulties, or uncertainty. It refers to a situation that is not going smoothly, much like a road full of large rocks that makes driving difficult.","e":"Apple is betting on added AI capabilities, including the updated Siri, to boost device sales after several rocky years for the iPhone.","d":"260118","p":"규영"},{"w":"elephant in the room","m":"An obvious major problem or issue that people are avoiding discussing or acknowledging because it is uncomfortable, sensitive, or embarrassing.","e":"This is what the Street has been waiting for with the elephant in the room for Cupertino revolving around its invisible AI strategy","d":"260118","p":"규영"},{"w":"incorporate","m":"To include something within a larger group, system, or plan so that it becomes a part of it.","e":"Apple was planning to pay around 1 billion per year to incorporate Gemini into the updated version of Siri","d":"260118","p":"규영"},{"w":"off guard","m":"To catch someone off guard = to surprise someone because they were not prepared or not expecting something.","e":"A company can catch its competitors off guard by launching surprise attacks, such as new product launches, aggressive marketing campaigns, or acquisitions.","d":"260111","p":"병찬"},{"w":"Relentless drive","m":"an intense, continuous determination to achieve a goal, without giving up or slowing down","e":"This “spirit” can manifest in various ways, such as innovative thinking, customer-centricity, and a relentless drive for excellence.","d":"260111","p":"병찬"},{"w":"Coalitions","m":"groups of different people, parties, or organizations that temporarily work together toward a common goal.","e":"These coalitions can provide access to new markets, shared resources, and a stronger competitive position.","d":"260111","p":"병찬"},{"w":"Complacent","m":"being too satisfied with the current situation and therefore not trying to improve or prepare for risks.","e":"A company that becomes too complacent or arrogant in its position of dominance may become vulnerable to competitors.","d":"260111","p":"병찬"},{"w":"differentiators","m":"Factors or characteristics that make a product, service, or company different from and better than its competitors.","e":"NVIDIA's pivot toward AI at scale and AI systems as differentiators will help keep it way ahead of rivals","d":"260111","p":"규영"},{"w":"profound shift","m":"A deep, fundamental, and significant change in the way something is done, thought about, or organized.","e":"Alpamayo represents a profound shift for NVIDIA, moving from being primarily a compute to a platform provider for physical AI ecosystems","d":"260111","p":"규영"},{"w":"long tail of the distribution","m":"The \"tail\" is the part of a list or graph where things happen very rarely. The \"long tail\" means there are so many of these rare things that they become a big problem (or opportunity) to handle","e":"What they will find is that it's easy to get to 99% and then super hard to solve the long tail of the distribution.","d":"260111","p":"규영"},{"w":"overhyped","m":"To publicize or promote something excessively; so much that the actual quality or value does not meet the high expectations.","e":"It became the first company to reach 5tn in October, but has lost value over concerns about whether demand AI is overhyped","d":"260111","p":"규영"},{"w":"be about to","m":"To be on the point of doing something. to be ready to do something very soon","e":"it tells you what it's going to do, and it reasons about what it's about to do","d":"260111","p":"규영"},{"w":"a close ally of","m":"someone or a group that has a strong, trusted, and cooperative relationship with X","e":"Isaacman, a close ally of SpaceX CEO Elon Musk, told CNBC’s “Closing Bell Overtime” that Trump’s recommitment to exploring the moon is key to unlocking the “orbital economy.”","d":"251228","p":"병찬"},{"w":"saga","m":"a long, complicated series of events, often involving conflict, problems, or drama.","e":"Isaacman’s comments on Friday were some of his first public remarks since being confirmed to his position by the Senate last week, after a long saga throughout 2025.","d":"251228","p":"병찬"},{"w":"Propel","m":"to push or drive something forward, often quickly or powerfully.","e":"The campaign was propelled after Trump’s One Big Beautiful Bill Act allocated 9.9 billion to NASA earlier this year.","d":"251228","p":"병찬"},{"w":"water down","m":"To dilute: To make a liquid thinner or weaker by adding water.","e":"EU waters down plans to end new petrol and diesel car sales by 2035","d":"251228","p":"규영"},{"w":"Lobby","m":"To try to persuade a politician, the government, or an official group that a particular law or situation should be changed or maintained.","e":"Current rules state that new vehicles sold from that date should be \"zero emission\", but carmakers, particularly in Germany, have lobbied heavily for concessions.","d":"251228","p":"규영"},{"w":"concessions (kənˈseSH(ə)n)","m":"A point that you willingly yield to the other side because you want to reach a deal.","e":"Current rules state that new vehicles sold from that date should be \"zero emission\", but carmakers, particularly in Germany, have lobbied heavily for concessions.","d":"251228","p":"규영"},{"w":"undermine","m":"To weaken something secretly or gradually from the base","e":"Opponents of the move have warned that it risks undermining the transition towards electric vehicles and leaving the EU exposed in the face of foreign competition.","d":"251228","p":"규영"},{"w":"breathing space","m":"A pause in a difficult situation that allows you to recover or think.","e":"Policy makers must provide breathing space to manufacturers to sustain jobs, innovation and investments","d":"251228","p":"규영"},{"w":"sound","m":"Financially secure: (Business) Robust, stable, and not at risk of failing.","e":"German carmaker Volkswagen welcomed the European Commission's draft proposal on new CO₂ targets, calling it \"economically sound overall\".","d":"251228","p":"규영"},{"w":"a slew of","m":"a large number or a lot of something","e":"The photo, released on Friday along with a slew of other files, shows a desk displaying a large assortment of framed and unframed photographs and other items.","d":"251207","p":"병찬"},{"w":"Lawmakers","m":"people who make, amend, or vote on laws.","e":"Lawmakers on Saturday were quick to note that the image was missing from the DOJ website.","d":"251207","p":"병찬"},{"w":"redact","m":"remove or hide sensitive or confidential information from a document before it is shared.","e":"The DOJ said in a post on X late Friday that it wasn’t “redacting the names of any politicians” and cited comments made by Blanche reiterating such.","d":"251207","p":"병찬"},{"w":"consistent string of","m":"a continuous, unbroken sequence of similar events, achievements, or problems.","e":"Apple for decades has been known for a consistent string of design-forward, tech-defining consumer products that have shaped how people use technology.","d":"251207","p":"규영"},{"w":"at a crossroads","m":"being at a point in time when a critical decision must be made that will have far-reaching consequences.","e":"Now the company known for its steadiness is going through a shakeup at the top, as both Apple and the tech industry at large are at a crossroads.","d":"251207","p":"규영"},{"w":"niche product","m":"a good or service that serves a specific, small, and specialized market segment.","e":"And Apple’s expensive Vision Pro headset, the first new computing category the company has introduced since the decade-old Apple Watch, is still a niche product.","d":"251207","p":"규영"},{"w":"juggernaut","m":"a massive, inexorable force or object that crushes everything in its path. In a figurative sense, it refers to a huge, powerful, and overwhelming organization, campaign, or movement that cannot be stopped.","e":"The iPhone is still a juggernaut","d":"251207","p":"규영"},{"w":"rip the Band-Aid off","m":"to do something that is going to be painful, difficult, or unpleasant quickly, rather than delaying it ":"to defend yourself from something / to prevent something unpleasant or unwanted","e":"driven by investor confidence in its ability to fend off the threat from OpenAI, the developer of ChatGPT.","d":"251123","p":"병찬"},{"w":"slippage","m":"a delay or shortfall compared to the planned schedule or target","e":"While the company maintains its target of reaching net zero emissions by 2030, the CEO acknowledges there will be slippage, saying","d":"251123","p":"병찬"},{"w":"Yet","m":"“However” / “Nevertheless” / “But still” → It connects two contrasting ideas.","e":"These chips form the computational backbone of AI systems, processing the vast calculations required to train and run machine learning models. Yet questions about market sustainability continue to mount.","d":"251123","p":"병찬"},{"w":"flurry","m":"n. a brief and light snowfall","e":"","d":"251123","p":"규영"},{"w":"a flurry of : A large number of things happening suddenly and within a short period of time.","m":"","e":"Saudi Arabia is strengthening its ties with American AI companies — announcing a flurry of new joint ventures worth billions of dollars.","d":"251123","p":"규영"},{"w":"de facto","m":"Existing or being something in fact, although not officially recognized or legally established.","e":"The country seeks to make its mark in the AI industry as its de facto leader, Crown Prince Mohamed bin Salman, makes his first visit to the United States in years.","d":"251123","p":"규영"},{"w":"sovereign","m":"n. A supreme ruler, especially a king or queen.","e":"Humain — an AI company backed by Saudi Arabia’s sovereign wealth fund — announced a series of partnerships with prominent American tech companies","d":"251123","p":"규영"},{"w":"firm up","m":"To make something more definite, clear, or settled.","e":"Saudi Arabia is trying to further firm up ties with the United States and shift its economy away from oil.","d":"251123","p":"규영"},{"w":"redemption","m":"The act of saving or being saved from sin, error, or evil.","e": ears into the spotlight for global investors.","d":"251109","p":"병찬"},{"w":"alert","m":"Being watchful, quick to notice things, or ready to act.","e":"We have to be very alert to these risks,” Bailey said","d":"251109","p":"병찬"},{"w":"loom","m":"to appear as a large, unclear, or threatening shape; to seem likely to happen soon, often in a worrying way.","e":"Why human-shaped robots loom large in Musk's Tesla plans","d":"251109","p":"규영"},{"w":"whopping","m":"extremely large; surprisingly big in size, amount, or degree.","e":"One of the many tasks Musk must complete to get his whopping pay deal is to deliver a million AI bots over the next decade.","d":"251109","p":"규영"},{"w":"dexterity","m":"the ability to use your hands or body skillfully and quickly.","e":"Forrester analyst Brian Hopkins said the falling costs of components, combined with improvements to robot dexterity and AI, was helping to make humanoid robots feasible for a variety of different settings.","d":"251109","p":"규영"},{"w":"major blow","m":"an idiomatic expression that means a serious setback, loss, or negative impact — often sudden and significant.","e":"Iranian officials have confirmed the facilities were struck but denied it had suffered a major blow.","d":"251106","p":"병찬"},{"w":"enrichment","m":"the process of improving, enhancing, or adding value to something, often by making it more meaningful, interesting, or beneficial.","e":"One of the targets was Fordo - a uranium enrichment plant hidden in a remote mountainside that is vital to Iran's nuclear ambitions","d":"251106","p":"병찬"},{"w":"Watchdog","m":"an organization or person that monitors and oversees others to ensure proper behavior, especially to prevent wrongdoing or abuse of power.","e":"Both Saudi Arabia and the UN's nuclear watchdog the International Atomic Energy Agency (IAEA) say there has been no increase in radiation levels after the attack.","d":"251106","p":"병찬"},{"w":"Self-imposed","m":"Decided or applied by oneself, not by an external authority.","e":"As his self-imposed July 9 deadline for deals approaches with few new agreements in place, Trump has threatened to raise tariffs again.","d":"251106","p":"병찬"},{"w":"stockpile","m":"To accumulate a large reserve of goods for future use.","e":"And businesses often stockpile inventory ahead of tariffs, delaying cost increases for themselves and for customers.","d":"251106","p":"병찬"},{"w":"Level the playing field","m":"To create fair conditions where no side has an unfair advantage.","e":"Trump’s tariffs are intended to “level the playing field for American industries and workers,” Desai said.","d":"251106","p":"병찬"},{"w":"start off","m":"To put something into effect or follow through with a task or responsibility.","e":"Usually, people start off wanting the former and end up wanting the latter","d":"251106","p":"병찬"},{"w":"outlier","m":"a person or thing differing from all other members of a particular group or set","e":"Here are 13 thoughts about how to achieve such outlier success.","d":"251106","p":"병찬"},{"w":"Compound","m":"to form (something) by combining separate things","e":"Isn't that a compound word?","d":"251106","p":"병찬"},{"w":"fraught","m":"adj. causing or having a lot of emotional stress or worry; anxious","e":"Donald Trump has taken a dramatic step to insert the US into the fraught conflict between Iran and Israel.","d":"251106","p":"규영"},{"w":"aftermath","m":"The period or consequences following a significant, usually unpleasant event.","e":"In the immediate aftermath of the strikes","d":"251106","p":"규영"},{"w":"rail","m":"verb. To complain angrily or criticize strongly about something.","e":"Saturday's attack was an aggressive move for a president who boasted of starting no new wars during his first presidential term and who regularly railed against predecessors who had drawn the country into foreign conflicts on the campaign trail last year.","d":"251106","p":"규영"},{"w":"distinguished","m":"adj. known by many people because of some quality or achievement","e":"Ali Saidi, a distinguished engineer at AWS","d":"251106","p":"규영"},{"w":"liken","m":"Verb. To say that someone or something is similar to another person or thing.","e":"Ali Saidi, a distinguished engineer at AWS, likened the speed to a machine reading 100 music CDs a second.","d":"251106","p":"규영"},{"w":"outpacing","m":"To move or develop faster than someone or something else.","e":"The demand for these chips is already outpacing supply","d":"251106","p":"규영"},{"w":"excel","m":"To be very good at something; to do something better than most people.","e":"One of the great joys in life is finding your purpose, excelling at it, and discovering that your impact matters to something larger than yourself","d":"251106","p":"규영"},{"w":"Disservice","m":"An action that harms or damages someone or something; the opposite of a service or help.","e":"I think people who pretend you can be super successful professionally without working most of the time (for some period of your life) are doing a disservice.","d":"251106","p":"규영"},{"w":"Eminent","m":"Very famous, respected, or distinguished within a particular profession or area; outstanding or noteworthy.","e":"A special case of developing a network is finding someone eminent to take a bet on you,","d":"251106","p":"규영"},{"w":"Strive to","m":"To try very hard to achieve or accomplish something","e":"Striving to be a top performer at something can help encourage you and your team to create your best work and achieve your goals.","d":"251026","p":"병찬"},{"w":"In a structured way","m":"to do something in an organized, systematic, and intentional manner — rather than randomly or informally.","e":"Some businesses encourage competition in a structured way by publicly or privately ranking employees, posting performance metrics or giving rewards to top performers.","d":"251026","p":"병찬"},{"w":"rationale","m":"the reasoning or explanation behind a decision, belief, or action. It explains why something is done or thought in a particular way.","e":"Providing your rationale for introducing competition to the workplace also opens a discussion among your team and gives them the chance to ask questions and address any concerns they have.","d":"251026","p":"병찬"},{"w":"Carrying out","m":"To put something into effect or follow through with a task or responsibility.","e":"Carrying out an analysis of your company's strengths and weaknesses will allow you to identify what gaps you need to cover","d":"251026","p":"병찬"},{"w":"filters out","m":"remove or block unwanted parts from something, usually to leave only what is relevant, useful, or needed.","e":"A well-written job offer not only attracts the best candidates, but it also filters out those that don't fit the profile sought.","d":"251026","p":"병찬"},{"w":"disposition","m":"Personality / Temperament\n→ A person’s usual mood or behavior tendency.","e":"Your attitude and disposition: Does it fit the company culture?","d":"251026","p":"병찬"},{"w":"fruition","m":"The point at which a plan, project, or idea is successfully completed and produces the desired result.","e":"The tech giant used the stage to unveil features across all its most popular products, even bringing AI experiments that were previously announced to fruition.","d":"251026","p":"규영"},{"w":"be promising","m":"Showing signs of future success, good results, or positive development.","e":"Some of the updates were really promising, including the incorporation of Project Mariner, a research prototype built on Gemini 2.0 that can automate tasks in your browser and will be able to purchase tickets and book reservations on your behalf.","d":"251026","p":"규영"},{"w":"roundup","m":"A summary or collection of information, events, or items gathered together, often highlighting the most important points.","e":"We have reached the part of the roundup where the value of the announcements is measured by how transformational they will be in the future.","d":"251026","p":"규영"},{"w":"impending","m":"about to happen very soon","e":"A commonly proposed solution for an impending era of technological unemployment is government-granted universal basic income (UBI).","d":"251026","p":"규영"},{"w":"tacit","m":"Expressed or understood without being directly stated; implied.","e":"AI tools could capture the tacit knowledge visible to you every day and turn it into your personal data moat.","d":"251026","p":"규영"},{"w":"unfathomable","m":"Adjective. impossible to understand or impossible to measure the extent of.","e":"You could be the owner of a business, deploying AI you control on data you own to solve problems that feel unfathomable to you today.","d":"251026","p":"규영"},{"w":"break down","m":"To analyze or explain something in smaller, simpler parts.","e":"In this article, we’ll break down Perplexity AI vs ChatGPT and highlight their pros and cons to help you decide which one is right for you.","d":"250928","p":"병찬"},{"w":"Pull something from","m":"means to take, extract, or retrieve something from a source.","e":"You can customize your search to pull results from specific sources, making it easier to find exactly what you need.","d":"250928","p":"병찬"},{"w":"Group something into","m":"organize or classify things by putting them into categories, sets, or groups based on shared characteristics.","e":"You can group searches into collections, making it easier to keep track of information for ongoing projects, research papers, or personal reference.","d":"250928","p":"병찬"},{"w":"X for X","m":"This format is typically used to compare two things on the basis of equal units — like per gram, per dollar, per mile, etc.","e":"Some people think starchy foods are fattening, but gram for gram the carbohydrate they contain provides fewer than half the calories of fat.","d":"250928","p":"병찬"},{"w":"a portion of","m":"means a part or section of a whole. It’s often used when talking about quantities, groups, time, food, or resources.","e":"Eat more fish, including a portion of oily fish","d":"250928","p":"병찬"},{"w":"fizzy drinks","m":"beverages that are carbonated, meaning they contain bubbles of carbon dioxide gas. They're also known as soft drinks or soda in many English-speaking countries.","e":"sugary fizzy drinks","d":"250928","p":"병찬"},{"w":"storied (career)","m":"A career that is famous or well-known, often because it includes many notable achievements, events, or has a long and distinguished history.","e":"With such a storied career under his belt, it’s no surprise investors of all ages attend Berkshire Hathaway’s annual shareholder meeting year after year to hear the Oracle of Omaha speak.","d":"250928","p":"규영"},{"w":"championed (Champion)","m":"to fight or speak publicly in support of (a person, belief, cause, etc.)","e":"Buffett has famously championed a long-term strategy of buying and holding stocks","d":"250928","p":"규영"},{"w":"speculative","m":"an investment involving a high risk of loss","e":"rather than trying to time the market or get rich quickly on newer, more speculative investments like cryptocurrency.","d":"250928","p":"규영"},{"w":"bandwagon","m":"A popular activity, idea, or trend that many people start to support or follow — often just because others are doing it.","e":"While many big-name companies are taking advantage of current labor conditions to hop on the highly-publicized RTO bandwagon","d":"250928","p":"규영"},{"w":"be stationed in","m":"To be placed or assigned to live and work in a specific location, usually for a job, often in the military or a company.","e":"While I was stationed in [South] Korea on a remote tour, I met a few people that hated it because they missed their families and never went far from the base.","d":"250928","p":"규영"},{"w":"pronounced","m":"Very noticeable or clear; something that stands out a lot.","e":"This preference for remote work is particularly pronounced among certain demographics.","d":"250928","p":"규영"},{"w":"Take on responsibility","m":"Accept and begin handling a task, // ===== 설정: 공유 저장(Firebase Realtime DB) =====
// 아래 DB_URL 을 넣으면 규영/병찬 체크가 실시간 공유됩니다.
// 비워두면 이 기기에만 저장(localStorage)됩니다.
const DB_URL = "https://english-study-78cd3-default-rtdb.firebaseio.com";

const PEOPLE = [{key:'kyuyoung',label:'규영'},{key:'byungchan',label:'병찬'}];
const DOW = ['월','화','수','목','금','토','일'];
const $=s=>document.querySelector(s);

// ---- 날짜/주차 유틸 (월요일 시작) ----
function isoWeek(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=(t.getUTCDay()+6)%7;            // 월=0..일=6
  t.setUTCDate(t.getUTCDate()-day+3);       // 목요일 기준
  const y=t.getUTCFullYear();
  const jan4=new Date(Date.UTC(y,0,4));
  const wk=1+Math.round(((t-jan4)/86400000-3+((jan4.getUTCDay()+6)%7))/7);
  return {year:y, week:wk, key:y+'-W'+String(wk).padStart(2,'0')};
}
function dayIdx(d){ return (d.getDay()+6)%7; } // 월=0..일=6

// ---- 시드 랜덤 (주차별 동일한 3개) ----
function hashStr(s){let h=1779033703^s.length;for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return (h^h>>>16)>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
function pickWeekly(key,n){
  const rnd=mulberry32(hashStr(key));
  const idx=[...WORDS.keys()];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  return idx.slice(0,n).map(i=>WORDS[i]);
}

// ---- 저장소 (Firebase REST 또는 localStorage) ----
const SHARED=!!DB_URL;
async function loadWeek(weekKey){
  if(SHARED){
    try{const r=await fetch(`${DB_URL}/checks/${weekKey}.json`);const j=await r.json();return j||{};}
    catch(e){console.warn(e);return {};}
  }else{
    return JSON.parse(localStorage.getItem('ww_'+weekKey)||'{}');
  }
}
async function saveCheck(weekKey,person,di,val){
  if(SHARED){
    await fetch(`${DB_URL}/checks/${weekKey}/${person}/${di}.json`,
      {method:'PUT',body:JSON.stringify(val?true:null)});
  }else{
    const k='ww_'+weekKey;const o=JSON.parse(localStorage.getItem(k)||'{}');
    o[person]=o[person]||{};
    if(val)o[person][di]=true; else delete o[person][di];
    localStorage.setItem(k,JSON.stringify(o));
  }
}

// ---- 렌더 ----
const now=new Date();
const wk=isoWeek(now);
const today=dayIdx(now);
let state={};

function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function highlight(ex,w){
  const word=(w.split('(')[0].trim().split(' ')[0])||w;
  if(!word) return esc(ex);
  try{return esc(ex).replace(new RegExp('('+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<b>$1</b>');}
  catch(e){return esc(ex);}
}
function renderWords(){
  const ws=pickWeekly(wk.key,3);
  $('#words').innerHTML=ws.map(w=>`
    <div class="card wcard">
      <span class="wtag">${w.p} · ${w.d.replace(/(\d\d)(\d\d)(\d\d)/,'$1.$2.$3')}</span>
      <p class="word">${esc(w.w)}</p>
      ${w.m?`<p class="mean">${esc(w.m)}</p>`:''}
      ${w.e?`<div class="ex">${highlight(w.e,w.w)}</div>`:''}
    </div>`).join('');
}
function checkedDays(person){const o=state[person]||{};return Object.keys(o).filter(k=>o[k]).length;}
function renderChecks(){
  $('#checks').innerHTML=PEOPLE.map(p=>{
    const done=!!(state[p.key]&&state[p.key][today]);
    return `<button class="cbtn ${done?'done':''}" data-p="${p.key}">
      ${done?'✅':'⬜'} ${p.label}<span class="st">${done?'오늘 완료':'오늘 완료 체크'}</span></button>`;
  }).join('');
  document.querySelectorAll('#checks .cbtn').forEach(b=>b.onclick=async()=>{
    const pk=b.dataset.p;const cur=!!(state[pk]&&state[pk][today]);
    state[pk]=state[pk]||{};
    if(cur)delete state[pk][today]; else state[pk][today]=true;
    render();
    await saveCheck(wk.key,pk,today,!cur);
  });
}
function renderTrackers(){
  $('#trackers').innerHTML=PEOPLE.map(p=>{
    const o=state[p.key]||{};const tot=checkedDays(p.key);
    const cells=DOW.map((dn,i)=>{
      const done=!!o[i];
      return `<div class="day ${done?'done':''} ${i===today?'today':''}">
        <span class="dn">${dn}</span>${done?'✓':''}</div>`;}).join('');
    return `<div class="card tracker">
      <div class="thead"><span class="tname">${p.label}</span>
        <span class="ttot"><b>${tot}</b> / 7 일</span></div>
      <div class="days">${cells}</div>
      <div class="bar"><i style="width:${tot/7*100}%"></i></div>
    </div>`;
  }).join('');
}
function render(){renderChecks();renderTrackers();}

async function init(){
  $('#weekLabel').textContent=`${wk.year}년 ${wk.week}주차 · ${now.getMonth()+1}월 ${now.getDate()}일 (${DOW[today]})`;
  $('#todayLabel').textContent=`오늘: ${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} (${DOW[today]})  —  각자 하루 1회 체크`;
  $('#banner').className='banner '+(SHARED?'shared':'local');
  $('#banner').textContent=SHARED?'🔗 공유 저장 켜짐 — 규영·병찬 체크가 함께 반영됩니다.'
    :'⚠️ 로컬 저장 모드 — 이 기기에만 기록됩니다. 공유하려면 DB_URL 설정이 필요합니다.';
  $('#foot').innerHTML='보라색 표현 '+WORDS.length+'개 풀에서 매주 랜덤 3개 · 월요일 자동 리셋<br>주간 누적은 해당 주차에만 집계됩니다.';
  renderWords();
  state=await loadWeek(wk.key);
  render();
}
init();
</script>
