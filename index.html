cials have confirmed the facilities were struck but denied it had suffered a major blow.","The cancellation of the project was a major blow to the team"],"d":"251106","p":"병찬","pp":true},{"w":"enrichment","m":"the process of improving, enhancing, or adding value to something, often by making it more meaningful, interesting, or beneficial.","ex":["One of the targets was Fordo - a uranium enrichment plant hidden in a remote mountainside that is vital to Iran's nuclear ambitions","The program is designed for the enrichment of students’ learning."],"d":"251106","p":"병찬","pp":true},{"w":"Watchdog","m":"an organization or person that monitors and oversees others to ensure proper behavior, especially to prevent wrongdoing or abuse of power.","ex":["Both Saudi Arabia and the UN's nuclear watchdog the International Atomic Energy Agency (IAEA) say there has been no increase in radiation levels after the attack.","A consumer watchdog investigates false advertising."],"d":"251106","p":"병찬","pp":true},{"w":"fraught","m":"adj. causing or having a lot of emotional stress or worry; anxious","ex":["Donald Trump has taken a dramatic step to insert the US into the fraught conflict between Iran and Israel.","It was a fraught moment, as both sides prepared for war."],"d":"251106","p":"규영","pp":true},{"w":"aftermath","m":"The period or consequences following a significant, usually unpleasant event.","ex":["In the immediate aftermath of the strikes","In the aftermath of the scandal, several officials resigned."],"d":"251106","p":"규영","pp":true},{"w":"rail","m":"verb. To complain angrily or criticize strongly about something.","ex":["Saturday's attack was an aggressive move for a president who boasted of starting no new wars during his first presidential term and who regularly railed against predecessors who had drawn the country into foreign conflicts on the campaign trail last year.","He railed against the unfair treatment he received."],"d":"251106","p":"규영","pp":true},{"w":"Strive to","m":"To try very hard to achieve or accomplish something","ex":["Striving to be a top performer at something can help encourage you and your team to create your best work and achieve your goals.","We are striving to improve our customer service."],"d":"251026","p":"병찬","pp":true},{"w":"In a structured way","m":"to do something in an organized, systematic, and intentional manner — rather than randomly or informally.","ex":["Some businesses encourage competition in a structured way by publicly or privately ranking employees, posting performance metrics or giving rewards to top performers.","We need to approach this project in a structured way."],"d":"251026","p":"병찬","pp":true},{"w":"rationale","m":"the reasoning or explanation behind a decision, belief, or action. It explains why something is done or thought in a particular way.","ex":["Providing your rationale for introducing competition to the workplace also opens a discussion among your team and gives them the chance to ask questions and address any concerns they have.","The rationale behind the new policy is to reduce costs."],"d":"251026","p":"병찬","pp":true},{"w":"fruition","m":"The point at which a plan, project, or idea is successfully completed and produces the desired result.","ex":["The tech giant used the stage to unveil features across all its most popular products, even bringing AI experiments that were previously announced to fruition.","After years of research, their work finally came to fruition."],"d":"251026","p":"규영","pp":true},{"w":"be promising","m":"Showing signs of future success, good results, or positive development.","ex":["Some of the updates were really promising, including the incorporation of Project Mariner, a research prototype built on Gemini 2.0 that can automate tasks in your browser and will be able to purchase tickets and book reservations on your behalf.","The project is promising but needs more funding."],"d":"251026","p":"규영","pp":true},{"w":"roundup","m":"A summary or collection of information, events, or items gathered together, often highlighting the most important points.","ex":["We have reached the part of the roundup where the value of the announcements is measured by how transformational they will be in the future.","The magazine published a roundup of the best movies this year."],"d":"251026","p":"규영","pp":true},{"w":"break down","m":"To analyze or explain something in smaller, simpler parts.","ex":["In this article, we’ll break down Perplexity AI vs ChatGPT and highlight their pros and cons to help you decide which one is right for you.","Let me break down the cost for you."],"d":"250928","p":"병찬","pp":true},{"w":"Pull something from","m":"means to take, extract, or retrieve something from a source.","ex":["You can customize your search to pull results from specific sources, making it easier to find exactly what you need."],"d":"250928","p":"병찬","pp":true},{"w":"Group something into","m":"organize or classify things by putting them into categories, sets, or groups based on shared characteristics.","ex":["You can group searches into collections, making it easier to keep track of information for ongoing projects, research papers, or personal reference.","Students were grouped into teams of four."],"d":"250928","p":"병찬","pp":true},{"w":"storied (career)","m":"A career that is famous or well-known, often because it includes many notable achievements, events, or has a long and distinguished history.","ex":["With such a storied career under his belt, it’s no surprise investors of all ages attend Berkshire Hathaway’s annual shareholder meeting year after year to hear the Oracle of Omaha speak.","She retired after a storied career in journalism, during which she interviewed world leaders and won multiple awards."],"d":"250928","p":"규영","pp":true},{"w":"championed (Champion)","m":"to fight or speak publicly in support of (a person, belief, cause, etc.)","ex":["Buffett has famously championed a long-term strategy of buying and holding stocks","The professor championed the use of renewable energy in urban planning."],"d":"250928","p":"규영","pp":true},{"w":"speculative","m":"an investment involving a high risk of loss","ex":["rather than trying to time the market or get rich quickly on newer, more speculative investments like cryptocurrency.","Buying stocks in a new startup can be highly speculative."],"d":"250928","p":"규영","pp":true},{"w":"Take on responsibility","m":"Accept and begin handling a task, role, or duty","ex":["help you take on more responsibility at work and move your career forward.","He took on the responsibility of managing the new product launch."],"d":"250914","p":"병찬","pp":true},{"w":"Bettering","m":"present participle or gerund form of the verb \"to better,\" which means to improve — whether it's yourself, someone else, a situation, or performance","ex":["She’s dedicated to bettering herself through study and self-discipline.","His work focuses on bettering the lives of underprivileged children."],"d":"250914","p":"병찬","pp":true},{"w":"In that way","m":"phrase used to refer to a specific method, manner, or reason previously mentioned. It often means \"by doing so\", \"as a result\", or \"like that\", depending on context.","ex":["After improving yourself in that way, you may find that you can help mediate parties with different opinions.","He spoke very calmly. I admire people who handle conflict in that way."],"d":"250914","p":"병찬","pp":true},{"w":"halt","m":"to stop (something or someone) from moving or continuing","ex":["It did, however, point to an update to the Model Y during the quarter that temporarily halted production at all four of its factories for several weeks.","The government decided to halt all construction due to safety concerns."],"d":"250914","p":"규영","pp":true},{"w":"be poised to","m":"to be ready or prepared to do something, or to be in a position where something is likely to happen soon.","ex":["Tesla is poised to lose that title in 2025","She stood at the edge of the diving board, poised to jump."],"d":"250914","p":"규영","pp":true},{"w":"X in X","m":"X out of every X, or xx%. It is a common way to express proportions or statistics in a clear and relatable way.","ex":["Seven in 10 people around us have done something nice … in the past month.","About 7 in 10 students passed the exam."],"d":"250907","p":"병찬","pp":true},{"w":"is down from a spike","m":"that something (like a number, rate, or level) has decreased after previously rising sharply. A “spike” refers to a sudden and noticeable increase, and “is down” means it has fallen since that high point.","ex":["This trend of doing kind things is down from a spike during the Covid-19 pandemic","Sales are down from a spike last month after the product launch."],"d":"250907","p":"병찬","pp":true},{"w":"Follow through","m":"a phrasal verb that means to complete something you started or carry out a plan, task, or promise to the end. It emphasizes seeing things through to completion.","ex":["She always follows through on her commitments.","The team had a great idea, but they didn’t follow through."],"d":"250907","p":"병찬","pp":true},{"w":"Lingering","m":"lasting for a long time or slow to end","ex":["The cold is lingering[dragging] on a very long time","She felt a lingering sadness even after the movie ended."],"d":"250907","p":"규영","pp":true},{"w":"Reciprocal","m":"used to describe a relationship in which two people or groups agree to do something similar foreach other, to allow each other to have the same rights, etc.","ex":["Trump outlining a plan for “reciprocal tariffs” on countries that have tariffs on US goods","Their friendship is built on reciprocal trust and respect."],"d":"250907","p":"규영","pp":true},{"w":"Elaborate","m":"to give more details about something, to discuss something more fully","ex":["While Buffett didn’t elaborate on his comment about tariffs being an act of war,","Could you elaborate on your point? I didn’t quite understand."],"d":"250907","p":"규영","pp":true},{"w":"Wear stock tire","m":"Normally, wear means to have clothes on. But in automotive English, wear can also mean to be fitted with or equipped with.","ex":["The Polestar 3 wore stock Michelin Sport 4 EV tires on stock 20-inch wheels, though it's well known that greater range does not favor large wheels.","-> In the article, “stock Michelin Sport 4 EV tires on stock 20-inch wheels” means the car used the original tires and wheels from the manufacturer, not special or custom versions."],"d":"250817","p":"병찬","pp":false},{"w":"Hypermile","m":"to drive in an extremely fuel-efficient way, using special techniques to get the maximum distance out of each unit of fuel (or electricity for EVs)","ex":["We all know how to hypermile an EV.","He’s such a hypermiler—he once drove 100 miles on a single gallon of gas."],"d":"250817","p":"병찬","pp":false},{"w":"running out of juice","m":"Literally: juice can mean liquid power (like fruit juice).","ex":["it still drove for an extra eight miles before actually running out of juice.","My phone is running out of juice — I need a charger."],"d":"250817","p":"병찬","pp":false},{"w":"evolve","m":"to develop gradually, especially into a more advanced","ex":["If we bring these two together, we can have a common vision for how technology can have an impact on people and how people can adapt and evolve to leverage the new technology.","The software has evolved to meet users’ needs."],"d":"250817","p":"규영","pp":false},{"w":"diluting (Dilute)","m":"to make a liquid thinner or weaker by adding water or another liquid","ex":["merging the departments risks losing or diluting the specialist expertise organisations need to thrive","The new policy risks diluting the influence of small businesses."],"d":"250817","p":"규영","pp":false},{"w":"thrive","m":"to grow, develop, or be successful","ex":["merging the departments risks losing or diluting the specialist expertise organisations need to thrive","She thrived in her new role as a team leader."],"d":"250817","p":"규영","pp":false},{"w":"Reprieve","m":"A temporary relief from something harmful, difficult, or unpleasant; in business, often refers to a delay or suspension of unfavorable actions like penalties or taxes.","ex":["For the past three months, goods shipped from Vietnam to the United States were tariffed at a minimum 10% rate, a reprieve from the 46% rate that briefly went into effect in April before Trump announced a pause.","Workers received a reprieve when the company postponed layoffs until next year."],"d":"250629","p":"병찬","pp":false},{"w":"Framework","m":"A basic structure underlying a system, agreement, or process.","ex":["Vietnam’s state-run news outlet, Việt Nam News, referred to the agreement on Wednesday as “a framework.”","The two companies signed a framework agreement outlining future cooperation."],"d":"250629","p":"병찬","pp":false},{"w":"Self-imposed","m":"Decided or applied by oneself, not by an external authority.","ex":["As his self-imposed July 9 deadline for deals approaches with few new agreements in place, Trump has threatened to raise tariffs again.","The company placed a self-imposed limit on carbon emissions to meet sustainability goals."],"d":"250629","p":"병찬","pp":false},{"w":"stockpile","m":"To accumulate a large reserve of goods for future use.","ex":["And businesses often stockpile inventory ahead of tariffs, delaying cost increases for themselves and for customers.","Countries began to stockpile medical supplies before the pandemic hit."],"d":"250629","p":"병찬","pp":false},{"w":"Onshore - Offshore","m":"Means “on the shore” or “on land” as opposed to water, sea, or offshore locations. It’s used to describe locations or activities happening on land, especially when contrasted with the sea or foreign countries.","ex":["It can take several years for businesses to onshore manufacturing.","The company decided to onshore its call center operations from Asia to the US."],"d":"250629","p":"병찬","pp":false},{"w":"Dispute","m":"To disagree or argue about something, often publicly or officially.","ex":["Caleb Petitt...disputed the idea that American businesses will benefit from the tariffs.","The two companies disputed the ownership of the patent."],"d":"250629","p":"병찬","pp":false},{"w":"Level the playing field","m":"To create fair conditions where no side has an unfair advantage.","ex":["Trump’s tariffs are intended to “level the playing field for American industries and workers,” Desai said.","New regulations were introduced to level the playing field between large corporations and small businesses."],"d":"250629","p":"병찬","pp":false},{"w":"Foot the bill","m":"To pay for something, often something costly or unexpected.","ex":["Businesses foot the initial tariff bill for imported goods, but they often pass on some of those costs to consumers.","My parents kindly footed the bill for my college education."],"d":"250629","p":"병찬","pp":false},{"w":"distinguished","m":"adj. known by many people because of some quality or achievement","ex":["Ali Saidi, a distinguished engineer at AWS","The award goes to a distinguished scientist in the field of genetics."],"d":"250629","p":"규영","pp":false},{"w":"liken","m":"Verb. To say that someone or something is similar to another person or thing.","ex":["Ali Saidi, a distinguished engineer at AWS, likened the speed to a machine reading 100 music CDs a second.","People often liken New York to a concrete jungle."],"d":"250629","p":"규영","pp":false},{"w":"outpacing","m":"To move or develop faster than someone or something else.","ex":["The demand for these chips is already outpacing supply","Technology is outpacing the law in many areas."],"d":"250629","p":"규영","pp":false},{"w":"put A up against B","m":"To place something in competition or comparison with someone or something else, often to evaluate its strength, quality, or performance.","ex":["The chip is a win for the company’s custom strategy and putting it up against traditional semiconductor players like Intel and AMD.","The new phone puts Apple up against Samsung in the premium market."],"d":"250629","p":"규영","pp":false},{"w":"obliterate","m":"completely destroy, erase, or remove all traces of something.","ex":["President Donald Trump says the US has carried out a \"successful\" bombing attack on three nuclear sites in Iran and said they have been \"obliterated\".","The town was obliterated by the earthquake."],"d":"250622","p":"병찬","pp":false},{"w":"penetrate","m":"go into, pass through, or gain access to something, either physically or metaphorically.","ex":["Due to Fordo's depth below ground only the US has the kind of \"bunker buster\" bomb big enough to penetrate the site - the GBU-57 Massive Ordnance Penetrator (MOP).","The bullet couldn’t penetrate the armor."],"d":"250622","p":"병찬","pp":false},{"w":"Kinetic energy","m":"Kinetic energy is the energy an object possesses due to its motion.","ex":["The huge weight of the bomb results in a large amount of kinetic energy on impact.","A moving car has kinetic energy; the faster it goes, the more energy it has."],"d":"250622","p":"병찬","pp":false},{"w":"Casing","m":"noun that refers to a cover, shell, or outer layer that protects or encloses something.","ex":["This energy drives \"the dense alloy casing\" up to 60 metres underground","The metal casing protects the engine from damage."],"d":"250622","p":"병찬","pp":false},{"w":"barbaric violation","m":"An act that violently disrespects or harms someone or something in a way that is inhuman, savage, or uncivilized.","ex":["The Iranian Atomic Energy Organization said the bombing of the three nuclear sites was a \"barbaric violation\" of international law.","Torture is a barbaric violation of human rights."],"d":"250622","p":"병찬","pp":false},{"w":"retaliate","m":"take revenge or respond to a harm or attack by doing something similar in return.","ex":["How might Iran retaliate?","He retaliated after being insulted."],"d":"250622","p":"병찬","pp":false},{"w":"Reserve the right","m":"a formal phrase meaning that someone or some organization keeps the option open to take a certain action in the future, especially under specific circumstances.","ex":["Iran's Foreign Minister Abbas Araqchi condemned the US strike and said Tehran reserved the right to respond.","We reserve the right to refuse service to anyone."],"d":"250622","p":"병찬","pp":false},{"w":"regime [reɪˈʒiːm]","m":"Government or political system, especially an authoritarian one","ex":["But doing nothing makes the Iranian regime look weak, especially after all its warnings of dire repercussions if the US did attack.","The regime was criticized for human rights violations."],"d":"250622","p":"병찬","pp":false},{"w":"repercussions","m":"a bad or serious result of something you do — often something that happens later, not immediately.","ex":["But doing nothing makes the Iranian regime look weak, especially after all its warnings of dire repercussions if the US did attack.","He didn’t consider the repercussions of breaking the contract."],"d":"250622","p":"병찬","pp":false},{"w":"arsenal","m":"A collection of weapons and military equipment","ex":["Iran still has a substantial arsenal of ballistic missiles after manufacturing and hiding these away for years.","The country has a vast nuclear arsenal."],"d":"250622","p":"병찬","pp":false},{"w":"Dismantle","m":"To physically take something to pieces","ex":["It said its ambition was to dismantle its nuclear programme, which Prime Minister Benjamin Netanyahu said would soon be able to produce a nuclear bomb.","The workers dismantled the old factory equipment."],"d":"250622","p":"병찬","pp":false},{"w":"taking office","m":"the act of beginning a formal position of authority or responsibility, especially in government.","ex":["Far from bringing peace to the Middle East since taking office","The president took office in January after winning the election."],"d":"250622","p":"규영","pp":false},{"w":"preside","m":"Acting as the person in charge of a formal event, meeting, court, or ceremony.","ex":["Trump is now presiding over a region on the precipice of even greater warfare - a fight in which America is an active participant.","She was presiding at the annual shareholders’ meeting."],"d":"250622","p":"규영","pp":false},{"w":"precipice","m":"a very steep side of a mountain or cliff","ex":["Trump is now presiding over a region on the precipice of even greater warfare - a fight in which America is an active participant.","The country is on the precipice of economic collapse."],"d":"250622","p":"규영","pp":false},{"w":"Flank","m":"Verb. To be situated at the side of someone or something, or to surround them on both sides; also, to attack from the side (military use).","ex":["Flanked by Vice-President JD Vance, Secretary of State Marco Rubio and Defence Secretary Pete Hegseth, Trump warned Iran","The president was flanked by his advisors during the press conference."],"d":"250622","p":"규영","pp":false},{"w":"bravado","m":"A show of boldness or confidence intended to impress or intimidate others, often without real courage behind it.","ex":["Despite the president's bravado, a continued American military engagement in Iran may be a worst-case scenario for the US, the region and the world.","The teenager’s bravado quickly disappeared when the police arrived."],"d":"250622","p":"규영","pp":false},{"w":"spiral of chaos","m":"A rapidly worsening situation marked by increasing disorder, conflict, or instability, where each event feeds into the next in a destructive cycle.","ex":["UN Secretary General António Guterres warned of a \"spiral of chaos\" that could result from the American decision to escalate the conflict","Without immediate action, the country risks falling into a spiral of chaos."],"d":"250622","p":"규영","pp":false},{"w":"compelled","m":"To be forced to do something, or to feel a strong internal urge to do something.","ex":["If Iran retaliates - as Ayatollah Ali Khamenei warned would happen in the event of a US attack - then the American side may feel compelled to respond.","She felt compelled to speak out against the injustice."],"d":"250622","p":"규영","pp":false},{"w":"lure","m":"verb. To attract or tempt someone or something, often by offering some kind of reward or advantage.","ex":["A bid to lure the Iranians into a false sense of security this weekend?","The promise of a high salary lured him to the new job."],"d":"250622","p":"규영","pp":false},{"w":"unwilling to","m":"Not prepared or eager to do something; reluctant or disinclined to take an action.","ex":["it seems unlikely that a nation unwilling to talk while under Israeli attack will be more inclined when American bombs are also falling.","Many people are unwilling to change their habits easily."],"d":"250622","p":"규영","pp":false},{"w":"singular","m":"grammar. Denoting a single person, thing, or instance (as opposed to plural).","ex":["She has a singular talent for music.","He has a singular way of looking at things. (odd or strange)"],"d":"250622","p":"규영","pp":false},{"w":"uprising","m":"An act of resistance or rebellion against authority or government, usually by a group of people.","ex":["the president could have an uprising with his ranks.","The workers staged an uprising to demand better wages."],"d":"250622","p":"규영","pp":false},{"w":"facilitate","m":"make something easier or smoother to do, especially by helping a process or activity happen more effectively.","ex":["In this article, we present 5 practical keys to facilitate the selection process and find the perfect employee for your business.","The manager facilitated the meeting by keeping the discussion on track."],"d":"250608","p":"병찬","pp":false},{"w":"Selection process","m":"refers to the step-by-step method used to choose the best option, typically in contexts like hiring, admissions, procurement, or project decisions.","ex":["In this article, we present 5 practical keys to facilitate the selection process and find the perfect employee for your business.","The selection process for new employees includes resume screening, interviews, and reference checks."],"d":"250608","p":"병찬","pp":false},{"w":"Carrying out","m":"To put something into effect or follow through with a task or responsibility.","ex":["Carrying out an analysis of your company's strengths and weaknesses will allow you to identify what gaps you need to cover","The team is carrying out a detailed investigation."],"d":"250608","p":"병찬","pp":false},{"w":"transparent","m":"Allowing light to pass through so that objects behind can be seen clearly.","ex":["Write a detailed and transparent job offer","The glass is transparent."],"d":"250608","p":"병찬","pp":false},{"w":"filters out","m":"remove or block unwanted parts from something, usually to leave only what is relevant, useful, or needed.","ex":["A well-written job offer not only attracts the best candidates, but it also filters out those that don't fit the profile sought.","The software filters out spam emails automatically."],"d":"250608","p":"병찬","pp":false},{"w":"shortlist","m":"smaller group of candidates or options selected from a larger pool, usually for final consideration.","ex":["Once the most promising candidates have been shortlisted, evaluate their competencies by","She made it onto the shortlist for the job."],"d":"250608","p":"병찬","pp":false},{"w":"promising candidate","m":"Someone who appears likely to succeed, perform well, or meet expectations based on their skills, experience, or attitude.","ex":["Once the most promising candidates have been shortlisted, evaluate their competencies by","She’s a promising candidate for the marketing role — her portfolio is impressive."],"d":"250608","p":"병찬","pp":false},{"w":"delve","m":"To dig into something — either literally (like digging into the ground) or figuratively (like researching a topic in depth).","ex":["In the final interview, delve into the candidate's profile and make sure they understand their responsibilities within the company.","She delved into the history of ancient civilizations."],"d":"250608","p":"병찬","pp":false},{"w":"disposition","m":"Personality / Temperament → A person’s usual mood or behavior tendency.","ex":["Your attitude and disposition: Does it fit the company culture?","She has a cheerful disposition."],"d":"250608","p":"병찬","pp":false},{"w":"rhetoric","m":"the art or skill of speaking or writing formally and effectively especially as a way to persuade or influence people","ex":["This isn’t empty rhetoric","It's just a rhetoric comment for their own political purposes."],"d":"250608","p":"규영","pp":false},{"w":"grads","m":"an informal, shortened form of graduates.","ex":["Last week, a senior LinkedIn executive reported that AI is already starting to take jobs from new grads","The grads are excited about their job prospects"],"d":"250608","p":"규영","pp":false},{"w":"universal basic income (UBI)","m":"government or public institution provides all citizens with a regular, unconditional sum of money, regardless of their income, employment status, or wealth, to ensure a basic level of financial security.","ex":["A commonly proposed solution for an impending era of technological unemployment is government-granted universal basic income (UBI).","Universal basic income (UBI) is a progressive initiative to provide money each month to cover basic living expenses."],"d":"250608","p":"규영","pp":false},{"w":"impending","m":"about to happen very soon","ex":["A commonly proposed solution for an impending era of technological unemployment is government-granted universal basic income (UBI).","The company is facing impending financial difficulties."],"d":"250608","p":"규영","pp":false},{"w":"bargaining","m":"The act or process of negotiating the terms and conditions of a transaction, agreement, or exchange.","ex":["But this could dramatically change how citizens participate in society because work is most people’s primary bargaining chip.","The buyer and seller spent hours bargaining over the price of the antique."],"d":"250608","p":"규영","pp":false},{"w":"uphold","m":"support, maintain, or defend something","ex":["Our modern world is upheld with a simple exchange","It is our duty to uphold the values of democracy."],"d":"250608","p":"규영","pp":false},{"w":"be posed to (be supposed to)","m":"ready to do something,","ex":["With AGI, we are posed to change","With the new regulations, the industry is posed to face significant changes."],"d":"250608","p":"규영","pp":false},{"w":"Curse","m":"Noun. A powerful or magical wish that something bad will happen to someone.","ex":["“The Intelligence Curse”","Many people believe that breaking a mirror brings seven years of bad luck, or a curse."],"d":"250608","p":"규영","pp":false},{"w":"afflicted with","m":"To be affected by something harmful or unpleasant, especially a disease, condition, or problem.","ex":["Just like in oil-rich states(원유가 풍부한 주) afflicted with the “resource curse(자원의 저주),” governments won’t have to invest in their populations to sustain their power.","She has been afflicted with severe headaches for years."],"d":"250608","p":"규영","pp":false},{"w":"grappling with","m":"struggle to deal with or understand a difficult problem or concept","ex":["Many of the people grappling with the other major risks from AGI—that it goes rogue, or helps terrorists create bioweapons","The engineers are grappling with a major design flaw in the new bridge"],"d":"250608","p":"규영","pp":false},{"w":"rogue","m":"a person or thing that behaves in an unpredictable, uncontrolled, or unconventional way, often causing trouble.","ex":["Many of the people grappling with the other major risks from AGI—that it goes rogue, or helps terrorists create bioweapons","A rogue wave suddenly appeared and crashed over the boat."],"d":"250608","p":"규영","pp":false},{"w":"tacit","m":"Expressed or understood without being directly stated; implied.","ex":["AI tools could capture the tacit knowledge visible to you every day and turn it into your personal data moat.","There was a tacit agreement that he would pay off the loan."],"d":"250608","p":"규영","pp":false},{"w":"unfathomable","m":"Adjective. impossible to understand or impossible to measure the extent of.","ex":["You could be the owner of a business, deploying AI you control on data you own to solve problems that feel unfathomable to you today.","For some unfathomable reason, the train was delayed for three hours with no explanation."],"d":"250608","p":"규영","pp":false},{"w":"Cultivate competition","m":"To foster or promote competition among individuals, teams, or businesses.","ex":["In this article, we explain the importance of cultivating competition at work and explore strategies for developing a positive culture of competitiveness on your team.","The company cultivates competition among sales teams to drive better results."],"d":"250601","p":"병찬","pp":false},{"w":"elective","m":"Optional; not required; chosen by choice.","ex":["Your team may see elective competitions as a fun opportunity instead of an extra mandatory assignment.","She took an elective course in photography."],"d":"250601","p":"병찬","pp":false},{"w":"lightheart","m":"Cheerful, carefree, or not too serious","ex":["Promoting the lighthearted aspects of competition can help everyone feel comfortable and confident in their own pace while still striving to achieve their best.","She made a lighthearted joke to break the tension."],"d":"250601","p":"병찬","pp":false},{"w":"Increase in morale","m":"an improvement in the overall mood, motivation, or confidence of a group of people — often in a workplace, team, or organization.","ex":["This allows everyone to have the chance to win a competition and spread around the increase in morale instead of having one or two people consistently winning every competition.","The bonus program led to an increase in employee morale"],"d":"250601","p":"병찬","pp":false},{"w":"mutual","m":"an adjective that means shared by two or more people or groups — something that is felt, done, or experienced equally by both sides.","ex":["Share techniques for improving workplace processes and encourage your staff to mentor one another to drive mutual growth.","They have mutual respect for each other."],"d":"250601","p":"병찬","pp":false},{"w":"Rivalry","m":"is a noun that refers to a situation in which two or more people, teams, or groups compete against each other — often in a continuous or intense way.","ex":["This allows you to build teamwork, share skills and develop a network of support while still enjoying the benefits of rivalry.","There’s a long-standing rivalry between the two soccer teams."],"d":"250601","p":"병찬","pp":false},{"w":"be meant to","m":"To be intended, expected, or supposed to do something.","ex":["They're meant to transform how you use Google offerings","This tool is meant to help beginners."],"d":"250601","p":"규영","pp":false},{"w":"firehose","m":"a hose used to spray water in large volumes, especially by firefighters.","ex":["Since such a firehose of information is packed into a two-hour keynote address","The firefighters unrolled the firehose and started spraying water."],"d":"250601","p":"규영","pp":false},{"w":"flashy","m":"Bright, colorful, and easily noticed — sometimes in a way that is not tasteful or is meant to show off.","ex":["inbox cleanup is perhaps one of the least flashy, and it is easy to lose it in the shuffle of the news","She drives a flashy sports car."],"d":"250601","p":"규영","pp":false},{"w":"Agentic","m":"That behaves like an agent, assuming no responsibility for actions or their consequences, onlyfollowing the orders of someone in authority.","ex":["Agentic shopping"],"d":"250601","p":"규영","pp":false},{"w":"score a deal","m":"To successfully obtain or negotiate a favorable deal, often with effort or luck.","ex":["If you like to score a deal, this \"buy for me\" feature will be your best friend.","I scored a great deal on a new laptop during the sale."],"d":"250601","p":"규영","pp":false},{"w":"ante","m":"An initial bet or stake put into the pot by a player before the deal begins, especially in poker.","ex":["Now, Google is raising the ante by making Gemini Live with camera and screen sharing free for everyone on both Android and iOS.","The players all put in their antes to start the poker round"],"d":"250601","p":"규영","pp":false},{"w":"reason","m":"Verb. To think, understand, and form judgments logically about something; to use rational thinking to come to a conclusion or make a decision.","ex":["it reasons through different decisions that allow it to debug your code, build new features, write tests, and more.","Humans are able to reason and solve complex problems."],"d":"250601","p":"규영","pp":false},{"w":"glimpse","m":"A brief or partial view into something, such as the future or a concept","ex":["Android XR shows a glimpse of how all of the AI advancements we have spoken about above will manifest in the physical world to make our lives easier, acting as a vehicle that bridges the physical world with AI for added assistance.","The documentary offers a glimpse into the daily lives of astronauts."],"d":"250601","p":"규영","pp":false},{"w":"manifest","m":"To show or display something clearly, especially a feeling, quality, or condition.","ex":["Android XR shows a glimpse of how all of the AI advancements we have spoken about above will manifest in the physical world to make our lives easier, acting as a vehicle that bridges the physical world with AI for added assistance.","The symptoms of the disease manifest themselves gradually."],"d":"250601","p":"규영","pp":false},{"w":"Carbohydrates (abbr Carbo)","m":"탄수화물","ex":["Base your meals on higher fibre starchy carbohydrates","Athletes often eat more carbohydrates to fuel their performance."],"d":"250525","p":"병찬","pp":false},{"w":"Starchy","m":"containing a lot of starch, a substance found in many plants that provides energy when eaten. Often refers to dry, dense, or carbohydrate-rich foods.","ex":["Starchy carbohydrates should make up just over a third of the food you eat","Potatoes are a very starchy vegetable"],"d":"250525","p":"병찬","pp":false},{"w":"X for X","m":"This format is typically used to compare two things on the basis of equal units — like per gram, per dollar, per mile, etc.","ex":["Some people think starchy foods are fattening, but gram for gram the carbohydrate they contain provides fewer than half the calories of fat.","Gram for gram, broccoli contains more vitamin C than oranges."],"d":"250525","p":"병찬","pp":false},{"w":"sugary","m":"Often used to describe food or drinks high in sugar.","ex":["these drinks are sugary and can damage your teeth.","This cereal is too sugary for breakfast."],"d":"250525","p":"병찬","pp":false},{"w":"a portion of","m":"means a part or section of a whole. It’s often used when talking about quantities, groups, time, food, or resources.","ex":["Eat more fish, including a portion of oily fish","She ate only a portion of her meal."],"d":"250525","p":"병찬","pp":false},{"w":"canned","m":"(of food or drink) preserved or supplied in a sealed can","ex":["You can choose from fresh, frozen and canned, but remember that canned and smoked fish can be high in salt.","I bought some canned beans for the trip."],"d":"250525","p":"병찬","pp":false},{"w":"Saturated fat","m":"saturate = fill something completely so that no more can be added. It can be used literally (with liquids) or figuratively (with things like information, colors, or markets).","ex":["Cut down on saturated fat and sugar"],"d":"250525","p":"병찬","pp":false},{"w":"obesity","m":"is a medical condition in which a person has excess body fat that may negatively affect their health.","ex":["Regularly consuming foods and drinks high in sugar increases your risk of obesity","Obesity increases the risk of heart disease, diabetes, and certain cancers."],"d":"250525","p":"병찬","pp":false},{"w":"fizzy drinks","m":"beverages that are carbonated, meaning they contain bubbles of carbon dioxide gas. They're also known as soft drinks or soda in many English-speaking countries.","ex":["sugary fizzy drinks","She gave up fizzy drinks to reduce her sugar intake."],"d":"250525","p":"병찬","pp":false},{"w":"teaspoonful","m":"refers to the amount that fits in one teaspoon — a small unit used in cooking or measuring ingredients, especially in recipes.","ex":["Adults and children aged 11 and over should eat no more than 6g of salt (about a teaspoonful) a day.","Add one teaspoonful of salt to the soup."],"d":"250525","p":"병찬","pp":false},{"w":"obese","m":"describe a person who is very overweight with a high amount of body fat, usually to the point where it can negatively affect health","ex":["Being overweight or obese can lead to health conditions, such as type 2 diabetes, certain cancers, heart disease and stroke.","Obese children are at higher risk of developing diabetes."],"d":"250525","p":"병찬","pp":false},{"w":"tug-of-war","m":"A physical contest in which two teams pull on opposite ends of a rope, trying to drag the other team across a central line.","ex":["The return-to-office (RTO) debate has become a tug-of-war between advocates from both ends of the spectrum.","There was a constant tug of war between the marketing and engineering teams over the product’s launch date."],"d":"250525","p":"규영","pp":false},{"w":"abundantly","m":"In a way that is more than enough; in large amounts; very clearly.","ex":["it's becoming abundantly clear that it’s more complicated than that","She spoke abundantly about her love for animals."],"d":"250525","p":"규영","pp":false},{"w":"hop on","m":"To get on something quickly or easily, like a bus, train, bike, or other vehicle. It can also mean to join in on an activity or conversation.","ex":["While many big-name companies are taking advantage of current labor conditions to hop on the highly-publicized RTO bandwagon","I hopped on the bus just before it left."],"d":"250525","p":"규영","pp":false},{"w":"bandwagon","m":"A popular activity, idea, or trend that many people start to support or follow — often just because others are doing it.","ex":["While many big-name companies are taking advantage of current labor conditions to hop on the highly-publicized RTO bandwagon","He doesn't really like crypto, but he jumped on the bandwagon to make money."],"d":"250525","p":"규영","pp":true},{"w":"nuanced","m":"Having small and subtle differences, especially in meaning, feeling, or opinion. A nuanced idea or statement shows deep understanding and careful thinking.","ex":["We surveyed over 1,000 U.S. workers¹, and our research reveals a nuanced picture of employee sentiment toward office work","The actor gave a nuanced performance."],"d":"250525","p":"규영","pp":false},{"w":"vehicle","m":"A method or tool to express or achieve an idea, feeling, or goal.","ex":["For early-career professionals entering a tighter job market, the office environment may take on added significance as a vehicle for professional development and networking","This book is a vehicle for spreading new ideas."],"d":"250525","p":"규영","pp":false},{"w":"embrace","m":"To hug someone","ex":["Many others, particularly those whose job satisfaction is rooted in more than work-from-home flexibility, report choosing to embrace the change","We should embrace change instead of fearing it."],"d":"250525","p":"규영","pp":false},{"w":"stark contrast","m":"A very clear and obvious difference between two things.","ex":["What's particularly interesting in our research is the stark contrast in attitudes between those who have returned to the office compared with those who haven't.","The new design shows a stark contrast with the old one."],"d":"250525","p":"규영","pp":false},{"w":"be stationed in","m":"To be placed or assigned to live and work in a specific location, usually for a job, often in the military or a company.","ex":["While I was stationed in [South] Korea on a remote tour, I met a few people that hated it because they missed their families and never went far from the base.","The soldiers are stationed in the base near the border."],"d":"250525","p":"규영","pp":true},{"w":"drawing parallel","m":"Comparing two things to show that they are similar in some way.","ex":["he explains, drawing parallels to his previous experience on active duty","Drawing a parallel between history and current events can help us learn lessons."],"d":"250525","p":"규영","pp":false},{"w":"pronounced","m":"Very noticeable or clear; something that stands out a lot.","ex":["This preference for remote work is particularly pronounced among certain demographics.","He showed a pronounced improvement in his work."],"d":"250525","p":"규영","pp":true},{"w":"demographics","m":"Information about groups of people, such as their age, gender, income, education, or where they live.","ex":["This preference for remote work is particularly pronounced among certain demographics.","The company studies the demographics of its customers to sell better products."],"d":"250525","p":"규영","pp":false},{"w":"versatile","m":"an adjective that means able to do many different things well or useful in many situations.","ex":["ChatGPT is a versatile AI that can help with writing, problem-solving, and more, while Perplexity AI is designed to provide accurate, research-based answers.","She’s a versatile designer who can work in both digital and print"],"d":"250518","p":"병찬","pp":false},{"w":"fact-check","m":"means to verify whether information is true, accurate, or based on real facts","ex":["It tells you exactly where the information came from, so you can fact-check it yourself.","Please fact-check the article before publishing it."],"d":"250518","p":"병찬","pp":false},{"w":"prone","m":"Likely to experience or do something, especially something bad or harmful.","ex":["it tends to be more accurate and less prone to hallucinations compared to other AI chatbots.","He’s prone to forgetting deadlines."],"d":"250518","p":"병찬","pp":false},{"w":"Market Cap","m":"The total value of a company’s outstanding shares of stock, calculated by multiplying the current stock price by the total number of outstanding shares.","ex":["Berkshire hit a market cap of 1 trillion in 2024","Apple’s market cap reached over 3 trillion, making it the most valuable publicly traded company."],"d":"250518","p":"규영","pp":false},{"w":"storied career","m":"A career that is famous or well-known, often because it includes many notable achievements, events, or has a long and distinguished history.","ex":["With such a storied career under his belt, it’s no surprise investors of all ages attend Berkshire Hathaway’s annual shareholder meeting year after year to hear the Oracle of Omaha speak.","She retired after a storied career in journalism, during which she interviewed world leaders and won multiple awards."],"d":"250518","p":"규영","pp":true},{"w":"under one's belt","m":"Having achieved or experienced something that adds to one's knowledge, skills, or accomplishments.","ex":["With such a storied career under his belt, it’s no surprise investors of all ages attend Berkshire Hathaway’s annual shareholder meeting year after year to hear the Oracle of Omaha speak.","With two Olympic medals under her belt, she is now aiming for a coaching career."],"d":"250518","p":"규영","pp":false},{"w":"pivotal","m":"crucial importance in relation to the development or success of something else","ex":["an attendee asked Buffett about the “pivotal lessons” he learned early in his career.","Her role was pivotal in the success of the project."],"d":"250518","p":"규영","pp":false},{"w":"Along with","m":"In addition to; together with someone or something.","ex":["Buffett emphasized the importance of finding a job that you actually like, along with working for people you respect and can learn from.","She sent a letter along with a gift."],"d":"250518","p":"규영","pp":false},{"w":"be better off","m":"To be in a more favorable situation, especially in terms of wealth, comfort, or well-being.","ex":["you’ll be better off identifying your own passions and smart people in your orbit","You’d be better off saving your money instead of spending it all."],"d":"250518","p":"규영","pp":false},{"w":"Securities","m":"Tradable financial assets such as stocks, bonds, or options that represent ownership or a creditor relationship with a company or government.","ex":["If people are making more money because they’re borrowing money or participating in securities that are pieces of junk ... you have to forget that.","He invests heavily in securities like government bonds and tech stocks."],"d":"250518","p":"규영","pp":false},{"w":"championed","m":"to fight or speak publicly in support of (a person, belief, cause, etc.)","ex":["Buffett has famously championed a long-term strategy of buying and holding stocks","The professor championed the use of renewable energy in urban planning."],"d":"250518","p":"규영","pp":true},{"w":"a sense of","m":"a feeling, awareness, or impression of something. It’s commonly used to describe internal experiences or perceptions—emotions, attitudes, or even physical states.","ex":["A job may be important for a sense of purpose since it can provide goals to work toward each day and an income to support you financially","After talking to her team, she felt a strong sense of support."],"d":"250512","p":"병찬","pp":false},{"w":"good fit","m":"something or someone matches well with another thing — in terms of style, needs, values, skills, or purpose. It’s commonly used in both personal and professional contexts.","ex":["Is this job a good fit for yourself and your family?","She’s a good fit for the team because of her experience and personality."],"d":"250512","p":"병찬","pp":false},{"w":"feel fulfilled","m":"experience a deep sense of satisfaction, contentment, or purpose, especially from something meaningful like work, relationships, or personal growth.","ex":["How do you find jobs to feel fulfilled?","I feel fulfilled when I help others and see the impact of my work."],"d":"250512","p":"병찬","pp":false},{"w":"Resonate","m":"often used to describe something that deeply connects, emotionally or intellectually, with someone.","ex":["Ask yourself why they appeal to you and choose one that most resonates with you","The speaker's message resonated with the audience."],"d":"250512","p":"병찬","pp":false},{"w":"excel","m":"to do something very well or to be exceptionally good at something.","ex":["Try to remember what subjects you excelled in or which ones you wanted to learn more about but didn't have a chance to.","She excels in mathematics."],"d":"250512","p":"병찬","pp":false},{"w":"overreliance","m":"Excessive dependence on someone or something.","ex":["experts have urged people to consider the potential risks of an overreliance on AI in the industry.","Overreliance on technology can reduce critical thinking skills."],"d":"250513","p":"규영","pp":false},{"w":"susceptible","m":"Likely to be influenced, affected, or harmed by something.","ex":["She highlighted how AI systems could be susceptible to biases","Children are more susceptible to colds than adults."],"d":"250513","p":"규영","pp":true},{"w":"biases","m":"prejudice, A tendency to favor or dislike someone or something unfairly, often without enough reason or based on personal opinions.","ex":["She highlighted how AI systems could be susceptible to biases","He has a bias against people who don't agree with him."],"d":"250513","p":"규영","pp":false},{"w":"admission","m":"The act of being allowed to enter a place, organization, or institution.","ex":["He claims it has helped to reduce preventable health events leading to hospital admissions","She received admission to Harvard University."],"d":"250513","p":"규영","pp":false},{"w":"Reassure","m":"To say or do something to make someone feel less worried or afraid.","ex":["it has also been used to reassure family members that a loved one receiving end-of-life care was not in pain.","The doctor reassured me that the surgery was safe."],"d":"250513","p":"규영","pp":false},{"w":"Panacea","m":"A solution or remedy for all problems or difficulties; something that is believed to solve everything.","ex":["There is a potential risk that AI is going to be seen as a panacea to some of those very big problems","There is no panacea for poverty."],"d":"250513","p":"규영","pp":true},{"w":"cutting edge","m":"The most advanced and newest stage in the development of something.","ex":["We will harness cutting-edge technology to transform social care","This lab is working on the cutting edge of cancer research."],"d":"250513","p":"규영","pp":true},{"w":"By taking steps to","m":"is a common phrase used to express the means or method by which someone starts addressing a problem or working toward a goal","ex":["By taking steps to improve yourself, you can also acquire skills outside of traditional educational and occupational settings.","By taking steps to reduce costs, the company improved its profitability."],"d":"250413","p":"병찬","pp":false},{"w":"Aid","m":"Means help, support, or assistance, especially in times of need","ex":["Having well-developed hard and soft skills can aid you in a variety of workplace settings.","The country received international aid after the earthquake."],"d":"250413","p":"병찬","pp":false},{"w":"Advance along","m":"A phrase that means to move forward or progress along a path, road, timeline, or process.","ex":["By reading often, you can gain more insight into your field and develop a strategic vision that helps you advance along your career path.","The troops advanced along the river toward the enemy camp."],"d":"250413","p":"병찬","pp":false},{"w":"Competitive edge","m":"refers to an advantage that allows a person, company, or product to outperform others in the same industry, market, or environment.","ex":["In addition to standard abilities, pay attention to emerging skills that could help you gain a competitive edge.","Our advanced technology gives us a competitive edge in the market."],"d":"250413","p":"병찬","pp":false},{"w":"Pinpointing","m":"it means to identify, locate, or define something with precision — especially when something is hard to find, explain, or understand.","ex":["Rethinking the way you spend your day and pinpointing your most productive hours can help you identify new ways to maximize the time you have.","The engineer is pinpointing the source of the system failure."],"d":"250413","p":"병찬","pp":false},{"w":"Adopting a routine","m":"to begin consistently following a regular pattern of behavior or activities, often with the goal of improving productivity, health, or overall lifestyle.","ex":["Adopting an exercise routine can also clear your mind and help you relax, which can improve your productivity.","Adopting a morning routine helped me feel more focused and calm throughout the day."],"d":"250413","p":"병찬","pp":false},{"w":"Status quo [ ˈkwoʊ ]","m":"the existing state of affairs, especially referring to the current situation or how things are right now — often in a social, political, or business context.","ex":["For example, you can start by questioning the status quo and any assumptions about your life situation.","They are working hard to maintain the status quo."],"d":"250413","p":"병찬","pp":false},{"w":"backflash","m":"to a strong negative reaction by a large number of people","ex":["as backlash against CEO Elon Musk","There was a major backlash against the company after the controversial ad campaign."],"d":"250413","p":"규영","pp":false},{"w":"take a large bite out of of demand","m":"to significantly reduce or diminish it.","ex":["growing competition took a large bite out of demand for its EVs","Sony's new Walkman is coming out and it hopes to take a bite out of Apple's iPod"],"d":"250413","p":"규영","pp":false},{"w":"vandalism","m":"The act of deliberately destroying or damaging property","ex":["There have also been instances of vandalism against Tesla facilities, including its charging stations, as well as some cars.","The young men were arrested for vandalism"],"d":"250413","p":"규영","pp":false},{"w":"stun","m":"to surprise or upset (someone) very much","ex":["The decline is stunning for a company","Her exceptional jump and elegant performance was good enough to stun the audience"],"d":"250413","p":"규영","pp":false},{"w":"year-over-year","m":"Compared to the same time period in the previous year.","ex":["The decline is stunning for a company that until recently was reporting year-over-year sales growth of between 20% and 100% virtually every quarter"],"d":"250413","p":"규영","pp":false},{"w":"be a bull on","m":"to be optimistic or confident about the future performance or success of that thing — especially in a financial or market","ex":["who has been a bull on Tesla","Investors are still bull on tech stocks despite recent volatility."],"d":"250413","p":"규영","pp":false},{"w":"confrontational","m":"describes a person, attitude, or situation that is aggressive, argumentative, or eager to provoke conflict or confrontation.","ex":["confrontational statements and postings on social media, Musk has become a lightning rod for people opposed to the policies of the Trump administration","The company spokesperson dodged confrontational questions from the reporters."],"d":"250413","p":"규영","pp":false},{"w":"lightning rod","m":"someone or something that attracts criticism or gets blamed when things go wrong","ex":["Musk has become a lightning rod for people opposed to the policies of the Trump administration.","He has served well as the governor's lightning rod."],"d":"250413","p":"규영","pp":false},{"w":"substantially","m":"very much, a lot","ex":["more substantially unpopular than Vice President JD Vance","The plane was substantially damaged in the crash."],"d":"250413","p":"규영","pp":false},{"w":"liberal","m":"believing that government should be active in supporting social and political change; relating to or supporting political liberalism compare CONSERVATIVE1","ex":["Those negative opinions of Musk are bleeding over into negative views of Tesla, especially among those who identify as liberals","Many liberal voters support stricter gun control laws."],"d":"250413","p":"규영","pp":false},{"w":"poll","m":"an activity in which several or many people are asked a question or a series of questions inorder to get information about what most people think about something","ex":["And polling indicates Tesla is losing favor.","The final result of the poll will be known tomorrow."],"d":"250413","p":"규영","pp":false},{"w":"Republican","m":"a person who believes in or supports a republican form of government","ex":["there has been a big change in customer loyalty between so-called “blue states,” which have voted for a Democrat in the last four presidential elections, and “red states” where Republicans won.","The Republican candidate stands a good chance of getting in."],"d":"250413","p":"규영","pp":false},{"w":"agitation","m":"means a state of nervousness, restlessness, or excitement — often caused by worry, anger, or anxiety.","ex":["It’s a label for physical agitation in the body and a way of thinking that distorts things to look negative, pessimistic, and hopeless.","The patient’s agitation increased as the medication wore off."],"d":"250406","p":"병찬","pp":false},{"w":"distort","m":"means to twist or change something out of its original, true, or natural shape, meaning, or condition. It can refer to physical appearance, facts, sound, or even the truth.","ex":["It’s a label for physical agitation in the body and a way of thinking that distorts things to look negative, pessimistic, and hopeless.","The funhouse mirrors distort your reflection, making you look taller or wider."],"d":"250406","p":"병찬","pp":false},{"w":"Being driven by","m":"means that a person’s actions, thoughts, or motivations are strongly influenced or controlled by something — like an emotion, goal, or external factor.","ex":["it is absolutely possible to live in this world without being driven by it.","He was driven by fear."],"d":"250406","p":"병찬","pp":false},{"w":"Sift","m":"means to separate or examine something carefully, often to find what’s most important or useful. It can be used literally or figuratively.","ex":["Like sand sifting through your fingers, there’s nothing to hold onto…and, like a miracle, you discover you’re free…","She sifted the flour before baking the cake."],"d":"250406","p":"병찬","pp":false},{"w":"vulnerable","m":"means easily hurt, harmed, or affected — either physically, emotionally, or in a broader sense like being at risk.","ex":["We’re afraid of being alone, of not having enough money, of being vulnerable with people, of failing (or succeeding), of stepping outside of our comfort zone, of death.","The small village was vulnerable to flooding."],"d":"250406","p":"병찬","pp":false},{"w":"procrastination","m":"the act of delaying or postponing something — especially tasks that need to be done, often in favor of doing more enjoyable or easier things instead.","ex":["It’s at the root of procrastination, addiction, compulsive behavior, inadequacy, shame, and envy.","His procrastination kept him from finishing the project on time."],"d":"250406","p":"병찬","pp":false},{"w":"untangle","m":"means to separate things that are twisted or knotted, or to make something complicated easier to understand or fix.","ex":["This is how we untangle fear","She untangled the headphones that were stuck in her bag."],"d":"250406","p":"병찬","pp":false},{"w":"Hasten","m":"1. to move or act quickly 2. to cause (something) to happen more quickly","ex":["Not spending enough time in the two deep stages of sleep may hasten the deterioration of parts of the brain associated with Alzheimer’s disease, a new study found.","hasten the growth of the plants"],"d":"250406","p":"규영","pp":true},{"w":"deterioration","m":"the process of becoming worse in condition, quality, or function over time.","ex":["Not spending enough time in the two deep stages of sleep may hasten the deterioration of parts of the brain associated with Alzheimer’s disease, a new study found.","a serious deterioration in relations between the two countries"],"d":"250406","p":"규영","pp":true},{"w":"early indicators","m":"signs or signals that appear at the beginning of a process or condition, suggesting that something is starting to happen or is likely to happen in the future.","ex":["Deficits in slow-wave and REM sleep appear to shrink parts of the brain known to be early indicators of cognitive deterioration and Alzheimer’s disease","Falling sales may be an early indicator of economic slowdown."],"d":"250406","p":"규영","pp":false},{"w":"inferior parietal region","m":"Part of the Brain: Located in the parietal lobe, towards the back and lower side of the brain.","ex":["a part of the brain called the inferior parietal region"],"d":"250406","p":"규영","pp":false},{"w":"synthesize","m":"to make (something) by combining different things","ex":["That part of the brain synthesizes sensory information","I think we can synthesize our efforts by creating one company"],"d":"250406","p":"규영","pp":false},{"w":"neurodegeneration","m":"the gradual loss or damage of neurons (nerve cells) in the brain or spinal cord. This process can lead to the decline of cognitive, motor, or sensory functions","ex":["it makes sense that it shows neurodegeneration early in the disease"],"d":"250406","p":"규영","pp":false},{"w":"infant","m":"a very young child, baby","ex":["infants can spend about 50% of their sleep in REM.","Sensory input is very important in the infant learning stages."],"d":"250406","p":"규영","pp":false},{"w":"Sleep hygiene","m":"habits and practices that are conducive to sleeping well on a regular basis","ex":["The good news is that you can easily train your brain to better sleepby following what is called “sleep hygiene.”","sleep hygiene is the key to sweet dreams"],"d":"250406","p":"규영","pp":false},{"w":"Optimal","m":"Best or most effective","ex":["Make sure your sleeping environment is optimal","This smart washing machine will dispense an optimal amount of water for the load."],"d":"250406","p":"규영","pp":true},{"w":"booze","m":"to drink a lot of alcohol","ex":["Avoid booze before bed","She yelled at me on the booze."],"d":"250406","p":"규영","pp":false},{"w":"Metabolize","m":"to change (food) into a form that can be used by your body; to process and use (substances brought into your body) by metabolism","ex":["When your liver finishs metabolizing the alcohol at 3 a.m.","Dark chocolate _ but not white chocolate _ may help reduce blood pressure and boost the body's ability to metabolize sugar from food, according to the results of a small study."],"d":"250406","p":"규영","pp":false},{"w":"benevolence","m":"refers to the quality of being kind, helpful, and generous. It embodies a disposition to do good and act charitably toward others","ex":["This year’s report paid special attention to acts of benevolence and people’s expectations of their communities.","Her benevolence was evident in her daily acts of kindness toward neighbors and strangers alike"],"d":"250330","p":"병찬","pp":false},{"w":"Doer","m":"someone who takes action, gets things done, and doesn’t just talk or plan — they follow through and make things happen.","ex":["There is evidence that doing nice things helps both the recipient and the doer feel happier","She’s not just a dreamer — she’s a doer."],"d":"250330","p":"병찬","pp":false},{"w":"generosity","m":"a noun that refers to the willingness to give or share, especially freely and unselfishly, whether it’s money, time, help, kindness, or resources.","ex":["Acts of generosity predict happiness even more than earning a higher salary","Her generosity toward the local community is truly inspiring."],"d":"250330","p":"병찬","pp":false},{"w":"By and large","m":"is an idiom that means \"in general\", \"for the most part\", or \"overall.\" It’s used when you want to summarize or give a general impression, even if there are a few exceptions.","ex":["By and large, we find in almost all of our studies that people randomly assigned to spend generously report feeling higher levels of happiness than people who spend on themselves.","By and large, the event was a success."],"d":"250330","p":"병찬","pp":false},{"w":"Cudgel","m":"to hit (someone or something) with a club","ex":["Tariffs are considered by many economists a political cudgel — sometimes used in a trade war — and not an efficient framework for international trade.","The guard carried a cudgel to protect himself from intruders."],"d":"250330","p":"규영","pp":false},{"w":"the late","m":"\"The late\" is an adjective used before a person's name to indicate that they have passed away. It is a respectful way to refer to someone who is deceased.","ex":["The segment focused on the late Katharine Graham","The late Queen was loved by her people."],"d":"250330","p":"규영","pp":false},{"w":"The Oracle of Omaha","m":"a person (such as a priestess) through whom a god was believed to speak","ex":["The Oracle of Omaha said it’s critical to ask, “And then what?” when thinking about the implications of tariffs and who will bear the cost."],"d":"250330","p":"규영","pp":false},{"w":"Implication","m":"a possible future effect or result","ex":["The Oracle of Omaha said it’s critical to ask, “And then what?” when thinking about the implications of tariffs and who will bear the cost.","The new policy has serious economic implications."],"d":"250330","p":"규영","pp":false},{"w":"amass","m":"To collect or gather a large amount of something over time","ex":["Berkshire amassed its cash and cash equivalents to a record 334.2 billion in the fourth quarter,","He managed to amass a fortune through smart investments."],"d":"250330","p":"규영","pp":false},{"w":"Surge to a record","m":"means to increase rapidly and reach the highest level ever recorded. It is commonly used in financial, economic, and statistical contexts.","ex":["Berkshire’s operating earnings in the fourth quarter surged to a record","The price of gold surged to a record as investors sought safe-haven assets."],"d":"250330","p":"규영","pp":false},{"w":"Operating Earning","m":"a company's profit from its core business operations, excluding taxes and interest expenses.","ex":["Berkshire’s operating earnings in the fourth quarter surged to a record","The company’s operating earnings increased by 15% compared to last year."],"d":"250330","p":"규영","pp":false},{"w":"The Tooth Fairy doesn't pay 'em!","m":"","ex":[],"d":"250330","p":"규영","pp":false},{"w":"Snappy","m":"Stylish or Fashionable: Refers to a smart and stylish appearance","ex":["These aren’t just snappy sayings for t-shirts","He's a snappy dresser."],"d":"250309","p":"병찬","pp":false},{"w":"Affirmation","m":"a positive statement or declaration that something is true. It is often used to promote self-empowerment and positive thinking.","ex":["They’re positive affirmations that can be a powerful tool in helping to shape your outlook.","She repeated daily affirmations to boost her confidence."],"d":"250309","p":"병찬","pp":true},{"w":"roadblocks","m":"is a barrier or obstruction placed across a road to control or restrict traffic flow, often used by law enforcement or military personnel to stop vehicles for checks or to prevent passage.","ex":["Remembering challenges you have overcome in the past can help inspire you to face future roadblocks.","Lack of funding has become a significant roadblock in the project's development."],"d":"250309","p":"병찬","pp":false},{"w":"Be stuck at","m":"can describe a situation where someone is unable to move forward or make progress, either physically or metaphorically.","ex":["\"stuck at home with nothing to do” can be reframed as being “safe at home with an opportunity to connect with my family.","She was stuck at the airport overnight due to flight cancellations."],"d":"250309","p":"병찬","pp":true},{"w":"Get caught in","m":"becoming unexpectedly involved in or trapped by a situation, often without intention or desire. This can apply to both literal and figurative contexts.","ex":["It’s easy to get caught in a spiral of anxious thoughts about the future."],"d":"250309","p":"병찬","pp":true},{"w":"Mark a turning point","m":"an event or moment represents a significant change, shift, or transition in a situation, history, or someone’s life. It is often used to describe critical moments that lead to a new direction or development.","ex":["Why DeepSeek could mark a turning point for Silicon Valley on AI","The invention of the internet marked a turning point in communication."],"d":"250209","p":"병찬","pp":false},{"w":"Be coming to grips","m":"gradually understanding, accepting, or dealing with a difficult situation or problem. It suggests an ongoing process of learning, adjusting, or managing something challenging.","ex":["Silicon Valley is coming to grips this week with the realization that creating an advanced artificial intelligence model may no longer be as specialized a task as was once believed.","She is coming to grips with the responsibilities of her new job."],"d":"250209","p":"병찬","pp":true},{"w":"more or less on par with","m":"something is approximately equal to, similar to, or at the same level as something else, but with some minor differences. It suggests near equivalence rather than an exact match.","ex":["The wakeup call came in the form of DeepSeek, a year-old Chinese start-up whose free, open-source AI model, R1, is more or less on par with advanced models from American tech giants","The performance of the new model is more or less on par with last year’s version."],"d":"250209","p":"병찬","pp":false},{"w":"throw more resources","m":"to allocate or invest additional resources (such as money, time, people, or effort) into something in an attempt to improve or solve a problem. It often implies an urgent or reactive approach to dealing with challenges.","ex":["they could throw more resources at the problem than anyone else and come out on top.","The company decided to throw more resources into marketing to boost sales."],"d":"250209","p":"병찬","pp":true},{"w":"Be committed to","m":"to be dedicated, devoted, or fully engaged in doing something. It expresses a strong promise, responsibility, or determination to achieve a goal or fulfill an obligation.","ex":["We’re committed to moving really quickly here. We want to stay ahead.","We are committed to providing high-quality products."],"d":"250209","p":"병찬","pp":true},{"w":"malfeasance","m":"wrongful, illegal, or dishonest conduct, especially by a public official or a person in a position of authority. It is often used in legal, political, and corporate contexts.","ex":["Even if the company achieved its efficiency revolution with some malfeasance, DeepSeek’s achievements have lit a fire under Silicon Valley’s AI industry.","The mayor was accused of malfeasance after misusing public funds."],"d":"250209","p":"병찬","pp":false},{"w":"Lit a fire","m":"This expression means to motivate or prompt someone to take action, especially if they have been inactive or slow to act. It’s often used to describe encouraging someone to work more quickly or with greater enthusiasm.","ex":["Even if the company achieved its efficiency revolution with some malfeasance, DeepSeek’s achievements have lit a fire under Silicon Valley’s AI industry.","The approaching deadline lit a fire under the team, and they completed the project ahead of schedule"],"d":"250209","p":"병찬","pp":false},{"w":"supremacy","m":"refers to the state or condition of being superior to all others in authority, power, or status. It denotes a leading or controlling position, often implying dominance or preeminence over others","ex":["we thought we had global AI supremacy","The company has begun to challenge the supremacy of the current leading manufacturers in the textiles industry."],"d":"250209","p":"병찬","pp":false},{"w":"Short-lived","m":"Adj. lasting only a short time","ex":["The first punches have been thrown between the United States and China in what could amount to a short-lived trade dispute with limited economic fallout or the start of yet another lengthy and painful trade war reminiscent of President Donald Trump’s first term.","Their happiness was short-lived."],"d":"250209","p":"규영","pp":false},{"w":"Reminiscent","m":"Adj. reminding you of someone or something else, similar to something else","ex":["The first punches have been thrown between the United States and China in what could amount to a short-lived trade dispute with limited economic fallout or the start of yet another lengthy and painful trade war reminiscent of President Donald Trump’s first term.","The way he laughed was strongly reminiscent of his father."],"d":"250209","p":"규영","pp":true},{"w":"Coal","m":"Noun. a black or brownish-black hard substance within the earth that is used as a fuel","ex":["certain types of coal and liquefied natural gas and a 10% tariff on crude oil","I put more coal on the fire."],"d":"250209","p":"규영","pp":false},{"w":"Displacement","m":"the act of forcing people or animals to leave the area where they live","ex":["large-displacement cars and pickup trucks"],"d":"250209","p":"규영","pp":false},{"w":"Hamper","m":"to slow the movement, progress, or action of (someone or something)","ex":["The move significantly hampers the companies’ ability to do business in China.","What factors are there that might hamper corporate investment?"],"d":"250209","p":"규영","pp":false},{"w":"Engage in","m":"to cause (someone) to take part in (something)","ex":["It’s possible that Trump and Chinese President Xi Jinping will at least agree to postpone these actions to engage in further dialogue","Even in prison, he continued to engage in criminal activities."],"d":"250209","p":"규영","pp":false},{"w":"allege","m":"Verb. to state without definite proof that someone has done something wrong or illegal","ex":["he tied in part to the country’s alleged role of supplying fentanyl and other illegal drugs into the US"],"d":"250209","p":"규영","pp":false},{"w":"Levy","m":"Noun. an amount of money that must be paid and that is collect 202","p":"규영","pp":false},{"w":"AI’s Sputnik moment","m":"인공지능(AI) 분야에서 소련의 스푸트니크(Sputnik) 발사와 비슷한 역사적 전환점을 의미합니다. 1957년, 소련이 세계 최초의 인공위성 **\"스푸트니크 1호\"**를 성공적으로 발사하면서 미국은 큰 충격을 받았고, 이에 대응해 과학 기술 개발을 급격히 가속화했습니다. 이로 인해 미국은 우주 개발 경쟁(스페이스 레이스)에 본격적으로 뛰어들었고, NASA가 창설되는 등 과학기술 혁신이 촉진되었습니다. 이와 마찬가지로, AI 분야에서도 특정 기술적 돌파구나 사건이 전 세계적으로 강한 경쟁과 혁신을 유발하는 순간을 **\"AI's Sputnik Moment\"**라고 부릅니다.","ex":[],"d":"250202","p":"규영","pp":false},{"w":"Sanction","m":"to give official approval or permission for an action","ex":["it could sanction its way to dominance in a key technology","These changes will require the sanction of the co"],"d":"250202","p":"규영","pp":true},{"w":"invincibility","m":"impossible to defeat or overcome,","ex":["DeepSeek has called into question that notion, and threatened the aura of invincibility surrounding America’s technology industry","he gave off an aura of invincibility"],"d":"250202","p":"규영","pp":true},{"w":"Freak out","m":"To scare or unnerve someone.","ex":["Just in case, try not to freak out your parents too much"],"d":"250202","p":"규영","pp":false},{"w":"frazzled","m":"someone who is exhausted, overwhelmed, or mentally and physically worn out, often due to stress, overwork, or too many responsibilities. It conveys a sense of being emotionally or physically drained.","ex":["CES 2025 is over, and a frazzled TechRadar team has returned with strange memories of weird furry robotsand light therapy face masks.","After working on the project all night, I felt completely frazzled."],"d":"250119","p":"병찬","pp":false},{"w":"handy place","m":"refers to a location that is convenient, easily accessible, or useful for a particular purpose. It emphasizes practicality and ease of use.","ex":["so we've gathered all the big ones here in one handy place.","This café is a handy place to work while waiting for your train."],"d":"250119","p":"병찬","pp":false},{"w":"furry","m":"an adjective used to describe something that is covered in fur or resembling fur. It is commonly ang-for-buck at these larger screen sizes.","This phone offers the best bang for your buck with its features and price."],"d":"250119","p":"병찬","pp":false},{"w":"streak","m":"often conveys a sense of continuity (in a series) or noticeable contrast (in a mark).","ex":["Massive TVs will continue their hot streak","She’s on a winning streak in her tennis matches."],"d":"250119","p":"병찬","pp":false},{"w":"big bang year","m":"The phrase draws from the concept of the “Big Bang,” symbolizing a powerful or monumental beginning.","ex":["It's taken a few years, but smart glasses are slowly becoming socially acceptable – and CES 2025 shows that this could be their big bang year.","2023 was the big bang year for artificial intelligence with the release of groundbreaking technologies like advanced AI models."],"d":"250119","p":"병찬","pp":false},{"w":"Take place","m":"To happen, to occur","ex":["The memo was called bubble.com, and the subject was the irrational behavior I thought was taking place with respect to tech, internet, and e-commerce stocks.","Voting will take place on May 1"],"d":"250119","p":"규영","pp":false},{"w":"Adage","m":"Noun, an old and well-known saying that expresses a general truth","ex":["One of the first great investment adages I learned in the early 1970s is that “being too far ahead of your time is indistinguishable from being wrong.”","I go over proposals and costing two or three times. As the old adage goes-measure twice, cut once."],"d":"250119","p":"규영","pp":false},{"w":"Aught","m":"anything","ex":["He may have a new girlfriend, for aught I care."],"d":"250119","p":"규영","pp":false},{"w":"Handful","m":"an amount that you can hold in your hand","ex":["I’m often asked whether there’s a bubble surrounding the Standard & Poor’s 500 and the handful of stocks that have been leading it.","Only a handful of people came."],"d":"250119","p":"규영","pp":false},{"w":"disproportionate","m":"having or showing a difference that is not fair","ex":["a small number of stock
